services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: systematic-trading-framework:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      PYTHONPATH: /workspace
      MT5_LOGIN: ${MT5_LOGIN:-}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
      KRAKEN_FUTURES_API_KEY: ${KRAKEN_FUTURES_API_KEY:-}
      KRAKEN_FUTURES_API_SECRET: ${KRAKEN_FUTURES_API_SECRET:-}
      BYBIT_EXECUTION_ENV: ${BYBIT_EXECUTION_ENV:-}
      BYBIT_DEMO_API_KEY: ${BYBIT_DEMO_API_KEY:-}
      BYBIT_DEMO_API_SECRET: ${BYBIT_DEMO_API_SECRET:-}
      BYBIT_DEMO_REST_URL: ${BYBIT_DEMO_REST_URL:-https://api-demo.bybit.com}
      BYBIT_DEMO_PRIVATE_WS_URL: ${BYBIT_DEMO_PRIVATE_WS_URL:-wss://stream-demo.bybit.com/v5/private}
      BYBIT_PUBLIC_WS_URL: ${BYBIT_PUBLIC_WS_URL:-wss://stream.bybit.com/v5/public/linear}
      RUN_BYBIT_DEMO_INTEGRATION_TESTS: ${RUN_BYBIT_DEMO_INTEGRATION_TESTS:-0}
      OANDA_ACCOUNT_ID: ${OANDA_ACCOUNT_ID:-}
      OANDA_API_TOKEN: ${OANDA_API_TOKEN:-}
    stdin_open: true
    tty: true
    command: bash

  trading-dashboard:
    build:
      context: .
      dockerfile: apps/trading_dashboard/Dockerfile
    image: trading-dashboard:latest
    working_dir: /workspace/apps/trading_dashboard/backend
    environment:
      TRADING_DASHBOARD_PROJECT_ROOT: /workspace
      TRADING_DASHBOARD_FRONTEND_DIST: /opt/trading-dashboard/frontend-dist
    volumes:
      - ./data:/workspace/data
      - ./logs:/workspace/logs
      - ./apps/trading_dashboard/layouts:/workspace/apps/trading_dashboard/layouts
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    image: systematic-trading-framework-mcp:latest
    working_dir: /app
    environment:
      MCP_REPO_ROOT: /workspace
      MCP_CONFIG_PATH: /app/mcp-config.yaml
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8765
      PYTHONPATH: /workspace:/app
    volumes:
      - ./:/workspace
    ports:
      - "8765:8765"
    restart: unless-stopped
