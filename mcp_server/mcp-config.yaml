host: 0.0.0.0
port: 8765

limits:
  max_read_bytes: 1000000
  max_search_results: 200
  max_tree_entries: 5000
  script_timeout_seconds: 120

full_access:
  enabled: true
  require_confirmation: true
  # Retained for older clients. New destructive/execution tools require any
  # non-empty confirmation text describing the user's explicit request.
  confirmation_token: RUN_FULL_ACCESS_REPOSITORY_ACTION
  max_output_bytes: 200000
  max_file_bytes: 10000000
  default_timeout_seconds: 300
  max_timeout_seconds: 3600
  allowed_import_roots:
    - /mnt/data
  allow_shell: true
  allow_write: true
  allow_delete: true
  allow_git_write: true

# Repository-relative Python scripts that may be executed by the MCP tool after
# the caller provides confirmation="RUN_APPROVED_REPOSITORY_SCRIPT".
approved_python_scripts:
  - scripts/merge_dukascopy_eurusd_m15_monthly.py
  - scripts/merge_dukascopy_quarterly_30m.py
  - scripts/prepare_dukascopy_30m_bid_ask_mid.py
  - scripts/prepare_dukascopy_ftmo_mid.py
  - src/experiments/runner.py
  - scripts/chatgpt_repo_write.py
