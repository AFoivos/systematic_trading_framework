execution:
  mode: data_only
  venue: kraken_spot_public
  symbol: BTC/USD
  depth: 100
  reconnect: true
  max_events: 50000
  quote_interval_ms: 500
  cancel_replace_interval_ms: 1000
  stale_order_book_ms: 3000
  allow_demo_orders: false

market_making:
  fair_price_model: microprice
  quote_placement_mode: join_top_of_book
  spread_model: volatility_adjusted
  base_spread_bps: 1
  min_spread_bps: 0.1
  max_spread_bps: 5
  volatility_window_seconds: 60
  inventory_skew_strength: 0.5
  order_size: 0.001
  max_inventory: 0.01
  tick_size: 0.5
  lot_size: 0.0001
  min_order_size: 0.0001
  min_notional: 5

fees:
  maker_fee_bps: 2
  taker_fee_bps: 5

risk:
  max_daily_loss: 50
  max_position_value: 500
  max_open_orders: 2
  max_order_size: 0.002
  kill_on_websocket_disconnect: true
  kill_on_stale_order_book: true
  kill_on_spread_widening: true
  max_allowed_spread_bps: 80

filters:
  use_adverse_selection_filter: true
  max_imbalance: 0.8
  min_imbalance: 0.2
  disable_on_high_volatility: true
  disable_on_strong_trend: true

logging:
  level: INFO
  save_events: true
  output_dir: reports/market_making

diagnostics:
  enabled: true
  make_plots: true
  make_report: true
  make_presentation: true
  language: el
  markout_horizons: [1, 5, 10, 30]
