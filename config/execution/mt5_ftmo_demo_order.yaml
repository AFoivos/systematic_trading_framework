execution:
  mode: demo_mt5
  mt5:
    login_env: MT5_LOGIN
    password_env: MT5_PASSWORD
    server_env: MT5_SERVER
    terminal_path: null
  timeframe: M30
  lookback_bars: 1000
  poll_seconds: 30
  deviation_points: 20
  magic_number: 260607
  comment: vwap_rms_alpha_ftmo_demo

strategy:
  config_path: config/experiments/ema_rms_ppo_vwap/best_long_only/vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST_all9_v2.yaml

symbols:
  XAUUSD:
    mt5_symbol: XAUUSD
    enabled: true
  SPX500:
    mt5_symbol: US500.cash
    enabled: true
  US100:
    mt5_symbol: US100.cash
    enabled: true
  US30:
    mt5_symbol: US30.cash
    enabled: true
  GER40:
    mt5_symbol: GER40.cash
    enabled: true
  BRENT:
    mt5_symbol: UKOIL.cash
    enabled: true
  ETHUSD:
    mt5_symbol: ETHUSD
    enabled: true
  NIKKEI225:
    mt5_symbol: JP225.cash
    enabled: true
  USOIL:
    mt5_symbol: USOIL.cash
    enabled: true
  BTCUSD:
    mt5_symbol: BTCUSD
    enabled: false

risk:
  risk_per_trade: 0.0025
  stop_loss_r: 3.0
  take_profit_r: 4.0
  volatility_col: null
  max_daily_loss_pct: 0.02
  max_total_drawdown_pct: 0.05
  max_positions: 3
  max_positions_per_symbol: 1
  max_symbol_exposure: null
  max_spread_points: 50
  # Per-symbol caps derived from the recent 300 M30 bars and rounded above p99.
  # The global value remains a conservative fallback for newly added symbols.
  max_spread_points_by_symbol:
    XAUUSD: 60
    SPX500: 70
    US100: 225
    US30: 320
    GER40: 400
    BRENT: 100
    ETHUSD: 80
    NIKKEI225: 2200
    USOIL: 100
  trading_hours_utc: null
  disable_weekend_trading: true
  allow_short: false
  demo_only: true

safety:
  dry_run_default: false
  require_demo_account: true
  kill_switch_path: STOP_TRADING

logging:
  output_dir: logs/mt5_demo
