base_config: config/experiments/ftmo_fx_intraday_regime_xgboost_v1.yaml

study:
  study_name: optuna_ftmo_fx_intraday_regime_xgboost_v2
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 11
  n_trials: 60
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_ftmo_fx_intraday_regime_xgboost_v2

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 1.0
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.50
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.10
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.07
      penalty: 5.0
      missing_penalty: 5.0
    - metric_path: evaluation.primary_summary.calmar
      op: lt
      threshold: 0.50
      penalty: 1.0
      missing_penalty: 1.0
    - metric_path: evaluation.primary_summary.profit_factor
      op: lt
      threshold: 1.10
      penalty: 1.25
      missing_penalty: 1.25
    - metric_path: evaluation.primary_summary.cost_to_gross_pnl
      op: gt
      threshold: 0.35
      penalty: 1.25
      missing_penalty: 0.75
    - metric_path: evaluation.primary_summary.total_turnover
      op: gt
      threshold: 150.0
      penalty: 1.0
      missing_penalty: 0.5
    - metric_path: derived.active_fold_count
      op: lt
      threshold: 6.0
      penalty: 2.0
      missing_penalty: 2.0
    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.60
      penalty: 4.0
      missing_penalty: 4.0
    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.80
      penalty: 1.5
      missing_penalty: 1.5
    - metric_path: derived.entry_count
      op: lt
      threshold: 20.0
      penalty: 5.0
      missing_penalty: 5.0
    - metric_path: derived.entry_count
      op: lt
      threshold: 50.0
      penalty: 1.5
      missing_penalty: 1.5
    - metric_path: derived.entry_count
      op: gt
      threshold: 800.0
      penalty: 1.5
      missing_penalty: 0.5

pruning:
  enabled: true
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [xgboost_clf]
  pruner: median
  n_startup_trials: 10
  n_warmup_steps: 2
  interval_steps: 1

search_space:
  - name: optuna_max_folds
    path: model.split.max_folds
    kind: categorical
    choices: [24]
  - name: experiment_run_name
    path: logging.run_name
    kind: categorical
    choices: [ftmo_fx_intraday_regime_xgboost_v2]
  - name: experiment_dataset_id
    path: data.storage.dataset_id
    kind: categorical
    choices: [ftmo_fx_intraday_regime_xgboost_v2]

  - name: tb_max_holding
    path: model.target.max_holding
    kind: categorical
    choices: [18, 24, 30, 36]
  - name: tb_upper_mult
    path: model.target.upper_mult
    kind: float
    low: 1.3
    high: 2.2
    step: 0.1
  - name: tb_lower_mult
    path: model.target.lower_mult
    kind: float
    low: 1.2
    high: 2.0
    step: 0.1

  - name: signal_upper
    path: signals.params.upper
    kind: float
    low: 0.56
    high: 0.62
    step: 0.01
  - name: signal_lower
    path: signals.params.lower
    kind: float
    low: 0.38
    high: 0.42
    step: 0.01
  - name: signal_clip
    path: signals.params.clip
    kind: categorical
    choices: [0.15, 0.20, 0.25]
  - name: signal_min_abs
    path: signals.params.min_signal_abs
    kind: categorical
    choices: [0.02, 0.03, 0.05]
  - name: activation_adx_min
    path: signals.params.activation_filters.2.value
    kind: categorical
    choices: [20.0, 22.0, 24.0, 26.0, 28.0]
  - name: activation_vol_ratio_min
    path: signals.params.activation_filters.3.value
    kind: float
    low: 0.65
    high: 0.85
    step: 0.05
  - name: activation_vol_ratio_max
    path: signals.params.activation_filters.4.value
    kind: float
    low: 1.40
    high: 1.80
    step: 0.10

  - name: dd_guard_max_drawdown
    path: risk.dd_guard.max_drawdown
    kind: categorical
    choices: [0.06, 0.07, 0.08]
  - name: dd_guard_rearm_drawdown
    path: risk.dd_guard.rearm_drawdown
    kind: categorical
    choices: [0.03, 0.04]
  - name: dd_guard_cooloff_bars
    path: risk.dd_guard.cooloff_bars
    kind: categorical
    choices: [72, 96, 120]
  - name: backtest_min_holding_bars
    path: backtest.min_holding_bars
    kind: categorical
    choices: [2, 3, 4, 6, 8]
  - name: risk_max_leverage
    path: risk.max_leverage
    kind: categorical
    choices: [0.25]

  - name: xgb_n_estimators
    path: model.params.n_estimators
    kind: int
    low: 150
    high: 350
    step: 50
  - name: xgb_learning_rate
    path: model.params.learning_rate
    kind: float
    low: 0.01
    high: 0.04
    log: true
  - name: xgb_max_depth
    path: model.params.max_depth
    kind: int
    low: 2
    high: 4
  - name: xgb_subsample
    path: model.params.subsample
    kind: float
    low: 0.6
    high: 0.9
    step: 0.1
  - name: xgb_colsample_bytree
    path: model.params.colsample_bytree
    kind: float
    low: 0.6
    high: 0.9
    step: 0.1
  - name: xgb_min_child_weight
    path: model.params.min_child_weight
    kind: float
    low: 5.0
    high: 15.0
    step: 1.0
