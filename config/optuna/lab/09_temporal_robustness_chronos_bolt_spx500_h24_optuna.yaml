base_config: config/lab/09_temporal_robustness_chronos_bolt_spx500_h24.yaml
study: {study_name: optuna_lab_09_temporal_robustness_chronos_bolt_spx500_h24, storage: null, load_if_exists: false, sampler: tpe, seed: 42, n_trials: 40, timeout: null, n_jobs: 1, logging_enabled: true, catch_exceptions: true}
report: {enabled: true, output_dir: logs/lab, run_name: optuna_lab_09_temporal_robustness_chronos_bolt_spx500_h24}
objective:
  metric_path: regression_metrics.correlation
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.5
  stability_metric_path: regression_metrics.correlation
  stability_std_penalty: 1.5
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
  - {metric_path: regression_metrics.evaluation_rows, op: lt, threshold: 1000.0, penalty: 5.0, missing_penalty: 5.0}
pruning: {enabled: false, metric_path: regression_metrics.correlation, direction: maximize, stage_filter: [chronos_bolt_forecaster], pruner: none, n_startup_trials: 5, n_warmup_steps: 1, interval_steps: 1}
search_space:
- name: horizon_bars
  path: model.target.horizon_bars
  paths: [model.params.prediction_length, model.split.purge_bars, model.split.embargo_bars, validation.purge_bars, validation.embargo_bars, backtest.min_holding_bars]
  kind: int
  low: 12
  high: 48
  step: 12
  value_templates:
  - {path: model.target.fwd_col, template: "target_future_return_h{horizon_bars}"}
  - {path: model.target.label_col, template: "target_future_return_h{horizon_bars}"}
- {name: test_size, path: model.split.test_size, paths: [model.split.step_size], kind: categorical, choices: [256, 512]}
- {name: lookback, path: model.params.lookback, kind: categorical, choices: [192, 384, 768]}
search_metadata: {intent: temporal_robustness, trade_objective: disabled}
