base_config: config/lab/10_forecast_diagnostics_only_timesfm_xauusd_h24.yaml
study: {study_name: optuna_lab_10_forecast_diagnostics_only_timesfm_xauusd_h24, storage: null, load_if_exists: false, sampler: tpe, seed: 42, n_trials: 40, timeout: null, n_jobs: 1, logging_enabled: true, catch_exceptions: true}
report: {enabled: true, output_dir: logs/lab, run_name: optuna_lab_10_forecast_diagnostics_only_timesfm_xauusd_h24}
objective:
  metric_path: regression_metrics.correlation
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: regression_metrics.correlation
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
  - {metric_path: regression_metrics.evaluation_rows, op: lt, threshold: 1000.0, penalty: 5.0, missing_penalty: 5.0}
pruning: {enabled: false, metric_path: regression_metrics.correlation, direction: maximize, stage_filter: [timesfm_2p5_200m_forecaster], pruner: none, n_startup_trials: 5, n_warmup_steps: 1, interval_steps: 1}
search_space:
- name: horizon_bars
  path: model.target.horizon_bars
  paths: [model.params.prediction_length, model.split.purge_bars, model.split.embargo_bars, validation.purge_bars, validation.embargo_bars, backtest.min_holding_bars]
  kind: int
  low: 12
  high: 32
  step: 4
  value_templates:
  - {path: model.target.fwd_col, template: "target_future_return_h{horizon_bars}"}
  - {path: model.target.label_col, template: "target_future_return_h{horizon_bars}"}
- {name: lookback, path: model.params.lookback, paths: [model.params.max_context], kind: categorical, choices: [256, 512, 768]}
- {name: diagnostic_quantiles, path: diagnostics.forecast.quantiles, kind: categorical, choices: [5, 10, 20]}
search_metadata: {intent: forecast_diagnostics_only, trade_objective: disabled}
