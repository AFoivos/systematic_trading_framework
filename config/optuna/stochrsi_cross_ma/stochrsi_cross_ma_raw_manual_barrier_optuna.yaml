base_config: config/experiments/stochrsi_cross_ma/stochrsi_cross_ma_raw_manual_barrier.yaml

study:
  study_name: optuna_stochrsi_cross_ma_raw_manual_barrier
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 100
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_stochrsi_cross_ma_raw_manual_barrier

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.90
      penalty: 5.0
      missing_penalty: 5.0
    - metric_path: derived.min_entries_per_week
      op: lt
      threshold: 1.0
      penalty: 3.0
      missing_penalty: 3.0
    - metric_path: derived.entry_count
      op: lt
      threshold: 500.0
      penalty: 3.0
      missing_penalty: 3.0
    - metric_path: evaluation.primary_summary.profit_factor
      op: lt
      threshold: 1.0
      penalty: 1.0
      missing_penalty: 0.25
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.35
      penalty: 2.0
      missing_penalty: 0.5

pruning:
  enabled: false
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 5
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: signal_oversold
    path: features.7.params.oversold
    kind: float
    low: 0.10
    high: 0.30
    step: 0.02
  - name: signal_overbought
    path: features.7.params.overbought
    kind: float
    low: 0.70
    high: 0.90
    step: 0.02
  - name: signal_max_bars_after_cross
    path: features.7.params.max_bars_after_cross
    kind: categorical
    choices: [120, 240, 480, 960, 999999]
  - name: signal_require_k_d_confirmation
    path: features.7.params.require_k_d_confirmation
    kind: bool
  - name: signal_require_price_above_slow_ema_for_long
    path: features.7.params.require_price_above_slow_ema_for_long
    kind: bool
  - name: signal_require_price_below_slow_ema_for_short
    path: features.7.params.require_price_below_slow_ema_for_short
    kind: bool
  - name: signal_use_first_pullback_only
    path: features.7.params.use_first_pullback_only
    kind: bool
  - name: backtest_take_profit_r
    path: backtest.take_profit_r
    kind: float
    low: 1.0
    high: 3.0
    step: 0.25
  - name: backtest_stop_loss_r
    path: backtest.stop_loss_r
    kind: float
    low: 0.75
    high: 2.0
    step: 0.25
  - name: backtest_risk_per_trade
    path: backtest.risk_per_trade
    kind: float
    low: 0.003
    high: 0.010
    step: 0.001
  - name: backtest_max_holding_bars
    path: backtest.max_holding_bars
    kind: categorical
    choices: [6, 8, 12, 16, 20, 24]

