base_config: config/experiments/others/btcusd_30m_shock_meta_xgboost_long_only_v1.yaml

study:
  study_name: optuna_btcusd_30m_shock_meta_xgboost_long_only_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 120
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_btcusd_30m_shock_meta_xgboost_long_only_v1

objective:
  metric_path: summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.0
  constraints:
    - {metric_path: summary.cumulative_return, op: le, threshold: 0.0, penalty: 100.0, missing_penalty: 100.0}
    - {metric_path: summary.max_drawdown, op: le, threshold: -0.20, penalty: 50.0, missing_penalty: 50.0}
    - {metric_path: summary.profit_factor, op: le, threshold: 1.05, penalty: 25.0, missing_penalty: 25.0}
    - {metric_path: summary.cost_to_gross_pnl, op: ge, threshold: 0.65, penalty: 10.0, missing_penalty: 10.0}

pruning:
  enabled: false
  metric_path: summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 10
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: shock_ret_z_threshold
    path: features.5.params.ret_z_threshold
    kind: float
    low: 1.75
    high: 3.25
    step: 0.25
  - name: shock_atr_mult_threshold
    path: features.5.params.atr_mult_threshold
    kind: float
    low: 1.0
    high: 2.5
    step: 0.25
  - name: shock_distance_threshold
    path: features.5.params.distance_from_mean_threshold
    kind: float
    low: 0.5
    high: 1.75
    step: 0.25
  - name: post_shock_active_bars
    path: features.5.params.post_shock_active_bars
    kind: categorical
    choices: [2, 4, 6, 8]
  - name: probability_upper
    path: signals.params.upper
    kind: float
    low: 0.50
    high: 0.65
    step: 0.01
  - name: target_upper_mult
    path: model.target.upper_mult
    kind: float
    low: 1.0
    high: 2.5
    step: 0.25
  - name: target_lower_mult
    path: model.target.lower_mult
    kind: float
    low: 0.75
    high: 2.0
    step: 0.25
  - name: target_max_holding
    path: model.target.max_holding
    kind: categorical
    choices: [24, 36, 48, 72]
  - name: xgb_n_estimators
    path: model.params.n_estimators
    kind: categorical
    choices: [150, 250, 350, 500]
  - name: xgb_learning_rate
    path: model.params.learning_rate
    kind: float
    low: 0.01
    high: 0.08
    log: true
  - name: xgb_max_depth
    path: model.params.max_depth
    kind: int
    low: 2
    high: 5
  - name: xgb_min_child_weight
    path: model.params.min_child_weight
    kind: categorical
    choices: [3.0, 5.0, 8.0, 12.0]

