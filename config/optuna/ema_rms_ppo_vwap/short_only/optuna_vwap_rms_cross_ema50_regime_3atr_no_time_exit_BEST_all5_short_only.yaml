base_config: config/experiments/ema_rms_ppo_vwap/short_only/vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST_all5_short_only.yaml
study:
  study_name: optuna_vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST_all5_short_only
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 100
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true
report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST_all5_short_only
objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
  - metric_path: evaluation.primary_summary.cumulative_return
    op: le
    threshold: 0.0
    penalty: 1000000000000.0
    missing_penalty: 1000000000000.0
  - metric_path: evaluation.primary_summary.max_drawdown
    op: lt
    threshold: -0.08
    penalty: 1000000000000.0
    missing_penalty: 1000000000000.0
  - metric_path: evaluation.primary_summary.profit_factor
    op: lt
    threshold: 1.0
    penalty: 5.0
    missing_penalty: 1.0
  - metric_path: evaluation.primary_summary.cost_to_gross_pnl
    op: gt
    threshold: 0.55
    penalty: 2.0
    missing_penalty: 1.0
  - metric_path: derived.entry_count
    op: lt
    threshold: 50.0
    penalty: 3.0
    missing_penalty: 3.0
  - metric_path: derived.entry_count
    op: gt
    threshold: 500.0
    penalty: 1.0
    missing_penalty: 1.0
pruning:
  enabled: false
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 5
  n_warmup_steps: 1
  interval_steps: 1
search_space:
- name: xauusd_signal_ppo_hist_min
  path: signals.params_by_asset.XAUUSD.ppo_hist_min
  kind: float
  low: 0.0
  high: 0.002
  step: 5.0e-05
- name: xauusd_profit_barrier_r
  path: backtest.asset_params.XAUUSD.profit_barrier_r
  kind: float
  low: 2.0
  high: 5.0
  step: 0.25
- name: xauusd_stop_barrier_r
  path: backtest.asset_params.XAUUSD.stop_barrier_r
  kind: float
  low: 1.0
  high: 3.5
  step: 0.25
