    - backtest.asset_params.SPX500.risk_per_trade
    - backtest.asset_params.US100.risk_per_trade
    - backtest.asset_params.GER40.risk_per_trade
    - backtest.asset_params.US30.risk_per_trade
    - backtest.asset_params.BRENT.risk_per_trade
    - backtest.asset_params.ETHUSD.risk_per_trade
    - backtest.asset_params.EURUSD.risk_per_trade
    - backtest.asset_params.NIKKEI225.risk_per_trade
    - backtest.asset_params.USOIL.risk_per_trade
    kind: float
    low: 0.0005
    high: 0.0040
    step: 0.00025
  - {name: max_cost_r, path: backtest.max_cost_r, kind: float, low: 0.10, high: 0.50, step: 0.05}
  - {name: max_open_trades, path: risk.portfolio_guard.max_open_trades, kind: int, low: 2, high: 7}
  - name: portfolio_gross_target
    path: portfolio.gross_target
    paths: [risk.max_leverage, portfolio.constraints.max_gross_leverage]
    kind: float
    low: 0.75
    high: 2.0
    step: 0.25
  - {name: equity_group_cap, path: portfolio.constraints.group_max_exposure.equity_indices, kind: float, low: 0.50, high: 1.50, step: 0.10}
