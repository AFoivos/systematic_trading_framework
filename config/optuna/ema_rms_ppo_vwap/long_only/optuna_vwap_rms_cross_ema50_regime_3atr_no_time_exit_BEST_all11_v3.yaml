  - {name: usoil_stop_barrier_r, path: backtest.asset_params.USOIL.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}

  - name: risk_per_trade
    path: backtest.asset_params.XAUUSD.risk_per_trade
    paths:
