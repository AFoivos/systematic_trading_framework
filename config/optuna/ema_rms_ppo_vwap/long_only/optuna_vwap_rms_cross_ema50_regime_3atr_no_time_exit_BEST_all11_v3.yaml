base_config: config/experiments/ema_rms_ppo_vwap/best_long_only/vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST_all11_v3.yaml

study:
  study_name: optuna_vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST_all11_v3
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 1500
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST_all11_v3

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.0
  stability_metric_path: null
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
  - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 100.0, missing_penalty: 100.0}
  - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.15, penalty: 50.0, missing_penalty: 50.0}
  - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 15.0, missing_penalty: 15.0}
  - {metric_path: evaluation.primary_summary.cost_to_gross_pnl, op: gt, threshold: 0.65, penalty: 12.0, missing_penalty: 12.0}
  - {metric_path: evaluation.primary_summary.gross_pnl, op: le, threshold: 0.0, penalty: 20.0, missing_penalty: 10.0}
  - {metric_path: derived.entry_count, op: lt, threshold: 150.0, penalty: 8.0, missing_penalty: 8.0}
  - {metric_path: derived.entry_count, op: gt, threshold: 5000.0, penalty: 5.0, missing_penalty: 2.0}
  - {metric_path: evaluation.primary_summary.robustness_cost_x2_profit_factor, op: lt, threshold: 1.0, penalty: 8.0, missing_penalty: 4.0}
  - {metric_path: evaluation.primary_summary.robustness_delay_1_bars_profit_factor, op: lt, threshold: 1.0, penalty: 5.0, missing_penalty: 3.0}

pruning:
  enabled: false
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 50
  n_warmup_steps: 2
  interval_steps: 1

search_space:
  - {name: xauusd_ppo_hist_min, path: signals.params_by_asset.XAUUSD.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: xagusd_ppo_hist_min, path: signals.params_by_asset.XAGUSD.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: spx500_ppo_hist_min, path: signals.params_by_asset.SPX500.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: us100_ppo_hist_min, path: signals.params_by_asset.US100.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: ger40_ppo_hist_min, path: signals.params_by_asset.GER40.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: us30_ppo_hist_min, path: signals.params_by_asset.US30.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: brent_ppo_hist_min, path: signals.params_by_asset.BRENT.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: ethusd_ppo_hist_min, path: signals.params_by_asset.ETHUSD.ppo_hist_min, kind: float, low: 0.0, high: 0.0040, step: 0.00005}
  - {name: eurusd_ppo_hist_min, path: signals.params_by_asset.EURUSD.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: nikkei225_ppo_hist_min, path: signals.params_by_asset.NIKKEI225.ppo_hist_min, kind: float, low: 0.0, high: 0.0025, step: 0.00005}
  - {name: usoil_ppo_hist_min, path: signals.params_by_asset.USOIL.ppo_hist_min, kind: float, low: 0.0, high: 0.0030, step: 0.00005}

  - {name: xauusd_profit_barrier_r, path: backtest.asset_params.XAUUSD.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
  - {name: xauusd_stop_barrier_r, path: backtest.asset_params.XAUUSD.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}
  - {name: xagusd_profit_barrier_r, path: backtest.asset_params.XAGUSD.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
  - {name: xagusd_stop_barrier_r, path: backtest.asset_params.XAGUSD.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}
  - {name: spx500_profit_barrier_r, path: backtest.asset_params.SPX500.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
  - {name: spx500_stop_barrier_r, path: backtest.asset_params.SPX500.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}
  - {name: us100_profit_barrier_r, path: backtest.asset_params.US100.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
  - {name: us100_stop_barrier_r, path: backtest.asset_params.US100.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}
  - {name: ger40_profit_barrier_r, path: backtest.asset_params.GER40.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
  - {name: ger40_stop_barrier_r, path: backtest.asset_params.GER40.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}
  - {name: us30_profit_barrier_r, path: backtest.asset_params.US30.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
  - {name: us30_stop_barrier_r, path: backtest.asset_params.US30.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}
  - {name: brent_profit_barrier_r, path: backtest.asset_params.BRENT.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
  - {name: brent_stop_barrier_r, path: backtest.asset_params.BRENT.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}
  - {name: ethusd_profit_barrier_r, path: backtest.asset_params.ETHUSD.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
  - {name: ethusd_stop_barrier_r, path: backtest.asset_params.ETHUSD.stop_barrier_r, kind: float, low: 0.75, high: 3.5, step: 0.25}
  - {name: eurusd_profit_barrier_r, path: backtest.asset_params.EURUSD.profit_barrier_r, kind: float, low: 1.5, high: 5.0, step: 0.25}
