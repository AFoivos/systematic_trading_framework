base_config: config/experiments/roc_long_only/xauusd_roc_long_only_manual_barrier.yaml

study:
  study_name: optuna_roc_long_only_xauusd_manual_barrier
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 30
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_roc_long_only_xauusd_manual_barrier

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.0
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - metric_path: evaluation.primary_summary.cumulative_return
      op: le
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.08
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: derived.entry_count
      op: lt
      threshold: 30.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.20
      penalty: 10.0
      missing_penalty: 10.0
    - metric_path: evaluation.primary_summary.cost_to_gross_pnl
      op: gt
      threshold: 0.60
      penalty: 5.0
      missing_penalty: 2.0

pruning:
  enabled: false
  metric_path: metrics.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 5
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: target_r_min
    path: model.target.target_r_min
    kind: float
    low: 0.5
    high: 1.5
    step: 0.1

  - name: take_profit_r
    path: backtest.take_profit_r
    kind: float
    low: 1.2
    high: 3.2
    step: 0.1

  - name: stop_loss_r
    path: backtest.stop_loss_r
    kind: float
    low: 0.8
    high: 1.5
    step: 0.1

  - name: max_holding_bars
    path: backtest.max_holding_bars
    kind: int
    low: 4
    high: 12
    step: 1

  - name: tie_break
    path: model.target.tie_break
    kind: categorical
    choices: [conservative, closest_to_open]
  
  - name: signal_roc_min
    path: signals.params.roc_min
    kind: float
    low: -0.001
    high: 0.006
    step: 0.0005

  - name: signal_close_z_min
    path: signals.params.close_z_min
    kind: float
    low: -0.6
    high: 0.8
    step: 0.1

  - name: signal_close_z_max
    path: signals.params.close_z_max
    kind: float
    low: 1.0
    high: 2.8
    step: 0.1

  - name: signal_min_score_required
    path: signals.params.min_score_required
    kind: int
    low: 5
    high: 8

  - name: signal_vol_adjustment_strength
    path: signals.params.vol_adjustment_strength
    kind: float
    low: 0.0
    high: 2.0
    step: 0.1
