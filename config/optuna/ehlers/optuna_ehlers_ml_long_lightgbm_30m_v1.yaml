base_config: config/experiments/ehlers/ehlers_ml_long_lightgbm_30m_v1.yaml

study:
  study_name: optuna_ehlers_ml_long_lightgbm_30m_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 120
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report: {enabled: true, output_dir: logs/experiments, run_name: optuna_ehlers_ml_long_lightgbm_30m_v1}

objective:
  metric_path: summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  constraints:
    - {metric_path: summary.cumulative_return, op: le, threshold: 0.0, penalty: 100.0, missing_penalty: 100.0}
    - {metric_path: summary.max_drawdown, op: lt, threshold: -0.10, penalty: 50.0, missing_penalty: 50.0}
    - {metric_path: summary.profit_factor, op: le, threshold: 1.10, penalty: 20.0, missing_penalty: 20.0}
    - {metric_path: summary.trade_count, op: lt, threshold: 150.0, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: summary.trade_count, op: gt, threshold: 4000.0, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: summary.cost_to_gross_pnl, op: ge, threshold: 0.65, penalty: 15.0, missing_penalty: 15.0}
    - {metric_path: summary.robustness_cost_x2_profit_factor, op: le, threshold: 1.0, penalty: 10.0, missing_penalty: 0.0}
    - {metric_path: summary.robustness_cost_x3_max_drawdown, op: lt, threshold: -0.10, penalty: 25.0, missing_penalty: 0.0}
    - {metric_path: summary.robustness_delay_1_bars_profit_factor, op: le, threshold: 1.0, penalty: 10.0, missing_penalty: 0.0}

pruning: {enabled: false, metric_path: classification_metrics.roc_auc, direction: maximize, stage_filter: [lightgbm_clf], pruner: none, n_startup_trials: 20, n_warmup_steps: 2, interval_steps: 1}

search_space:
  - {name: probability_threshold, path: signals.params.threshold, kind: float, low: 0.45, high: 0.70, step: 0.01}
  - {name: take_profit_r, path: model.target.upper_mult, paths: [signals.params.profit_barrier_r, backtest.profit_barrier_r], kind: float, low: 1.25, high: 3.50, step: 0.25}
  - {name: stop_loss_r, path: model.target.lower_mult, paths: [signals.params.stop_barrier_r, backtest.stop_barrier_r], kind: float, low: 0.75, high: 2.00, step: 0.25}
  - {name: max_holding_bars, path: model.target.max_holding, paths: [model.split.purge_bars, model.split.embargo_bars, backtest.vertical_barrier_bars], kind: categorical, choices: [6, 8, 10, 12, 16]}
  - {name: amplitude_lookback, path: features.22.params.amplitude_lookback, kind: categorical, choices: [64, 96, 128, 192, 252]}
  - {name: amplitude_min_quantile, path: features.22.params.amplitude_min_quantile, kind: float, low: 0.30, high: 0.70, step: 0.05}
  - {name: min_cycle_period, path: features.22.params.min_cycle_period, kind: categorical, choices: [6, 8, 10, 12]}
  - {name: max_cycle_period, path: features.22.params.max_cycle_period, kind: categorical, choices: [36, 48, 60, 72]}
  - {name: laguerre_rsi_gamma, path: features.19.params.gamma, kind: float, low: 0.20, high: 0.80, step: 0.05}
  - {name: roofing_high_pass_period, path: features.7.params.high_pass_period, kind: categorical, choices: [32, 40, 48, 64]}
  - {name: roofing_low_pass_period, path: features.7.params.low_pass_period, kind: categorical, choices: [8, 10, 12, 16]}
  - {name: lgbm_n_estimators, path: model.params.n_estimators, kind: int, low: 150, high: 800, step: 50}
  - {name: lgbm_learning_rate, path: model.params.learning_rate, kind: float, low: 0.005, high: 0.10, log: true}
  - {name: lgbm_num_leaves, path: model.params.num_leaves, kind: categorical, choices: [7, 15, 31, 63]}
  - {name: lgbm_max_depth, path: model.params.max_depth, kind: categorical, choices: [-1, 3, 4, 5, 6]}
  - {name: lgbm_min_child_samples, path: model.params.min_child_samples, kind: int, low: 20, high: 160, step: 10}
  - {name: lgbm_subsample, path: model.params.subsample, kind: float, low: 0.60, high: 1.00, step: 0.05}
  - {name: lgbm_colsample_bytree, path: model.params.colsample_bytree, kind: float, low: 0.50, high: 1.00, step: 0.05}
  - {name: lgbm_reg_lambda, path: model.params.reg_lambda, kind: float, low: 0.001, high: 100.0, log: true}
  - {name: lgbm_reg_alpha, path: model.params.reg_alpha, kind: float, low: 0.001, high: 10.0, log: true}
  - {name: class_weight, path: model.params.class_weight, kind: categorical, choices: [null, balanced]}

