base_config: config/experiments/ehlers/xauusd_us100_30m_ehlers_cycle_xgboost_meta_v1.yaml

study:
  study_name: optuna_xauusd_us100_30m_ehlers_cycle_xgboost_meta_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 240
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_xauusd_us100_30m_ehlers_cycle_xgboost_meta_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.30
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 25.0, missing_penalty: 25.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.15, penalty: 15.0, missing_penalty: 15.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 6.0, missing_penalty: 6.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 100.0, penalty: 8.0, missing_penalty: 8.0}

pruning:
  enabled: false
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [xgboost_clf]
  pruner: none
  n_startup_trials: 20
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - {name: probability_threshold, path: signals.params.threshold, kind: float, low: 0.48, high: 0.72, step: 0.02}
  - {name: amplitude_min_quantile, path: features.16.params.amplitude_min_quantile, kind: float, low: 0.20, high: 0.60, step: 0.05}
  - {name: atr_min_quantile, path: features.16.params.atr_min_quantile, kind: float, low: 0.20, high: 0.60, step: 0.05}
  - name: profit_barrier_r
    path: model.target.profit_barrier_r
    paths: [signals.params.profit_barrier_r, backtest.profit_barrier_r]
    kind: float
    low: 1.00
    high: 3.00
    step: 0.25
  - name: stop_barrier_r
    path: model.target.stop_barrier_r
    paths: [signals.params.stop_barrier_r, backtest.stop_barrier_r]
    kind: float
    low: 0.75
    high: 2.00
    step: 0.25
  - name: vertical_barrier_bars
    path: model.target.vertical_barrier_bars
    paths: [backtest.vertical_barrier_bars, model.split.purge_bars, model.split.embargo_bars]
    kind: categorical
    choices: [4, 6, 8, 12, 16]
  - {name: xgb_n_estimators, path: model.params.n_estimators, kind: int, low: 150, high: 700, step: 50}
  - {name: xgb_learning_rate, path: model.params.learning_rate, kind: float, low: 0.005, high: 0.10, log: true}
  - {name: xgb_max_depth, path: model.params.max_depth, kind: int, low: 2, high: 6}
  - {name: xgb_min_child_weight, path: model.params.min_child_weight, kind: float, low: 1.0, high: 20.0, log: true}
  - {name: xgb_subsample, path: model.params.subsample, kind: float, low: 0.55, high: 1.00, step: 0.05}
  - {name: xgb_colsample_bytree, path: model.params.colsample_bytree, kind: float, low: 0.50, high: 1.00, step: 0.05}
  - {name: xgb_reg_lambda, path: model.params.reg_lambda, kind: float, low: 0.0001, high: 50.0, log: true}
  - {name: xgb_reg_alpha, path: model.params.reg_alpha, kind: float, low: 0.0001, high: 10.0, log: true}
  - {name: xgb_scale_pos_weight, path: model.params.scale_pos_weight, kind: categorical, choices: [0.75, 1.0, 1.5, 2.0, 3.0]}
  - {name: risk_per_trade, path: backtest.risk_per_trade, kind: float, low: 0.001, high: 0.006, step: 0.0005}
