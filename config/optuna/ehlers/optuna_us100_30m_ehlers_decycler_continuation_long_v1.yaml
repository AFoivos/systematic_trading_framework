base_config: config/experiments/ehlers/us100_30m_ehlers_decycler_continuation_long_v1.yaml

study:
  study_name: optuna_us100_30m_ehlers_decycler_continuation_long_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 160
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_us100_30m_ehlers_decycler_continuation_long_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 12.0, missing_penalty: 12.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.12, penalty: 8.0, missing_penalty: 8.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 4.0, missing_penalty: 4.0}
    - {metric_path: evaluation.primary_summary.cost_to_gross_pnl, op: gt, threshold: 0.50, penalty: 4.0, missing_penalty: 2.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 150.0, penalty: 4.0, missing_penalty: 4.0}

pruning:
  enabled: false
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 10
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - {name: decycler_osc_min, path: signals.params.decycler_osc_min, kind: float, low: 0.30, high: 0.60, step: 0.01}
  - {name: decycler_ratio_max, path: signals.params.decycler_ratio_max, kind: float, low: 0.9920, high: 0.9955, step: 0.0005}
  - {name: supersmoother_period, path: features.1.params.period, kind: categorical, choices: [8, 10, 12, 16]}
  - {name: roofing_high_pass_period, path: features.2.params.high_pass_period, kind: categorical, choices: [40, 48, 64]}
  - {name: roofing_low_pass_period, path: features.2.params.low_pass_period, kind: categorical, choices: [8, 10, 12]}
  - {name: hilbert_window, path: features.3.params.window, kind: categorical, choices: [48, 64, 96]}
  - {name: decycler_period, path: features.6.params.period, kind: categorical, choices: [48, 60, 72]}
  - {name: decycler_fast_period, path: features.7.params.fast_period, kind: categorical, choices: [20, 30, 40]}
  - {name: decycler_slow_period, path: features.7.params.slow_period, kind: categorical, choices: [48, 60, 72, 96]}
  - {name: take_profit_r, path: backtest.take_profit_r, kind: categorical, choices: [2.0, 2.5, 3.0, 3.5, 4.0]}
  - {name: stop_loss_r, path: backtest.stop_loss_r, kind: categorical, choices: [1.25, 1.5, 2.0, 2.5]}
  - {name: max_holding_bars, path: backtest.max_holding_bars, kind: categorical, choices: [8, 12, 16, 20, 24]}
  - {name: risk_per_trade, path: backtest.risk_per_trade, kind: float, low: 0.001, high: 0.006, step: 0.0005}

