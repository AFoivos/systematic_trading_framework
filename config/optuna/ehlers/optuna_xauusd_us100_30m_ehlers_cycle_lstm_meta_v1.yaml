base_config: config/experiments/ehlers/xauusd_us100_30m_ehlers_cycle_lstm_meta_v1.yaml

study:
  study_name: optuna_xauusd_us100_30m_ehlers_cycle_lstm_meta_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 180
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_xauusd_us100_30m_ehlers_cycle_lstm_meta_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.30
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 25.0, missing_penalty: 25.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.15, penalty: 15.0, missing_penalty: 15.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 6.0, missing_penalty: 6.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 100.0, penalty: 8.0, missing_penalty: 8.0}

pruning:
  enabled: false
  metric_path: regression_metrics.spearman
  direction: maximize
  stage_filter: [lstm_forecaster]
  pruner: none
  n_startup_trials: 20
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - {name: probability_threshold, path: signals.params.threshold, kind: float, low: 0.48, high: 0.72, step: 0.02}
  - {name: amplitude_min_quantile, path: features.16.params.amplitude_min_quantile, kind: float, low: 0.20, high: 0.60, step: 0.05}
  - {name: atr_min_quantile, path: features.16.params.atr_min_quantile, kind: float, low: 0.20, high: 0.60, step: 0.05}
  - name: upper_mult
    path: model.target.upper_mult
    paths: [signals.params.profit_barrier_r, backtest.profit_barrier_r]
    kind: float
    low: 1.00
    high: 3.00
    step: 0.25
  - name: lower_mult
    path: model.target.lower_mult
    paths: [signals.params.stop_barrier_r, backtest.stop_barrier_r]
    kind: float
    low: 0.75
    high: 2.00
    step: 0.25
  - name: max_holding
    path: model.target.max_holding
    paths: [backtest.vertical_barrier_bars, model.split.purge_bars, model.split.embargo_bars]
    kind: categorical
    choices: [4, 6, 8, 12, 16]
  - {name: lstm_lookback, path: model.params.lookback, kind: categorical, choices: [32, 48, 64, 96, 128]}
  - {name: lstm_hidden_dim, path: model.params.hidden_dim, kind: categorical, choices: [32, 64, 96, 128]}
  - {name: lstm_num_layers, path: model.params.num_layers, kind: int, low: 1, high: 3}
  - {name: lstm_dropout, path: model.params.dropout, kind: float, low: 0.0, high: 0.40, step: 0.05}
  - {name: lstm_epochs, path: model.params.epochs, kind: categorical, choices: [8, 12, 16, 24]}
  - {name: lstm_batch_size, path: model.params.batch_size, kind: categorical, choices: [128, 256, 512]}
  - {name: lstm_learning_rate, path: model.params.learning_rate, kind: float, low: 0.00005, high: 0.005, log: true}
  - {name: lstm_weight_decay, path: model.params.weight_decay, kind: float, low: 0.000001, high: 0.01, log: true}
  - {name: risk_per_trade, path: backtest.risk_per_trade, kind: float, low: 0.001, high: 0.006, step: 0.0005}
