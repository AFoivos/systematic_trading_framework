base_config: config/experiments/spx500_30m_ehlers_semiscalp_lightgbm_meta_v1.yaml

study:
  study_name: optuna_spx500_30m_ehlers_semiscalp_lightgbm_meta_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 120
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_spx500_30m_ehlers_semiscalp_lightgbm_meta_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.10, penalty: 5.0, missing_penalty: 5.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 2.0, missing_penalty: 2.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 100.0, penalty: 4.0, missing_penalty: 4.0}
    - {metric_path: evaluation.primary_summary.robustness_cost_x2_profit_factor, op: lt, threshold: 1.0, penalty: 2.0, missing_penalty: 2.0}

pruning:
  enabled: false
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [lightgbm_clf]
  pruner: none
  n_startup_trials: 10
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - {name: probability_threshold, path: signals.params.threshold, kind: float, low: 0.40, high: 0.70, step: 0.02}
  - {name: lgbm_n_estimators, path: model.params.n_estimators, kind: int, low: 150, high: 500, step: 50}
  - {name: lgbm_learning_rate, path: model.params.learning_rate, kind: float, low: 0.01, high: 0.08, log: true}
  - {name: lgbm_num_leaves, path: model.params.num_leaves, kind: categorical, choices: [7, 15, 31]}
  - {name: lgbm_max_depth, path: model.params.max_depth, kind: categorical, choices: [-1, 3, 4, 5]}
  - {name: lgbm_min_child_samples, path: model.params.min_child_samples, kind: categorical, choices: [20, 40, 80]}
  - {name: lgbm_subsample, path: model.params.subsample, kind: float, low: 0.60, high: 1.00, step: 0.10}
  - {name: lgbm_colsample_bytree, path: model.params.colsample_bytree, kind: float, low: 0.60, high: 1.00, step: 0.10}
  - {name: lgbm_reg_lambda, path: model.params.reg_lambda, kind: categorical, choices: [1.0, 2.0, 5.0, 10.0]}
  - {name: lgbm_reg_alpha, path: model.params.reg_alpha, kind: categorical, choices: [0.0, 0.05, 0.10, 0.50]}
  - {name: lgbm_class_weight, path: model.params.class_weight, kind: categorical, choices: [null, balanced]}


