base_config: config/experiments/ehlers/all_assets_30m_ehlers_semiscalp_lightgbm_meta_v2.yaml

study:
  study_name: optuna_all_assets_30m_ehlers_semiscalp_lightgbm_meta_v2
  storage: sqlite:///logs/optuna/all_assets_30m_ehlers_semiscalp_lightgbm_meta_v2.db
  load_if_exists: true
  sampler: tpe
  seed: 7
  n_trials: 1200
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_all_assets_30m_ehlers_semiscalp_lightgbm_meta_v2

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.35
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 100.0, missing_penalty: 100.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.15, penalty: 50.0, missing_penalty: 50.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 15.0, missing_penalty: 15.0}
    - {metric_path: evaluation.primary_summary.cost_to_gross_pnl, op: gt, threshold: 0.65, penalty: 12.0, missing_penalty: 12.0}
    - {metric_path: evaluation.primary_summary.gross_pnl, op: le, threshold: 0.0, penalty: 20.0, missing_penalty: 10.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 300.0, penalty: 8.0, missing_penalty: 8.0}
    - {metric_path: derived.entry_count, op: gt, threshold: 6000.0, penalty: 5.0, missing_penalty: 2.0}
    - {metric_path: evaluation.primary_summary.robustness_cost_x2_profit_factor, op: lt, threshold: 1.0, penalty: 8.0, missing_penalty: 4.0}
    - {metric_path: evaluation.primary_summary.robustness_delay_1_bars_profit_factor, op: lt, threshold: 1.0, penalty: 5.0, missing_penalty: 3.0}

pruning:
  enabled: false
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [lightgbm_clf]
  pruner: none
  n_startup_trials: 50
  n_warmup_steps: 2
  interval_steps: 1

search_space:
  - name: supersmoother_period
    path: features.2.params.period
    kind: categorical
    choices: [6, 8, 10, 12, 16, 20]
  - name: supersmoother_slope_window
    path: features.3.params.transforms.0.window
    kind: categorical
    choices: [2, 3, 4, 6]
  - name: roofing_high_pass_period
    path: features.4.params.high_pass_period
    kind: categorical
    choices: [32, 40, 48, 64, 80, 96]
  - name: roofing_low_pass_period
    path: features.4.params.low_pass_period
    kind: categorical
    choices: [6, 8, 10, 12, 16]
  - name: roofing_slope_bars
    path: features.4.params.slope_bars
    kind: categorical
    choices: [1, 2, 3, 4]
  - name: hilbert_window
    path: features.5.params.window
    kind: categorical
    choices: [32, 48, 64, 80, 96, 128]
  - name: min_cycle_period
    path: features.22.params.min_cycle_period
    kind: float
    low: 6.0
    high: 16.0
    step: 2.0
  - name: max_cycle_period
    path: features.22.params.max_cycle_period
    kind: float
    low: 36.0
    high: 72.0
    step: 6.0
  - name: amplitude_lookback
    path: features.22.params.amplitude_quantile_lookback
    paths: [features.20.params.transforms.5.window]
    kind: categorical
    choices: [96, 168, 252, 384, 504]
  - name: amplitude_min_quantile
    path: features.22.params.amplitude_min_quantile
    kind: float
    low: 0.10
    high: 0.70
    step: 0.05
  - name: atr_lookback
    path: features.22.params.atr_quantile_lookback
    paths: [features.20.params.transforms.6.window]
    kind: categorical
    choices: [96, 168, 252, 384, 504]
  - name: atr_min_quantile
    path: features.22.params.atr_min_quantile
    kind: float
    low: 0.10
    high: 0.70
    step: 0.05
  - name: target_r_min
    path: model.target.target_r_min
    kind: float
    low: 0.10
    high: 0.75
    step: 0.05
  - name: profit_barrier_atr
    path: model.target.take_profit_r
    paths: [backtest.profit_barrier_r]
    kind: float
    low: 1.50
    high: 4.00
    step: 0.25
  - name: stop_barrier_atr
    path: model.target.stop_loss_r
    paths: [backtest.stop_barrier_r]
    kind: float
    low: 0.75
    high: 2.00
    step: 0.25
  - name: holding_bars
    path: model.target.max_holding_bars
    paths: [model.split.purge_bars, model.split.embargo_bars, backtest.vertical_barrier_bars]
    kind: categorical
    choices: [4, 6, 8, 10, 12, 16]
  - name: probability_threshold
    path: signals.params.threshold
    kind: float
    low: 0.50
    high: 0.75
    step: 0.01
  - name: risk_per_trade
    path: backtest.risk_per_trade
    kind: float
    low: 0.0005
    high: 0.0030
    step: 0.00025
  - name: max_open_trades
    path: risk.portfolio_guard.max_open_trades
    kind: int
    low: 2
    high: 7
  - name: lgbm_n_estimators
    path: model.params.n_estimators
    kind: int
    low: 150
    high: 1200
    step: 50
  - name: lgbm_learning_rate
    path: model.params.learning_rate
    kind: float
    low: 0.005
    high: 0.15
    log: true
  - name: lgbm_num_leaves
    path: model.params.num_leaves
    kind: categorical
    choices: [7, 15, 31, 63, 127]
  - name: lgbm_max_depth
    path: model.params.max_depth
    kind: categorical
    choices: [-1, 3, 4, 5, 6, 8, 10]
  - name: lgbm_min_child_samples
    path: model.params.min_child_samples
    kind: int
    low: 10
    high: 160
    step: 10
  - name: lgbm_subsample
    path: model.params.subsample
    kind: float
    low: 0.50
    high: 1.00
    step: 0.05
  - name: lgbm_colsample_bytree
    path: model.params.colsample_bytree
    kind: float
    low: 0.40
    high: 1.00
    step: 0.05
  - name: lgbm_reg_lambda
    path: model.params.reg_lambda
    kind: float
    low: 0.0001
    high: 100.0
    log: true
  - name: lgbm_reg_alpha
    path: model.params.reg_alpha
    kind: float
    low: 0.0001
    high: 10.0
    log: true
  - name: lgbm_class_weight
    path: model.params.class_weight
    kind: categorical
    choices: [null, balanced]
