base_config: config/experiments/ehlers/us100_30m_ehlers_decycler_continuation_xgboost_meta_v1.yaml

study:
  study_name: optuna_us100_30m_ehlers_decycler_continuation_xgboost_meta_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 240
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_us100_30m_ehlers_decycler_continuation_xgboost_meta_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.30
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 20.0, missing_penalty: 20.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.12, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 5.0, missing_penalty: 5.0}
    - {metric_path: evaluation.primary_summary.cost_to_gross_pnl, op: gt, threshold: 0.50, penalty: 5.0, missing_penalty: 2.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 100.0, penalty: 8.0, missing_penalty: 8.0}

pruning:
  enabled: false
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [xgboost_clf]
  pruner: none
  n_startup_trials: 20
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - {name: probability_threshold, path: signals.params.threshold, kind: float, low: 0.50, high: 0.70, step: 0.02}
  - {name: decycler_osc_min, path: features.14.params.decycler_osc_min, kind: float, low: 0.30, high: 0.60, step: 0.01}
  - {name: decycler_ratio_max, path: features.14.params.decycler_ratio_max, kind: float, low: 0.9920, high: 0.9955, step: 0.0005}
  - name: profit_barrier_r
    path: model.target.profit_barrier_r
    paths: [signals.params.profit_barrier_r, backtest.take_profit_r]
    kind: categorical
    choices: [2.0, 2.5, 3.0, 3.5, 4.0]
  - name: stop_barrier_r
    path: model.target.stop_barrier_r
    paths: [signals.params.stop_barrier_r, backtest.stop_loss_r]
    kind: categorical
    choices: [1.25, 1.5, 2.0, 2.5]
  - name: vertical_barrier_bars
    path: model.target.vertical_barrier_bars
    paths: [backtest.max_holding_bars, model.split.purge_bars, model.split.embargo_bars]
    kind: categorical
    choices: [8, 12, 16, 20, 24]
  - {name: xgb_n_estimators, path: model.params.n_estimators, kind: int, low: 150, high: 700, step: 50}
  - {name: xgb_learning_rate, path: model.params.learning_rate, kind: float, low: 0.005, high: 0.10, log: true}
  - {name: xgb_max_depth, path: model.params.max_depth, kind: int, low: 2, high: 5}
  - {name: xgb_min_child_weight, path: model.params.min_child_weight, kind: float, low: 1.0, high: 20.0, log: true}
  - {name: xgb_subsample, path: model.params.subsample, kind: float, low: 0.55, high: 1.00, step: 0.05}
  - {name: xgb_colsample_bytree, path: model.params.colsample_bytree, kind: float, low: 0.50, high: 1.00, step: 0.05}
  - {name: xgb_reg_lambda, path: model.params.reg_lambda, kind: float, low: 0.0001, high: 50.0, log: true}
  - {name: xgb_reg_alpha, path: model.params.reg_alpha, kind: float, low: 0.0001, high: 10.0, log: true}
  - {name: xgb_scale_pos_weight, path: model.params.scale_pos_weight, kind: categorical, choices: [0.75, 1.0, 1.5, 2.0, 3.0]}
  - {name: risk_per_trade, path: backtest.risk_per_trade, kind: float, low: 0.001, high: 0.006, step: 0.0005}

