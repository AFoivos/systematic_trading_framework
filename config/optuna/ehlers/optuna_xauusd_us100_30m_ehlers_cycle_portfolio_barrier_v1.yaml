base_config: config/experiments/ehlers/xauusd_us100_30m_ehlers_cycle_portfolio_barrier_v1.yaml

study:
  study_name: optuna_xauusd_us100_30m_ehlers_cycle_portfolio_barrier_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 160
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_xauusd_us100_30m_ehlers_cycle_portfolio_barrier_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 20.0, missing_penalty: 20.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.15, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 5.0, missing_penalty: 5.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 100.0, penalty: 6.0, missing_penalty: 6.0}

pruning: {enabled: false, metric_path: evaluation.primary_summary.sharpe, direction: maximize, stage_filter: [], pruner: none, n_startup_trials: 10, n_warmup_steps: 1, interval_steps: 1}

search_space:
  - {name: amplitude_min_quantile, path: signals.params.amplitude_min_quantile, kind: float, low: 0.20, high: 0.60, step: 0.05}
  - {name: atr_min_quantile, path: signals.params.atr_min_quantile, kind: float, low: 0.20, high: 0.60, step: 0.05}
  - {name: min_cycle_period, path: signals.params.min_cycle_period, kind: float, low: 8.0, high: 16.0, step: 1.0}
  - {name: max_cycle_period, path: signals.params.max_cycle_period, kind: float, low: 36.0, high: 60.0, step: 2.0}
  - {name: profit_barrier_r, path: backtest.profit_barrier_r, kind: float, low: 1.00, high: 3.00, step: 0.25}
  - {name: stop_barrier_r, path: backtest.stop_barrier_r, kind: float, low: 0.75, high: 2.00, step: 0.25}
  - {name: vertical_barrier_bars, path: backtest.vertical_barrier_bars, kind: categorical, choices: [4, 6, 8, 12, 16]}
  - {name: risk_per_trade, path: backtest.risk_per_trade, kind: float, low: 0.001, high: 0.006, step: 0.0005}
  - {name: portfolio_gross_target, path: portfolio.gross_target, paths: [risk.max_leverage, portfolio.constraints.max_gross_leverage], kind: float, low: 0.50, high: 1.50, step: 0.25}
