base_config: config/experiments/spx500_30m_ehlers_semiscalp_logistic_meta_v1.yaml

study:
  study_name: optuna_spx500_30m_ehlers_semiscalp_logistic_meta_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 60
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_spx500_30m_ehlers_semiscalp_logistic_meta_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.10, penalty: 5.0, missing_penalty: 5.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 2.0, missing_penalty: 2.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 100.0, penalty: 4.0, missing_penalty: 4.0}
    - {metric_path: evaluation.primary_summary.robustness_cost_x2_profit_factor, op: lt, threshold: 1.0, penalty: 2.0, missing_penalty: 2.0}

pruning:
  enabled: false
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [logistic_regression_clf]
  pruner: none
  n_startup_trials: 10
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: probability_threshold
    path: signals.params.threshold
    kind: float
    low: 0.40
    high: 0.70
    step: 0.02
  - name: logistic_c
    path: model.params.C
    kind: float
    low: 0.001
    high: 100.0
    log: true
  - name: logistic_class_weight
    path: model.params.class_weight
    kind: categorical
    choices: [null, balanced]

