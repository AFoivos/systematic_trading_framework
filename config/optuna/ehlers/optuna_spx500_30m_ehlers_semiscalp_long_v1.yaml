base_config: config/experiments/spx500_30m_ehlers_semiscalp_long_v1.yaml

study:
  study_name: optuna_spx500_30m_ehlers_semiscalp_long_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 120
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_spx500_30m_ehlers_semiscalp_long_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.10, penalty: 5.0, missing_penalty: 5.0}
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.0, penalty: 2.0, missing_penalty: 2.0}
    - {metric_path: evaluation.primary_summary.cost_to_gross_pnl, op: gt, threshold: 0.50, penalty: 2.0, missing_penalty: 1.0}
    - {metric_path: derived.entry_count, op: lt, threshold: 150.0, penalty: 3.0, missing_penalty: 3.0}
    - {metric_path: evaluation.primary_summary.robustness_cost_x2_profit_factor, op: lt, threshold: 1.0, penalty: 2.0, missing_penalty: 2.0}

pruning:
  enabled: false
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 10
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: supersmoother_period
    path: features.1.params.period
    kind: categorical
    choices: [6, 8, 10, 12, 16]
  - name: roofing_high_pass_period
    path: features.3.params.high_pass_period
    kind: categorical
    choices: [32, 40, 48, 64]
  - name: roofing_low_pass_period
    path: features.3.params.low_pass_period
    kind: categorical
    choices: [6, 8, 10, 12]
  - name: roofing_slope_bars
    path: features.3.params.slope_bars
    kind: categorical
    choices: [1, 2, 3]
  - name: hilbert_window
    path: features.4.params.window
    kind: categorical
    choices: [48, 64, 96]
  - name: min_cycle_period
    path: signals.params.min_cycle_period
    kind: categorical
    choices: [6.0, 8.0, 10.0, 12.0]
  - name: max_cycle_period
    path: signals.params.max_cycle_period
    kind: categorical
    choices: [32.0, 40.0, 48.0, 50.0]
  - name: amplitude_min_quantile
    path: signals.params.amplitude_min_quantile
    kind: categorical
    choices: [0.20, 0.30, 0.40, 0.50]
  - name: atr_min_quantile
    path: signals.params.atr_min_quantile
    kind: categorical
    choices: [0.20, 0.30, 0.40, 0.50]
  - name: take_profit_r
    path: target.take_profit_r
    paths:
      - backtest.take_profit_r
    kind: categorical
    choices: [1.00, 1.25, 1.50, 1.75, 2.00]
  - name: stop_loss_r
    path: target.stop_loss_r
    paths:
      - backtest.stop_loss_r
    kind: categorical
    choices: [0.75, 1.00, 1.25]
  - name: max_holding_bars
    path: target.max_holding_bars
    paths:
      - backtest.max_holding_bars
    kind: categorical
    choices: [4, 6, 8, 12]

