base_config: config/experiments/ftmo_fx_intraday_panel_4pair_xgboost_garch_2y_v1.yaml

study:
  study_name: optuna_ftmo_fx_intraday_panel_4pair_xgboost_garch_2y_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 17
  n_trials: 40
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_ftmo_fx_intraday_panel_4pair_xgboost_garch_2y_v1

objective:
  metric_path: evaluation.ftmo_objective.score
  direction: maximize
  failure_score: -1000000000000000.0
  base_metric_weight: 1.0
  stability_weight: 1.0
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.50
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - metric_path: evaluation.primary_summary.cumulative_return
      op: lt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.primary_summary.sharpe
      op: lt
      threshold: 0.0
      penalty: 10.0
      missing_penalty: 10.0
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.08
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.ftmo_metrics.weekly_return_mean
      op: lt
      threshold: 0.0
      penalty: 5.0
      missing_penalty: 5.0
    - metric_path: evaluation.ftmo_metrics.weekly_target_hit_ratio
      op: lt
      threshold: 0.25
      penalty: 4.0
      missing_penalty: 4.0
    - metric_path: evaluation.ftmo_metrics.weekly_target_hit_ratio
      op: lt
      threshold: 0.40
      penalty: 1.5
      missing_penalty: 1.5
    - metric_path: evaluation.ftmo_metrics.worst_weekly_drawdown
      op: lt
      threshold: -0.04
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.ftmo_metrics.weekly_drawdown_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 10.0
    - metric_path: evaluation.ftmo_metrics.daily_loss_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 10.0
    - metric_path: evaluation.ftmo_metrics.max_total_loss_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 10.0
    - metric_path: evaluation.primary_summary.cost_to_gross_pnl
      op: gt
      threshold: 0.35
      penalty: 1.25
      missing_penalty: 0.75
    - metric_path: evaluation.ftmo_metrics.best_day_concentration
      op: gt
      threshold: 0.45
      penalty: 1.5
      missing_penalty: 0.75
    - metric_path: evaluation.ftmo_metrics.positive_day_concentration
      op: gt
      threshold: 0.20
      penalty: 1.0
      missing_penalty: 0.5
    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.55
      penalty: 4.0
      missing_penalty: 4.0
    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.75
      penalty: 1.5
      missing_penalty: 1.5
    - metric_path: derived.entry_count
      op: lt
      threshold: 24.0
      penalty: 5.0
      missing_penalty: 5.0
    - metric_path: derived.entry_count
      op: lt
      threshold: 50.0
      penalty: 1.5
      missing_penalty: 1.5
    - metric_path: derived.entry_count
      op: gt
      threshold: 1200.0
      penalty: 1.5
      missing_penalty: 0.5
    - metric_path: derived.active_fold_count
      op: lt
      threshold: 8.0
      penalty: 2.0
      missing_penalty: 2.0
    - metric_path: derived.profitable_fold_count
      op: lt
      threshold: 5.0
      penalty: 1.0
      missing_penalty: 1.0

pruning:
  enabled: true
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [xgboost_clf]
  pruner: median
  n_startup_trials: 8
  n_warmup_steps: 2
  interval_steps: 1

search_space:
  - name: optuna_max_folds
    path: model.split.max_folds
    kind: categorical
    choices: [20]
  - name: tune_data_end
    path: data.end
    kind: categorical
    choices: ["2024-10-01 00:00:00"]
  - name: experiment_run_name
    path: logging.run_name
    kind: categorical
    choices: [ftmo_fx_intraday_panel_4pair_xgboost_garch_2y_v1]
  - name: experiment_dataset_id
    path: data.storage.dataset_id
    kind: categorical
    choices: [ftmo_fx_intraday_panel_4pair_xgboost_garch_2y_v1]

  - name: feature_profile
    path: model.feature_selectors.profile
    kind: categorical
    choices:
      - ftmo_fx_intraday_balanced_v1
      - ftmo_fx_intraday_regime_v1
      - ftmo_fx_intraday_momentum_v1
  - name: target_horizon
    path: model.target.horizon
    kind: categorical
    choices: [18, 24, 30, 36]
  - name: vol_norm_vol_col
    path: features.13.params.vol_col
    kind: categorical
    choices:
      - vol_rolling_12
      - vol_rolling_24
      - vol_rolling_48
      - vol_rolling_72
      - vol_rolling_96
      - vol_rolling_120
      - vol_rolling_168
  - name: vol_ewma_fast
    path: features.1.params.ewma_spans.0
    kind: categorical
    choices: [12, 24]
  - name: vol_ewma_slow
    path: features.1.params.ewma_spans.4
    kind: categorical
    choices: [72, 96]
  - name: trend_regime_base_sma
    path: features.3.params.base_sma_for_sign
    kind: categorical
    choices: [72, 96]
  - name: trend_regime_short_sma
    path: features.3.params.short_sma
    kind: categorical
    choices: [24, 36]
  - name: trend_regime_long_sma
    path: features.3.params.long_sma
    kind: categorical
    choices: [72, 96]
  - name: trend_ema_fast
    path: features.2.params.ema_spans.0
    kind: categorical
    choices: [8, 12, 16]
  - name: trend_ema_mid
    path: features.2.params.ema_spans.1
    kind: categorical
    choices: [24, 36]
  - name: trend_ema_slow
    path: features.2.params.ema_spans.2
    kind: categorical
    choices: [72, 96]
  - name: session_start_hour
    path: features.4.params.sessions.liquid_fx.0
    kind: categorical
    choices: [6, 7, 8]
  - name: session_end_hour
    path: features.4.params.sessions.liquid_fx.1
    kind: categorical
    choices: [20, 21, 22]
  - name: regime_vol_ratio_high
    path: features.5.params.vol_ratio_high_threshold
    kind: float
    low: 1.20
    high: 1.50
    step: 0.05
  - name: regime_vol_ratio_low
    path: features.5.params.vol_ratio_low_threshold
    kind: float
    low: 0.70
    high: 0.90
    step: 0.05
  - name: roc_fast_window
    path: features.7.params.windows.0
    kind: categorical
    choices: [4, 6, 8, 12]
  - name: roc_slow_window
    path: features.7.params.windows.1
    kind: categorical
    choices: [18, 24, 30, 36]
  - name: rsi_fast_window
    path: features.10.params.windows.0
    kind: categorical
    choices: [2, 3, 5]
  - name: rsi_slow_window
    path: features.10.params.windows.1
    kind: categorical
    choices: [10, 14, 21]
  - name: price_momentum_fast
    path: features.11.params.windows.0
    kind: categorical
    choices: [4, 6, 8, 12]
  - name: price_momentum_slow
    path: features.11.params.windows.1
    kind: categorical
    choices: [18, 24, 30, 36]
  - name: lag_recent
    path: features.14.params.lags.2
    kind: categorical
    choices: [3, 6, 12]
  - name: lag_long
    path: features.14.params.lags.3
    kind: categorical
    choices: [12, 24, 36]

  - name: signal_upper
    path: signals.params.upper
    kind: float
    low: 0.57
    high: 0.63
    step: 0.01
  - name: signal_lower
    path: signals.params.lower
    kind: float
    low: 0.37
    high: 0.43
    step: 0.01
  - name: signal_clip
    path: signals.params.clip
    kind: categorical
    choices: [0.15, 0.20, 0.25]
  - name: signal_min_abs
    path: signals.params.min_signal_abs
    kind: categorical
    choices: [0.02, 0.03, 0.05]
  - name: activation_adx_selector
    path: signals.params.activation_filters.2.selector.exact
    kind: categorical
    choices: [adx_14, adx_18, adx_24, adx_30]
  - name: activation_adx_min
    path: signals.params.activation_filters.2.value
    kind: categorical
    choices: [18.0, 20.0, 22.0, 24.0, 26.0]
  - name: activation_vol_ratio_min_selector
    path: signals.params.activation_filters.3.selector.exact
    kind: categorical
    choices:
      - regime_vol_ratio_12_120
      - regime_vol_ratio_24_168
      - regime_vol_ratio_36_240
  - name: activation_vol_ratio_min
    path: signals.params.activation_filters.3.value
    kind: float
    low: 0.65
    high: 0.85
    step: 0.05
  - name: activation_vol_ratio_max_selector
    path: signals.params.activation_filters.4.selector.exact
    kind: categorical
    choices:
      - regime_vol_ratio_12_120
      - regime_vol_ratio_24_168
      - regime_vol_ratio_36_240
  - name: activation_vol_ratio_max
    path: signals.params.activation_filters.4.value
    kind: float
    low: 1.35
    high: 1.80
    step: 0.05

  - name: backtest_min_holding_bars
    path: backtest.min_holding_bars
    kind: categorical
    choices: [4, 6, 8, 12]
  - name: portfolio_gross_target
    path: portfolio.gross_target
    kind: categorical
    choices: [0.20, 0.25, 0.30]
  - name: portfolio_max_gross_leverage
    path: portfolio.constraints.max_gross_leverage
    kind: categorical
    choices: [0.35]
  - name: portfolio_max_weight
    path: portfolio.constraints.max_weight
    kind: categorical
    choices: [0.08, 0.10, 0.12]
  - name: portfolio_min_weight
    path: portfolio.constraints.min_weight
    kind: categorical
    choices: [-0.08, -0.10, -0.12]

  - name: xgb_n_estimators
    path: model.params.n_estimators
    kind: int
    low: 150
    high: 300
    step: 50
  - name: xgb_learning_rate
    path: model.params.learning_rate
    kind: float
    low: 0.01
    high: 0.04
    log: true
  - name: xgb_max_depth
    path: model.params.max_depth
    kind: int
    low: 2
    high: 4
  - name: xgb_subsample
    path: model.params.subsample
    kind: float
    low: 0.6
    high: 0.9
    step: 0.1
  - name: xgb_colsample_bytree
    path: model.params.colsample_bytree
    kind: float
    low: 0.6
    high: 0.9
    step: 0.1
  - name: xgb_min_child_weight
    path: model.params.min_child_weight
    kind: float
    low: 8.0
    high: 20.0
    step: 2.0
