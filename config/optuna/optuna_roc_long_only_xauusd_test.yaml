base_config: config/experiments/roc_long_only/xauusd_roc_long_only_manual_barrier.yaml

study:
  study_name: optuna_roc_long_only_xauusd_manual_barrier_recovery_v3
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 11
  n_trials: 40
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_roc_long_only_xauusd_manual_barrier_recovery_v3

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.0
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - metric_path: evaluation.primary_summary.cumulative_return
      op: le
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0

    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.08
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0

    - metric_path: derived.entry_count
      op: lt
      threshold: 40.0
      penalty: 5.0
      missing_penalty: 5.0

    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.20
      penalty: 5.0
      missing_penalty: 2.0

    - metric_path: evaluation.primary_summary.cost_to_gross_pnl
      op: gt
      threshold: 0.45
      penalty: 2.0
      missing_penalty: 0.5

    - metric_path: evaluation.primary_summary.profit_factor
      op: lt
      threshold: 1.15
      penalty: 1.0
      missing_penalty: 0.5

pruning:
  enabled: false
  metric_path: metrics.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 5
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  # Κρατάμε θετικό momentum, αλλά όχι υπερβολικά χαλαρό.
  - name: signal_roc_min
    path: signals.params.roc_min
    kind: float
    low: 0.002
    high: 0.006
    step: 0.0005

  # Δεν θέλουμε να μπαίνει πολύ χαμηλά, αλλά ούτε μόνο στο extreme pump.
  - name: signal_close_z_min
    path: signals.params.close_z_min
    kind: float
    low: 0.0
    high: 0.8
    step: 0.1

  - name: signal_close_z_max
    path: signals.params.close_z_max
    kind: float
    low: 2.0
    high: 2.9
    step: 0.1

  # Πιο αυστηρό score από το πολύ χαλαρό run.
  - name: signal_min_score_required
    path: signals.params.min_score_required
    kind: int
    low: 6
    high: 8

  - name: signal_vol_adjustment_strength
    path: signals.params.vol_adjustment_strength
    kind: float
    low: 0.0
    high: 1.5
    step: 0.1

  - name: signal_vol_z_min
    path: signals.params.vol_z_min
    kind: float
    low: -2.0
    high: -0.2
    step: 0.1

  - name: signal_vol_z_max
    path: signals.params.vol_z_max
    kind: float
    low: 1.0
    high: 2.6
    step: 0.1

  - name: signal_close_open_ratio_min
    path: signals.params.close_open_ratio_min
    kind: float
    low: 0.0
    high: 0.003
    step: 0.00025

  - name: signal_mtf_1h_min
    path: signals.params.mtf_1h_min
    kind: float
    low: -0.002
    high: 0.004
    step: 0.0005

  - name: signal_mtf_4h_min
    path: signals.params.mtf_4h_min
    kind: float
    low: -0.004
    high: 0.005
    step: 0.0005

  # Μην το κάνεις πολύ scalp μέχρι να έχουμε dynamic exits.
  - name: max_holding_bars
    path: backtest.max_holding_bars
    kind: categorical
    choices: [10, 12, 14, 16]

  # Αφήνουμε λίγο μεγαλύτερο TP, γιατί το προηγούμενο καλό setup ήθελε winners.
  - name: take_profit_r
    path: backtest.take_profit_r
    kind: float
    low: 1.8
    high: 3.2
    step: 0.1

  - name: stop_loss_r
    path: backtest.stop_loss_r
    kind: float
    low: 0.9
    high: 1.4
    step: 0.1

  # Το σημαντικότερο για drawdown.
  - name: risk_per_trade
    path: backtest.risk_per_trade
    kind: categorical
    choices: [0.002, 0.0025, 0.003, 0.0035]