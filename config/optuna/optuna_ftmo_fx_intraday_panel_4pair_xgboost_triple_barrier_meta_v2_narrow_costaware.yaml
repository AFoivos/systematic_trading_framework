base_config: config/experiments/ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_meta_v2_trial34_plus_bars_since_shock.yaml

study:
  study_name: optuna_ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_meta_v2_narrow_costaware
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 17
  n_trials: 64
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_meta_v2_narrow_costaware

objective:
  metric_path: evaluation.ftmo_objective.score
  direction: maximize
  failure_score: -1000000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.5
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    # Hard infeasible risk/performance failures
    - metric_path: evaluation.primary_summary.cumulative_return
      op: lt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.08
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.ftmo_metrics.worst_weekly_drawdown
      op: lt
      threshold: -0.04
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.ftmo_metrics.weekly_drawdown_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.ftmo_metrics.daily_loss_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.ftmo_metrics.max_total_loss_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0

    # Soft quality constraints
    - metric_path: evaluation.primary_summary.sharpe
      op: lt
      threshold: 0.0
      penalty: 5.0
      missing_penalty: 5.0
    - metric_path: evaluation.ftmo_metrics.weekly_return_mean
      op: lt
      threshold: 0.0
      penalty: 4.0
      missing_penalty: 4.0

    # FTMO target is still aspirational; keep soft pressure but do not dominate.
    - metric_path: evaluation.ftmo_metrics.weekly_target_hit_ratio
      op: lt
      threshold: 0.05
      penalty: 0.75
      missing_penalty: 0.75
    - metric_path: evaluation.ftmo_metrics.weekly_target_hit_ratio
      op: lt
      threshold: 0.15
      penalty: 0.25
      missing_penalty: 0.25

    # Stronger cost discipline than v1/v2 broad search.
    - metric_path: evaluation.primary_summary.cost_to_gross_pnl
      op: gt
      threshold: 0.25
      penalty: 1.0
      missing_penalty: 0.75
    - metric_path: evaluation.primary_summary.cost_to_gross_pnl
      op: gt
      threshold: 0.35
      penalty: 2.0
      missing_penalty: 1.0

    # Avoid one-day concentration.
    - metric_path: evaluation.ftmo_metrics.best_day_concentration
      op: gt
      threshold: 0.45
      penalty: 1.25
      missing_penalty: 0.75
    - metric_path: evaluation.ftmo_metrics.positive_day_concentration
      op: gt
      threshold: 0.25
      penalty: 0.75
      missing_penalty: 0.5

    # Keep activity, but do not encourage overtrading.
    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.55
      penalty: 2.0
      missing_penalty: 2.0
    - metric_path: derived.entry_count
      op: lt
      threshold: 250.0
      penalty: 2.0
      missing_penalty: 2.0
    - metric_path: derived.entry_count
      op: gt
      threshold: 1200.0
      penalty: 1.5
      missing_penalty: 0.5
    - metric_path: derived.active_fold_count
      op: lt
      threshold: 8.0
      penalty: 2.0
      missing_penalty: 2.0
    - metric_path: derived.profitable_fold_count
      op: lt
      threshold: 6.0
      penalty: 1.0
      missing_penalty: 1.0

pruning:
  enabled: false
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [xgboost_clf]
  pruner: none
  n_startup_trials: 0
  n_warmup_steps: 0
  interval_steps: 1

search_space:
  # Fixed experiment identity / OOS setup
  - name: optuna_max_folds
    path: model.split.max_folds
    kind: categorical
    choices: [12]
  - name: tune_data_end
    path: data.end
    kind: categorical
    choices: ["2024-10-01 00:00:00"]
  - name: experiment_run_name
    path: logging.run_name
    kind: categorical
    choices: [ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_meta_v2_narrow_costaware]
  - name: experiment_dataset_id
    path: data.storage.dataset_id
    kind: categorical
    choices: [ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_meta_v1]

  # Keep the known-good feature profile; previous ablations did not beat full volatility.
  - name: feature_profile
    path: model.feature_selectors.profile
    kind: categorical
    choices: [ftmo_fx_intraday_balanced_v1]

  # Do not tune min holding for now; min_holding=6 was much worse.
  - name: backtest_min_holding_bars
    path: backtest.min_holding_bars
    kind: categorical
    choices: [4]

  # Triple-barrier target: narrow around the current best.
  - name: tb_max_holding
    path: model.target.max_holding
    kind: categorical
    choices: [12, 18]
  - name: tb_upper_mult
    path: model.target.upper_mult
    kind: categorical
    choices: [1.25, 1.5]
  - name: tb_vol_window
    path: model.target.vol_window
    kind: categorical
    choices: [12, 24]

  # Shock gate: keep near the validated region; do not reopen too much.
  - name: shock_ret_z_threshold
    path: features.14.params.ret_z_threshold
    kind: categorical
    choices: [1.7, 1.8, 1.9]
  - name: shock_atr_mult_threshold
    path: features.14.params.atr_mult_threshold
    kind: categorical
    choices: [1.1, 1.2]
  - name: shock_distance_from_mean_threshold
    path: features.14.params.distance_from_mean_threshold
    kind: categorical
    choices: [1.1, 1.2]
  - name: shock_post_shock_active_bars
    path: features.14.params.post_shock_active_bars
    kind: categorical
    choices: [3, 4]
  - name: shock_short_horizon
    path: features.14.params.short_horizon
    kind: categorical
    choices: [1]
  - name: shock_medium_horizon
    path: features.14.params.medium_horizon
    kind: categorical
    choices: [6]

  # Meta signal and sizing: narrow around the v2 baseline.
  - name: meta_signal_threshold
    path: signals.params.threshold
    kind: categorical
    choices: [0.50, 0.52, 0.54, 0.56]
  - name: meta_signal_upper_alias
    path: signals.params.upper
    kind: categorical
    choices: [0.50, 0.52, 0.54, 0.56]
  - name: meta_signal_clip
    path: signals.params.clip
    kind: categorical
    choices: [1.0]

  - name: ftmo_risk_per_trade
    path: risk.sizing.risk_per_trade
    kind: categorical
    choices: [0.006, 0.008, 0.010]
  - name: ftmo_confidence_floor
    path: risk.sizing.confidence_floor
    kind: categorical
    choices: [0.50, 0.525, 0.55]
  - name: ftmo_confidence_power
    path: risk.sizing.confidence_power
    kind: categorical
    choices: [1.0, 1.25]
  - name: ftmo_sizing_max_leverage
    path: risk.sizing.max_leverage
    kind: categorical
    choices: [1.0, 1.25, 1.5]

  # Portfolio: keep leverage constrained; only explore modest gross target.
  - name: portfolio_gross_target
    path: portfolio.gross_target
    kind: categorical
    choices: [1.0, 1.5]
  - name: portfolio_max_gross_leverage
    path: portfolio.constraints.max_gross_leverage
    kind: categorical
    choices: [1.0, 1.25, 1.5]
  - name: portfolio_max_weight
    path: portfolio.constraints.max_weight
    kind: categorical
    choices: [0.4, 0.6]
  - name: portfolio_min_weight
    path: portfolio.constraints.min_weight
    kind: categorical
    choices: [-1.0]

  # Keep XGBoost shallow/regularized; prior best favored this structure.
  - name: xgb_n_estimators
    path: model.params.n_estimators
    kind: categorical
    choices: [150, 250]
  - name: xgb_learning_rate
    path: model.params.learning_rate
    kind: categorical
    choices: [0.025, 0.03648540222869801, 0.05]
  - name: xgb_max_depth
    path: model.params.max_depth
    kind: categorical
    choices: [2, 3]
  - name: xgb_min_child_weight
    path: model.params.min_child_weight
    kind: categorical
    choices: [4.0, 8.0, 12.0]
  - name: xgb_subsample
    path: model.params.subsample
    kind: categorical
    choices: [0.8, 1.0]
  - name: xgb_colsample_bytree
    path: model.params.colsample_bytree
    kind: categorical
    choices: [0.8, 0.9, 1.0]
  - name: xgb_reg_lambda
    path: model.params.reg_lambda
    kind: categorical
    choices: [5.0, 10.0, 20.0]
  - name: xgb_reg_alpha
    path: model.params.reg_alpha
    kind: categorical
    choices: [0.05, 0.1, 0.5]
  - name: xgb_scale_pos_weight
    path: model.params.scale_pos_weight
    kind: categorical
    choices: [1.0]

  # Keep feature engineering near v2 baseline.
  - name: vol_norm_vol_col
    path: features.13.params.vol_col
    kind: categorical
    choices: [vol_rolling_96]
  - name: session_start_hour
    path: features.4.params.sessions.liquid_fx.0
    kind: categorical
    choices: [6]
  - name: session_end_hour
    path: features.4.params.sessions.liquid_fx.1
    kind: categorical
    choices: [20]
  - name: regime_vol_ratio_high
    path: features.5.params.vol_ratio_high_threshold
    kind: categorical
    choices: [1.45, 1.5]
  - name: regime_vol_ratio_low
    path: features.5.params.vol_ratio_low_threshold
    kind: categorical
    choices: [0.75, 0.8, 0.85]
  - name: roc_fast_window
    path: features.7.params.windows.0
    kind: categorical
    choices: [4]
  - name: roc_slow_window
    path: features.7.params.windows.1
    kind: categorical
    choices: [24]
  - name: rsi_fast_window
    path: features.10.params.windows.0
    kind: categorical
    choices: [2]
  - name: rsi_slow_window
    path: features.10.params.windows.1
    kind: categorical
    choices: [14]
  - name: price_momentum_fast
    path: features.11.params.windows.0
    kind: categorical
    choices: [12]
  - name: price_momentum_slow
    path: features.11.params.windows.1
    kind: categorical
    choices: [36]
  - name: lag_recent
    path: features.15.params.lags.2
    kind: categorical
    choices: [3]
  - name: lag_long
    path: features.15.params.lags.3
    kind: categorical
    choices: [36]
