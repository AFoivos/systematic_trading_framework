base_config: config/experiments/stochrsi_cross_ma/ema_stoch_pullback_meta_vwap_context_long_only.yaml

study:
  study_name: optuna_ema_stoch_pullback_meta_vwap_context_long_only
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 100
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_ema_stoch_pullback_meta_vwap_context_long_only

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - metric_path: evaluation.primary_summary.profit_factor
      op: lt
      threshold: 1.05
      penalty: 1.0
      missing_penalty: 0.25
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.12
      penalty: 3.0
      missing_penalty: 1.0
    - metric_path: derived.turnover_event_count
      op: lt
      threshold: 60.0
      penalty: 3.0
      missing_penalty: 3.0
    - metric_path: derived.entry_count
      op: lt
      threshold: 30.0
      penalty: 2.0
      missing_penalty: 2.0
    - metric_path: derived.active_week_ratio
      op: lt
      threshold: 0.20
      penalty: 2.0
      missing_penalty: 2.0

pruning:
  enabled: false
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [xgboost_clf]
  pruner: none
  n_startup_trials: 5
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: signal_oversold
    path: features.12.params.oversold
    kind: float
    low: 0.10
    high: 0.30
    step: 0.02
  - name: signal_max_bars_after_cross
    path: features.12.params.max_bars_after_cross
    kind: categorical
    choices: [30, 60, 120, 240, 480, 999999]
  - name: signal_require_k_d_confirmation
    path: features.12.params.require_k_d_confirmation
    kind: bool
  - name: signal_use_first_pullback_only
    path: features.12.params.use_first_pullback_only
    kind: bool
  - name: signal_probability_threshold
    path: signals.params.threshold
    kind: float
    low: 0.35
    high: 0.65
    step: 0.05
  - name: target_upper_mult
    path: model.target.upper_mult
    kind: float
    low: 1.0
    high: 3.0
    step: 0.25
  - name: target_lower_mult
    path: model.target.lower_mult
    kind: float
    low: 0.75
    high: 2.0
    step: 0.25
  - name: target_max_holding
    path: model.target.max_holding
    kind: categorical
    choices: [6, 8, 12, 16, 20]
  - name: target_vol_window
    path: model.target.vol_window
    kind: categorical
    choices: [12, 24, 48]
  - name: xgb_n_estimators
    path: model.params.n_estimators
    kind: int
    low: 150
    high: 500
    step: 50
  - name: xgb_learning_rate
    path: model.params.learning_rate
    kind: float
    low: 0.01
    high: 0.08
    log: true
  - name: xgb_max_depth
    path: model.params.max_depth
    kind: int
    low: 2
    high: 5
  - name: xgb_min_child_weight
    path: model.params.min_child_weight
    kind: float
    low: 2.0
    high: 12.0
    step: 2.0
  - name: xgb_subsample
    path: model.params.subsample
    kind: float
    low: 0.6
    high: 1.0
    step: 0.1
  - name: xgb_colsample_bytree
    path: model.params.colsample_bytree
    kind: float
    low: 0.6
    high: 1.0
    step: 0.1
  - name: xgb_reg_lambda
    path: model.params.reg_lambda
    kind: categorical
    choices: [0.5, 1.0, 2.0, 5.0, 10.0]
  - name: xgb_reg_alpha
    path: model.params.reg_alpha
    kind: categorical
    choices: [0.0, 0.05, 0.1, 0.5]
  - name: xgb_scale_pos_weight
    path: model.params.scale_pos_weight
    kind: categorical
    choices: [1.0, 1.5, 2.0, 3.0]
