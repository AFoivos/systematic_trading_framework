base_config: config/experiments/dense_return_forecasting_v2.yaml

study:
  study_name: optuna_dense_return_forecasting_v2
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 42
  n_trials: 100
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_dense_return_forecasting_v2

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - metric_path: evaluation.primary_summary.profit_factor
      op: lt
      threshold: 1.05
      penalty: 1.0
      missing_penalty: 0.5
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.12
      penalty: 3.0
      missing_penalty: 1.0
    - metric_path: derived.entry_count
      op: lt
      threshold: 120.0
      penalty: 3.0
      missing_penalty: 3.0
    - metric_path: derived.turnover_event_count
      op: gt
      threshold: 700.0
      penalty: 3.0
      missing_penalty: 1.0
    - metric_path: evaluation.primary_summary.total_turnover
      op: gt
      threshold: 250.0
      penalty: 3.0
      missing_penalty: 1.0
    - metric_path: evaluation.primary_summary.cost_to_gross_pnl
      op: gt
      threshold: 1.0
      penalty: 4.0
      missing_penalty: 2.0
    - metric_path: evaluation.primary_summary.gross_pnl
      op: le
      threshold: 0.0
      penalty: 4.0
      missing_penalty: 1.0
    - metric_path: evaluation.primary_summary.rank_ic
      op: lt
      threshold: 0.02
      penalty: 3.0
      missing_penalty: 2.0
    - metric_path: evaluation.primary_summary.quantile_monotonicity
      op: lt
      threshold: 0.25
      penalty: 3.0
      missing_penalty: 1.0

pruning:
  enabled: false
  metric_path: regression_metrics.correlation
  direction: maximize
  stage_filter: [lightgbm_regressor]
  pruner: none
  n_startup_trials: 5
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: ema_fast
    path: features.2.params.ema_spans.0
    paths:
      - features.10.params.ema_fast_period
    kind: int
    low: 10
    high: 30
  - name: ema_mid
    path: features.2.params.ema_spans.1
    paths:
      - features.10.params.ema_mid_period
    kind: int
    low: 40
    high: 80
  - name: ema_slow
    path: features.2.params.ema_spans.2
    paths:
      - features.10.params.ema_slow_period
    kind: int
    low: 90
    high: 160
  - name: stoch_rsi_period
    path: features.6.params.rsi_period
    paths:
      - features.6.params.stoch_period
    kind: int
    low: 10
    high: 24
  - name: horizon_bars
    path: model.target.horizon_bars
    paths:
      - model.split.purge_bars
      - validation.purge_bars
    kind: int
    low: 8
    high: 16
    step: 4
  - name: n_estimators
    path: model.params.n_estimators
    kind: int
    low: 150
    high: 600
    step: 50
  - name: learning_rate
    path: model.params.learning_rate
    kind: float
    low: 0.01
    high: 0.08
    log: true
  - name: num_leaves
    path: model.params.num_leaves
    kind: int
    low: 15
    high: 63
  - name: max_depth
    path: model.params.max_depth
    kind: int
    low: 3
    high: 9
  - name: min_child_samples
    path: model.params.min_child_samples
    kind: int
    low: 20
    high: 120
    step: 10
  - name: subsample
    path: model.params.subsample
    kind: float
    low: 0.65
    high: 1.0
    step: 0.05
  - name: colsample_bytree
    path: model.params.colsample_bytree
    kind: float
    low: 0.60
    high: 1.0
    step: 0.05
  - name: top_k
    path: portfolio.selection.top_k
    kind: int
    low: 1
    high: 3
  - name: min_expected_net_return
    path: portfolio.selection.min_expected_net_return
    kind: float
    low: 0.03
    high: 0.25
    step: 0.01
  - name: rebalance_every_n_bars
    path: portfolio.selection.rebalance_every_n_bars
    kind: int
    low: 4
    high: 12
    step: 4
  - name: entry_threshold
    path: execution.hysteresis.entry_threshold
    kind: float
    low: 0.10
    high: 0.30
    step: 0.01
  - name: exit_threshold
    path: execution.hysteresis.exit_threshold
    kind: float
    low: 0.00
    high: 0.09
    step: 0.01
  - name: min_holding_bars
    path: execution.hysteresis.min_holding_bars
    kind: int
    low: 2
    high: 12

