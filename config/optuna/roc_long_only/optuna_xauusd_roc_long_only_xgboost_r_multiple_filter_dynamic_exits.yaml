base_config: config/experiments/roc_long_only/xauusd_roc_long_only_xgboost_r_multiple_filter.yaml

study:
  study_name: optuna_xauusd_roc_long_only_xgboost_r_multiple_filter_dynamic_exits
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 1
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_xauusd_roc_long_only_xgboost_r_multiple_filter_dynamic_exits

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.25
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
    - metric_path: evaluation.primary_summary.cumulative_return
      op: le
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.08
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.ftmo_metrics.daily_loss_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 0.0
    - metric_path: evaluation.ftmo_metrics.weekly_drawdown_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 0.0
    - metric_path: evaluation.ftmo_metrics.max_total_loss_breach_count
      op: gt
      threshold: 0.0
      penalty: 1000000000000.0
      missing_penalty: 0.0
    - metric_path: evaluation.primary_summary.flat_rate
      op: gt
      threshold: 0.990
      penalty: 3.0
      missing_penalty: 0.5
    - metric_path: evaluation.primary_summary.flat_rate
      op: gt
      threshold: 0.985
      penalty: 1.0
      missing_penalty: 0.25
    - metric_path: derived.entry_count
      op: lt
      threshold: 100.0
      penalty: 5.0
      missing_penalty: 5.0
    - metric_path: evaluation.primary_summary.cost_to_gross_pnl
      op: gt
      threshold: 0.45
      penalty: 1.0
      missing_penalty: 0.25
    - metric_path: evaluation.primary_summary.profit_factor
      op: lt
      threshold: 1.15
      penalty: 1.0
      missing_penalty: 0.25

pruning:
  enabled: false
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [xgboost_clf]
  pruner: none
  n_startup_trials: 5
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: signal_off_min_bars
    path: backtest.dynamic_exits.signal_off_exit.min_bars_held
    kind: categorical
    choices: [1, 2, 3]

  - name: breakeven_trigger_r
    path: backtest.dynamic_exits.breakeven.trigger_r
    kind: categorical
    choices: [0.6, 0.8, 1.0]

  - name: profit_lock_trigger_r
    path: backtest.dynamic_exits.profit_lock.trigger_r
    kind: categorical
    choices: [1.0, 1.2, 1.5]

  - name: profit_lock_r
    path: backtest.dynamic_exits.profit_lock.lock_r
    kind: categorical
    choices: [0.2, 0.3, 0.5]

  - name: no_progress_bars
    path: backtest.dynamic_exits.no_progress.bars
    kind: categorical
    choices: [4, 5, 6, 8]

  - name: no_progress_min_favorable_r
    path: backtest.dynamic_exits.no_progress.min_favorable_r
    kind: categorical
    choices: [0.1, 0.2, 0.3]
