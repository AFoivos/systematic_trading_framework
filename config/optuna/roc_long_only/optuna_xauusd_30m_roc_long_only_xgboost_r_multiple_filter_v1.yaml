base_config: config/experiments/roc_long_only/xauusd_30m_roc_long_only_xgboost_r_multiple_filter_v1.yaml

study:
  study_name: optuna_xauusd_30m_roc_long_only_xgboost_r_multiple_filter_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 120
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_xauusd_30m_roc_long_only_xgboost_r_multiple_filter_v1

objective:
  metric_path: summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.0
  constraints:
    - {metric_path: summary.cumulative_return, op: le, threshold: 0.0, penalty: 100.0, missing_penalty: 100.0}
    - {metric_path: summary.max_drawdown, op: le, threshold: -0.10, penalty: 50.0, missing_penalty: 50.0}
    - {metric_path: summary.profit_factor, op: le, threshold: 1.10, penalty: 25.0, missing_penalty: 25.0}
    - {metric_path: summary.trade_count, op: lt, threshold: 100, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: summary.trade_count, op: gt, threshold: 3000, penalty: 10.0, missing_penalty: 10.0}
    - {metric_path: summary.cost_to_gross_pnl, op: ge, threshold: 0.65, penalty: 10.0, missing_penalty: 10.0}

pruning:
  enabled: false
  metric_path: summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 10
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  - name: signal_roc_min
    path: features.7.params.roc_min
    kind: float
    low: 0.001
    high: 0.0045
    step: 0.0005
  - name: signal_vol_z_min
    path: features.7.params.vol_z_min
    kind: float
    low: -2.2
    high: -0.8
    step: 0.2
  - name: signal_vol_z_max
    path: features.7.params.vol_z_max
    kind: float
    low: 0.8
    high: 1.8
    step: 0.2
  - name: signal_close_z_min
    path: features.7.params.close_z_min
    kind: float
    low: 0.0
    high: 0.8
    step: 0.1
  - name: signal_close_z_max
    path: features.7.params.close_z_max
    kind: float
    low: 0.9
    high: 1.8
    step: 0.1
  - name: signal_mtf_1h_min
    path: features.7.params.mtf_1h_min
    kind: float
    low: 0.0
    high: 0.004
    step: 0.0005
  - name: signal_mtf_4h_min
    path: features.7.params.mtf_4h_min
    kind: float
    low: -0.005
    high: 0.002
    step: 0.0005
  - name: signal_min_score_required
    path: features.7.params.min_score_required
    kind: int
    low: 5
    high: 8
  - name: signal_vol_adjustment_strength
    path: features.7.params.vol_adjustment_strength
    kind: float
    low: 0.3
    high: 1.3
    step: 0.1
  - name: model_probability_threshold
    path: signals.params.threshold
    kind: float
    low: 0.44
    high: 0.60
    step: 0.01
  - name: target_r_min
    path: model.target.target_r_min
    kind: float
    low: 0.3
    high: 1.0
    step: 0.1
  - name: take_profit_r
    path: model.target.take_profit_r
    paths: [backtest.take_profit_r]
    kind: float
    low: 1.25
    high: 2.5
    step: 0.25
  - name: stop_loss_r
    path: model.target.stop_loss_r
    paths: [backtest.stop_loss_r]
    kind: float
    low: 0.75
    high: 1.5
    step: 0.25
  - name: max_holding_bars
    path: model.target.max_holding_bars
    paths: [backtest.max_holding_bars]
    kind: categorical
    choices: [12, 18, 24, 36]
  - name: no_progress_bars
    path: backtest.dynamic_exits.no_progress.bars
    kind: categorical
    choices: [3, 4, 6, 8]
  - name: no_progress_min_favorable_r
    path: backtest.dynamic_exits.no_progress.min_favorable_r
    kind: float
    low: 0.0
    high: 0.4
    step: 0.1
  - name: risk_per_trade
    path: backtest.risk_per_trade
    kind: categorical
    choices: [0.002, 0.0025, 0.003, 0.004]
  - name: xgb_n_estimators
    path: model.params.n_estimators
    kind: categorical
    choices: [100, 150, 250, 350]
  - name: xgb_learning_rate
    path: model.params.learning_rate
    kind: float
    low: 0.01
    high: 0.08
    log: true
  - name: xgb_max_depth
    path: model.params.max_depth
    kind: int
    low: 2
    high: 5
  - name: xgb_min_child_weight
    path: model.params.min_child_weight
    kind: categorical
    choices: [3.0, 6.0, 9.0, 12.0]


