search_space:
  - name: signal_roc_min
    path: features.7.params.roc_min
    kind: float
    low: 0.0010
    high: 0.0030
    step: 0.0005

  - name: signal_close_z_min
    path: features.7.params.close_z_min
    kind: float
    low: 0.0
    high: 0.6
    step: 0.1

  - name: signal_close_z_max
    path: features.7.params.close_z_max
    kind: float
    low: 0.9
    high: 1.8
    step: 0.1

  - name: signal_mtf_1h_min
    path: features.7.params.mtf_1h_min
    kind: float
    low: 0.0000
    high: 0.0035
    step: 0.0005

  - name: signal_mtf_4h_min
    path: features.7.params.mtf_4h_min
    kind: float
    low: -0.0030
    high: 0.0020
    step: 0.0005

  - name: signal_min_score_required
    path: features.7.params.min_score_required
    kind: int
    low: 6
    high: 8

  - name: model_probability_threshold
    path: signals.params.threshold
    kind: float
    low: 0.44
    high: 0.56
    step: 0.01

  - name: signal_vol_adjustment_strength
    path: features.7.params.vol_adjustment_strength
    kind: float
    low: 0.3
    high: 1.2
    step: 0.1
