base_config: config/experiments/btcusd_1h_shock_meta_xgboost_long_only.yaml

study:
  study_name: optuna_shock_meta_xgboost_long_only_v2
  sampler: tpe
  seed: 7
  n_trials: 30
  timeout: null
  n_jobs: 1
  logging_enabled: false
  catch_exceptions: true

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 1.0
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  # Hard-style feasibility filters: keep sparse/illiquid trials out of the top ranking
  # without changing the Optuna objective schema.
  constraints:
    - metric_path: evaluation.primary_summary.max_drawdown
      op: lt
      threshold: -0.30
      penalty: 1.0
      missing_penalty: 1.0
    - metric_path: derived.trade_count
      op: lt
      threshold: 75.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.primary_summary.total_turnover
      op: lt
      threshold: 30.0
      penalty: 1000000000000.0
      missing_penalty: 1000000000000.0
    - metric_path: evaluation.primary_summary.profit_factor
      op: lt
      threshold: 1.0
      penalty: 0.25
      missing_penalty: 0.25

pruning:
  enabled: true
  metric_path: classification_metrics.roc_auc
  direction: maximize
  stage_filter: [xgboost_clf]
  pruner: median
  n_startup_trials: 5
  n_warmup_steps: 1
  interval_steps: 1

# Keep the feature space deliberately controlled. Window-changing feature params are safe here
# because the long-only base experiment uses model.feature_selectors instead of fixed columns.
search_space:
  - name: regime_vol_short_window
    path: features.2.params.vol_short_window
    kind: categorical
    choices: [12, 24, 36]
  - name: regime_vol_long_window
    path: features.2.params.vol_long_window
    kind: categorical
    choices: [96, 168, 336]
  - name: bollinger_window
    path: features.3.params.window
    kind: categorical
    choices: [12, 24, 36, 48]
  - name: bollinger_n_std
    path: features.3.params.n_std
    kind: float
    low: 1.5
    high: 2.8
    step: 0.1
  - name: shock_ema_window
    path: features.5.params.ema_window
    kind: categorical
    choices: [12, 24, 36, 48]
  - name: shock_atr_window
    path: features.5.params.atr_window
    kind: categorical
    choices: [12, 24, 36, 48]
  - name: shock_vol_window
    path: features.5.params.vol_window
    kind: categorical
    choices: [12, 24, 36, 48]
  - name: shock_ret_z_threshold
    path: features.5.params.ret_z_threshold
    kind: float
    low: 1.5
    high: 3.5
    step: 0.25
  - name: shock_atr_mult_threshold
    path: features.5.params.atr_mult_threshold
    kind: float
    low: 1.0
    high: 2.5
    step: 0.25
  - name: shock_distance_threshold
    path: features.5.params.distance_from_mean_threshold
    kind: float
    low: 0.5
    high: 1.75
    step: 0.25
  - name: post_shock_active_bars
    path: features.5.params.post_shock_active_bars
    kind: categorical
    choices: [1, 2, 4, 6]
  - name: rsi_fast_window
    path: features.6.params.windows.0
    kind: categorical
    choices: [2, 3, 4]
  - name: rsi_slow_window
    path: features.6.params.windows.1
    kind: categorical
    choices: [10, 14, 21]
  - name: volume_vol_z_window
    path: features.8.params.vol_z_window
    kind: categorical
    choices: [48, 72, 168]
  - name: volume_atr_window
    path: features.8.params.atr_window
    kind: categorical
    choices: [12, 24, 36]
  - name: mfi_window
    path: features.9.params.window
    kind: categorical
    choices: [14, 24, 36]
  - name: roc_fast_window
    path: features.10.params.windows.0
    kind: categorical
    choices: [3, 6, 12]
  - name: roc_slow_window
    path: features.10.params.windows.1
    kind: categorical
    choices: [24, 48, 72]
  - name: return_mom_fast_window
    path: features.11.params.windows.0
    kind: categorical
    choices: [3, 6, 12]
  - name: return_mom_slow_window
