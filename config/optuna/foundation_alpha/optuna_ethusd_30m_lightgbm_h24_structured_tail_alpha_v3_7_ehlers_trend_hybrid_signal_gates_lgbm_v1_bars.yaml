base_config: config/experiments/foundation_alpha/BEST/ethusd/optuna_BEST_ethusd_30m_lightgbm_h24_structured_tail_alpha_v3_7_ehlers_trend_hybrid.yaml

study:
  study_name: BARS_optuna_ethusd_30m_v3_7_ehlers_trend_hybrid_signal_gates_lgbm_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 100
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: BARS_optuna_ethusd_30m_v3_7_ehlers_trend_hybrid_signal_gates_lgbm_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0
  base_metric_weight: 1.0
  stability_weight: 0.35
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries
  constraints:
  - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 100.0, missing_penalty: 100.0}
  - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.25, penalty: 40.0, missing_penalty: 40.0}
  - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.05, penalty: 20.0, missing_penalty: 20.0}
  - {metric_path: evaluation.primary_summary.gross_pnl, op: le, threshold: 0.0, penalty: 25.0, missing_penalty: 10.0}
  - {metric_path: evaluation.primary_summary.cost_to_gross_pnl, op: gt, threshold: 0.35, penalty: 15.0, missing_penalty: 10.0}
  - {metric_path: derived.entry_count, op: lt, threshold: 300.0, penalty: 10.0, missing_penalty: 10.0}
  - {metric_path: derived.entry_count, op: gt, threshold: 4000.0, penalty: 8.0, missing_penalty: 4.0}

pruning:
  enabled: false
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 25
  n_warmup_steps: 1
  interval_steps: 1

search_space:
- {name: min_holding_bars, path: backtest.min_holding_bars, kind: int, low: 4, high: 24, step: 1}
- {name: horizon_bars, path: model.target.horizon_bars, kind: int, low: 12, high: 36, step: 1}

