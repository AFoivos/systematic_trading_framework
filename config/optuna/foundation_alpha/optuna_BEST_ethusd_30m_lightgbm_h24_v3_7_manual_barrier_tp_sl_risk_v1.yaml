base_config: config/experiments/foundation_alpha/BEST/ethusd/BEST_ethusd_30m_lightgbm_h24_structured_tail_alpha_v3_7_ehlers_trend_hybrid_trial_0054_manual_barrier.yaml

study:
  study_name: optuna_BEST_ethusd_30m_v3_7_manual_barrier_tp_sl_risk_v1
  storage: null
  load_if_exists: false
  sampler: tpe
  seed: 7
  n_trials: 150
  timeout: null
  n_jobs: 1
  logging_enabled: true
  catch_exceptions: true

report:
  enabled: true
  output_dir: logs/experiments
  run_name: optuna_BEST_ethusd_30m_v3_7_manual_barrier_tp_sl_risk_v1

objective:
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  failure_score: -1000000000000.0

  # Κρατάμε fold stability γιατί αλλιώς το Optuna μπορεί να βρει
  # aggressive TP/SL combo που δουλεύει μόνο σε 1-2 folds.
  base_metric_weight: 1.0
  stability_weight: 0.35
  stability_metric_path: metrics.sharpe
  stability_std_penalty: 1.0
  fold_summary_path: evaluation.fold_backtest_summaries

  constraints:
    # Δεν δεχόμαστε profitable-looking Sharpe με αρνητικό total return.
    - {metric_path: evaluation.primary_summary.cumulative_return, op: le, threshold: 0.0, penalty: 100.0, missing_penalty: 100.0}

    # Risk control. Με risk_per_trade στο search, αυτό είναι σημαντικό.
    - {metric_path: evaluation.primary_summary.max_drawdown, op: lt, threshold: -0.10, penalty: 50.0, missing_penalty: 50.0}

    # Κόβει weak payoff profiles.
    - {metric_path: evaluation.primary_summary.profit_factor, op: lt, threshold: 1.20, penalty: 25.0, missing_penalty: 25.0}

    # Θέλουμε πραγματικό gross edge, όχι αποτέλεσμα που τρώγεται από costs.
    - {metric_path: evaluation.primary_summary.gross_pnl, op: le, threshold: 0.0, penalty: 30.0, missing_penalty: 10.0}
    - {metric_path: evaluation.primary_summary.cost_to_gross_pnl, op: gt, threshold: 0.35, penalty: 20.0, missing_penalty: 10.0}

    # Αποφεύγουμε πολύ sparse ή υπερβολικά hyperactive λύσεις.
    - {metric_path: derived.entry_count, op: lt, threshold: 250.0, penalty: 12.0, missing_penalty: 12.0}
    - {metric_path: derived.entry_count, op: gt, threshold: 4000.0, penalty: 10.0, missing_penalty: 5.0}

pruning:
  enabled: false
  metric_path: evaluation.primary_summary.sharpe
  direction: maximize
  stage_filter: []
  pruner: none
  n_startup_trials: 25
  n_warmup_steps: 1
  interval_steps: 1

search_space:
  # Base ήταν 5.0R. Αφήνουμε αρκετά wide range για να δούμε
  # αν το edge θέλει νωρίτερο capture ή μεγαλύτερο tail.
  - name: take_profit_r
    path: backtest.take_profit_r
    kind: float
    low: 2.0
    high: 8.0
    step: 0.25

  # Base ήταν 2.0R. Δοκιμάζουμε tight έως loose stop.
  - name: stop_loss_r
    path: backtest.stop_loss_r
    kind: float
    low: 1.0
    high: 3.0
    step: 0.25

  # Base ήταν 0.006. Το κρατάμε γύρω από 0.2% έως 1.0%.
  # Προσοχή: αν το objective είναι Sharpe, το risk_per_trade μπορεί
  # να είναι σχεδόν scale-invariant, άρα κοιτάμε μαζί max_drawdown/cum_return.
  - name: risk_per_trade
    path: backtest.risk_per_trade
    kind: float
    low: 0.002
    high: 0.010
    step: 0.001