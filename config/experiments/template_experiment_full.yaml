# Full self-contained experiment template covering the current supported config surface.
# Every tracked experiment should stay standalone and valid without inheritance.
#
# Important:
# - Feature steps support `enabled: true/false`.
# - To disable the model path, use `model.kind: none`.
# - To disable the signal path, use `signals.kind: none`.
# - Classifier preprocessing supports `model.preprocessing.scaler: none|standard`.
# - `triple_barrier` can be used as a true meta-label target with `side_col` plus
#   either `candidate_mode` or `candidate_col`.
# - `shock_context` emits event columns such as `shock_candidate` and
#   `shock_side_contrarian`, plus optional post-shock gating columns such as
#   `shock_side_contrarian_active` for contrarian mean-reversion research.
# - Feature steps can optionally declare `outputs:` as a rename map from emitted
#   columns to your preferred names.
# - `probability_threshold` supports entry/exit hysteresis through
#   `upper_exit/lower_exit` and optional gating with `base_signal_col`.
# - Multi-stage training is available through top-level `model_stages:` and is mutually
#   exclusive with `model:` / `models:`.
# - Each `model_stages[]` entry supports `enabled: true|false` and `stage: 1,2,...`.
# - Models and signals can optionally declare `outputs:` for runtime columns such as
#   `pred_prob_col`, `pred_ret_col`, `label_col`, `fwd_col`, `candidate_out_col`,
#   and `signal_col`.
# - In `model_stages`, upstream stages should emit explicit stage-specific prediction columns
#   such as `forecast_pred_ret` or `filter1_pred_prob` so later stages can reuse them safely.
# - This template lists all currently supported feature-step families and the currently
#   supported model/signal kinds as comments, but only one active `model.kind` and one
#   active `signals.kind` can be selected in a valid run.
#
# -Use python -m src.experiments.runner "C:\path\to\your\template_experiment_full.yaml"
# -Or use python -m src.experiments.runner config/experiments/template_experiment_full.yaml
# -Or use docker compose exec app python -m src.experiments.runner config/experiments/template_experiment_full.yaml

data:
  source: dukascopy_csv
  interval: 1h
  start: "2017-01-01 00:00:00"
  end: null
  alignment: inner
  symbol: BTCUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: "template_experiment_full"
    save_raw: false
    save_processed: true
    load_path: "data/raw/dukas_copy_bank/btcusd_h1.csv"
    raw_dir: "data/raw"
    processed_dir: "data/processed"

features:
  - step: returns
    enabled: true
    params:
      log: true
      col_name: close_logret

  - step: volatility
    enabled: false
    params:
      returns_col: close_logret
      rolling_windows: [24, 72, 168]
      ewma_spans: [24, 72]
      annualization_factor: 8760.0

  - step: trend
    enabled: true
    params:
      price_col: close
      sma_windows: [24, 72]
      ema_spans: [12, 24, 72]

  - step: trend_regime
    enabled: false
    params:
      price_col: close
      base_sma_for_sign: 72
      short_sma: 24
      long_sma: 72

  - step: session_context
    enabled: false
    params:
      timezone: UTC
      add_cyclical_time: true
      include_weekend_flag: true

  - step: regime_context
    enabled: true
    params:
      price_col: close
      returns_col: close_logret
      vol_short_window: 24
      vol_long_window: 168
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.35
      vol_ratio_low_threshold: 0.8

  - step: bollinger
    enabled: true
    params:
      price_col: close
      window: 24
      n_std: 2.0

  - step: macd
    enabled: false
    params:
      price_col: close
      fast: 12
      slow: 26
      signal: 9

  - step: ppo
    enabled: false
    params:
      price_col: close
      fast: 12
      slow: 26
      signal: 9

  - step: roc
    enabled: false
    params:
      price_col: close
      windows: [6, 24]

  - step: atr
    enabled: true
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      method: wilder
      add_over_price: true

  - step: shock_context
    enabled: false
    params:
      price_col: close
      high_col: high
      low_col: low
      returns_col: close_logret
      ema_col: close_ema_24
      atr_col: atr_24
      short_horizon: 1
      medium_horizon: 4
      vol_window: 24
      ret_z_threshold: 2.0
      atr_mult_threshold: 1.5
      distance_from_mean_threshold: 1.0
      post_shock_active_bars: 1

  - step: support_resistance
    enabled: false
    outputs:
      support_24: close_support_24
      resistance_24: close_resistance_24
    params:
      price_col: close
      high_col: high
      low_col: low
      windows: [24, 72]
      atr_col: atr_24
      include_pct_distance: true
      include_atr_distance: true

  - step: adx
    enabled: true
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24

  - step: volume_features
    enabled: true
    params:
      volume_col: volume
      atr_col: atr_24
      high_col: high
      low_col: low
      close_col: close
      atr_window: 24
      vol_z_window: 72

  - step: mfi
    enabled: false
    params:
      high_col: high
      low_col: low
      close_col: close
      volume_col: volume
      window: 24

  - step: rsi
    enabled: true
    params:
      price_col: close
      windows: [2, 14]
      method: wilder

  - step: stochastic
    enabled: false
    params:
      price_col: close
      high_col: high
      low_col: low
      window: 14
      smooth: 3

  - step: price_momentum
    enabled: false
    params:
      price_col: close
      windows: [6, 24]

  - step: return_momentum
    enabled: false
    params:
      returns_col: close_logret
      windows: [6, 24]

  - step: vol_normalized_momentum
    enabled: false
    params:
      returns_col: close_logret
      vol_col: vol_rolling_24
      windows: [6, 24]
      eps: 1.0e-8

  - step: lags
    enabled: true
    params:
      cols: [close_logret]
      lags: [1, 2, 6, 24]

  - step: macro_context
    enabled: false
    params:
      columns: [dxy_close, spx_close]
      availability_lag: 1
      lags: [1, 24]
      pct_change_periods: [1, 24]
      zscore_window: 168
      ema_spans: [24]
      allow_missing: true

  - step: feature_transforms
    enabled: true
    params:
      transforms:
        - source_col: volume_over_atr_24
          kind: rolling_clip
          output_col: volume_over_atr_24_rollclip_2520_q01_q99
          window: 2520
          lower_q: 0.01
          upper_q: 0.99
          shift: 1

# Multi-stage model catalog.
# Keep only the stages you want with `enabled: true`; disabled stages are ignored.
# The enabled stages run in ascending `stage` order.
# If you want a single-model run, set only one stage to `enabled: true` and usually make it `stage: 1`.
# RL agent kinds are intentionally omitted here because `model_stages` currently supports
# only forecasting/classification chains.
model_stages:
  - name: logistic_regression_clf
    enabled: true
    stage: 1
    kind: logistic_regression_clf
    params:
      C: 1.0
      max_iter: 1000
      solver: lbfgs
      random_state: 7
    preprocessing:
      scaler: standard
    feature_cols:
      - regime_vol_ratio_24_168
      - regime_trend_state_24_72
      - close_rsi_14
      - bb_percent_b_24_2.0
      - adx_24
      - volume_z_72
      - lag_close_logret_1
    target:
      kind: triple_barrier
      price_col: close
      open_col: open
      high_col: high
      low_col: low
      returns_col: close_logret
      max_holding: 24
      upper_mult: 1.5
      lower_mult: 1.5
      vol_window: 24
      neutral_label: drop
      side_col: null
      candidate_col: null
      candidate_mode: all_nonzero
      candidate_out_col: meta_candidate
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    runtime: {}
    env: {}
    use_features: true
    pred_prob_col: pred_prob
    pred_ret_col: null
    returns_input_col: null
    signal_col: null
    action_col: null
    overlay:
      kind: garch
      params:
        returns_input_col: close_logret
        mean_model: zero

  - name: lightgbm_clf
    enabled: false
    stage: 2
    kind: lightgbm_clf
    params:
      n_estimators: 400
      learning_rate: 0.03
      num_leaves: 31
      max_depth: 5
      subsample: 0.9
      colsample_bytree: 0.9
      min_child_samples: 20
      random_state: 7
    preprocessing:
      scaler: none
    feature_cols:
      - regime_vol_ratio_24_168
      - regime_vol_ratio_z_24_168
      - regime_trend_state_24_72
      - regime_absret_z_24_168
      - close_rsi_2
      - close_rsi_14
      - bb_percent_b_24_2.0
      - adx_24
      - volume_z_72
      - volume_over_atr_24
      - volume_over_atr_24_rollclip_2520_q01_q99
      - close_logret_mom_6
      - close_logret_norm_mom_24
      - lag_close_logret_1
    target:
      kind: triple_barrier
      price_col: close
      open_col: open
      high_col: high
      low_col: low
      returns_col: close_logret
      max_holding: 24
      upper_mult: 1.5
      lower_mult: 1.5
      vol_window: 24
      neutral_label: drop
      side_col: null
      candidate_col: null
      candidate_mode: all_nonzero
      candidate_out_col: meta_candidate
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    runtime: {}
    env: {}
    use_features: true
    pred_prob_col: lightgbm_pred_prob
    pred_ret_col: null
    returns_input_col: null
    signal_col: null
    action_col: null
    overlay:
      kind: garch
      params:
        returns_input_col: close_logret
        mean_model: zero

  - name: xgboost_clf
    enabled: false
    stage: 3
    kind: xgboost_clf
    params:
      n_estimators: 350
      learning_rate: 0.03
      num_leaves: null
      max_depth: 4
      subsample: 0.9
      colsample_bytree: 0.9
      min_child_samples: null
      random_state: 7
      min_child_weight: 5.0
      reg_lambda: 1.0
      objective: binary:logistic
      eval_metric: logloss
      tree_method: hist
    preprocessing:
      scaler: none
    feature_cols:
      - regime_vol_ratio_24_168
      - regime_vol_ratio_z_24_168
      - regime_trend_state_24_72
      - regime_absret_z_24_168
      - close_rsi_2
      - close_rsi_14
      - bb_percent_b_24_2.0
      - adx_24
      - volume_z_72
      - volume_over_atr_24
      - volume_over_atr_24_rollclip_2520_q01_q99
      - close_logret_mom_6
      - close_logret_norm_mom_24
      - lag_close_logret_1
    target:
      kind: triple_barrier
      price_col: close
      open_col: open
      high_col: high
      low_col: low
      returns_col: close_logret
      max_holding: 24
      upper_mult: 1.5
      lower_mult: 1.5
      vol_window: 24
      neutral_label: drop
      side_col: null
      candidate_col: null
      candidate_mode: all_nonzero
      candidate_out_col: meta_candidate
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    runtime: {}
    env: {}
    use_features: true
    pred_prob_col: xgboost_pred_prob
    pred_ret_col: null
    returns_input_col: null
    signal_col: null
    action_col: null
    overlay:
      kind: garch
      params:
        returns_input_col: close_logret
        mean_model: zero

  - name: sarimax_forecaster
    enabled: false
    stage: 4
    kind: sarimax_forecaster
    params:
      order: [1, 0, 1]
      seasonal_order: [0, 0, 0, 0]
      trend: c
      maxiter: 50
    feature_cols:
      - close_logret
      - vol_rolling_24
      - regime_vol_ratio_24_168
    target:
      kind: forward_return
      price_col: close
      returns_col: close_logret
      returns_type: log
      horizon: 1
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    pred_ret_col: sarimax_pred_ret
    pred_prob_col: sarimax_pred_prob
    overlay:
      kind: garch
      params:
        returns_input_col: close_logret
        mean_model: zero

  - name: garch_forecaster
    enabled: false
    stage: 5
    kind: garch_forecaster
    params:
      returns_input_col: close_logret
      mean_model: zero
    feature_cols:
      - close_logret
    target:
      kind: forward_return
      price_col: close
      returns_col: close_logret
      returns_type: log
      horizon: 1
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    pred_ret_col: garch_pred_ret
    pred_prob_col: garch_pred_prob

  - name: lstm_forecaster
    enabled: false
    stage: 6
    kind: lstm_forecaster
    params:
      lookback: 48
      hidden_dim: 64
      num_layers: 2
      dropout: 0.1
      epochs: 10
      batch_size: 64
      learning_rate: 0.001
      weight_decay: 0.0001
      scale_target: true
    feature_cols:
      - close_logret
      - vol_rolling_24
      - close_over_ema_24
      - close_logret_norm_mom_24
      - regime_vol_ratio_24_168
    target:
      kind: forward_return
      price_col: close
      returns_col: close_logret
      returns_type: log
      horizon: 1
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    pred_ret_col: lstm_pred_ret
    pred_prob_col: lstm_pred_prob
    overlay:
      kind: garch
      params:
        returns_input_col: close_logret
        mean_model: zero

  - name: patchtst_forecaster
    enabled: false
    stage: 7
    kind: patchtst_forecaster
    params:
      lookback: 64
      patch_len: 16
      patch_stride: 8
      hidden_dim: 64
      num_layers: 2
      num_heads: 4
      dropout: 0.1
      epochs: 10
      batch_size: 64
      learning_rate: 0.001
      weight_decay: 0.0001
      scale_target: true
    feature_cols:
      - close_logret
      - vol_rolling_24
      - close_over_ema_24
      - close_logret_norm_mom_24
      - regime_vol_ratio_24_168
    target:
      kind: forward_return
      price_col: close
      returns_col: close_logret
      returns_type: log
      horizon: 1
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    pred_ret_col: patchtst_pred_ret
    pred_prob_col: patchtst_pred_prob
    overlay:
      kind: garch
      params:
        returns_input_col: close_logret
        mean_model: zero

  - name: tft_forecaster
    enabled: false
    stage: 8
    kind: tft_forecaster
    params:
      lookback: 48
      hidden_dim: 64
      num_heads: 4
      num_layers: 2
      dropout: 0.1
      epochs: 10
      batch_size: 64
      learning_rate: 0.001
      weight_decay: 0.0001
      quantiles: [0.1, 0.5, 0.9]
      scale_target: true
    feature_cols:
      - close_logret
      - vol_rolling_24
      - close_over_ema_24
      - close_logret_norm_mom_24
      - hour_sin_24
      - hour_cos_24
      - regime_vol_ratio_24_168
    target:
      kind: forward_return
      price_col: close
      returns_col: close_logret
      returns_type: log
      horizon: 1
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    pred_ret_col: tft_pred_ret
    pred_prob_col: tft_pred_prob
    overlay:
      kind: garch
      params:
        returns_input_col: close_logret
        mean_model: zero

signals_catalog:
  none:
    enabled: false

  trend_state:
    enabled: false
    params:
      state_col: close_trend_state_sma_24_72
      signal_col: signal_trend_state
      mode: long_short_hold

  probability_threshold:
    enabled: true
    outputs:
      signal_col: signal_prob_threshold
    params:
      prob_col: pred_prob
      signal_col: signal_prob_threshold
      base_signal_col: null
      upper: 0.57
      upper_exit: 0.52
      lower: 0.43
      lower_exit: 0.48
      mode: long_short

  probability_conviction:
    enabled: false
    params:
      prob_col: pred_prob
      signal_col: signal_prob_conviction
      prob_center: 0.5
      clip: 1.0

  probability_vol_adjusted:
    enabled: false
    params:
      prob_col: pred_prob
      vol_col: pred_vol
      signal_col: signal_prob_vol_adj
      prob_center: 0.5
      upper: 0.56
      lower: 0.44
      vol_target: 0.0015
      clip: 0.6
      vol_floor: 1.0e-6
      min_signal_abs: 0.01
      activation_filters:
        - col: regime_vol_ratio_24_168
          op: ge
          value: 0.95
        - col: adx_24
          op: ge
          value: 20.0

  forecast_threshold:
    enabled: false
    params:
      forecast_col: pred_ret
      signal_col: signal_forecast_threshold
      upper: 0.001
      lower: -0.001
      mode: long_short

  forecast_vol_adjusted:
    enabled: false
    params:
      forecast_col: pred_ret
      vol_col: pred_vol
      signal_col: signal_forecast_vol_adj
      vol_target: 0.0015
      clip: 0.6
      vol_floor: 1.0e-6
      forecast_floor: 0.0

  rsi:
    enabled: false
    params:
      rsi_col: close_rsi_14
      signal_col: signal_rsi
      buy_level: 30.0
      sell_level: 70.0
      mode: long_short

  momentum:
    enabled: false
    params:
      momentum_col: close_logret_mom_24
      signal_col: signal_momentum
      upper: 0.0
      lower: 0.0
      mode: long_short

  stochastic:
    enabled: false
    params:
      k_col: close_stoch_k_14
      d_col: close_stoch_d_14
      signal_col: signal_stochastic
      lower_band: 20.0
      upper_band: 80.0
      mode: long_short
      
  volatility_regime:
    enabled: false
    params:
      vol_ratio_col: regime_vol_ratio_24_168
      signal_col: signal_volatility_regime
      high_threshold: 1.35
      low_threshold: 0.8
      high_signal: 1.0
      low_signal: 0.0

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.00015
  target_vol: null
  max_leverage: 1.0
  dd_guard:
    max_drawdown: 0.12
    rearm_drawdown: 0.08
    cooloff_bars: 48
    enabled: true
  vol_col: null

backtest:
  returns_col: close_logret
  signal_col: signal_prob_threshold
  periods_per_year: 8760
  returns_type: log
  missing_return_policy: raise_if_exposed
  min_holding_bars: 2
  subset: test
  vol_col: null

portfolio:
  enabled: false
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  expected_return_col: null
  covariance_window: 60
  covariance_rebalance_step: 1
  risk_aversion: 5.0
  trade_aversion: 0.0
  constraints: {}
  asset_groups: {}

monitoring:
  enabled: false
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 1000000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: false
  output_dir: logs/experiments
  run_name: null
