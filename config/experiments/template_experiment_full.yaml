        switching_penalty: 0.0

signals_catalog:
  none:
    enabled: false
  trend_state:
    enabled: false
    params:
      state_col: close_trend_state_sma_24_72
      signal_name: signal_trend_state
      mode: long_short_hold
  probability_threshold:
    enabled: false
    params:
      prob_col: pred_prob
      signal_name: signal_prob_threshold
      upper: 0.55
      lower: 0.45
      mode: long_short
  probability_conviction:
    enabled: false
    params:
      prob_col: pred_prob
      signal_name: signal_prob_conviction
      prob_center: 0.5
      clip: 1.0
  probability_vol_adjusted:
    enabled: true
    params:
      prob_col: pred_prob
      vol_col: pred_vol
      signal_name: signal_prob_vol_adj
      prob_center: 0.5
      upper: 0.56
      lower: 0.44
      vol_target: 0.0015
      clip: 0.6
      vol_floor: 1.0e-6
      min_signal_abs: 0.01
      activation_filters:
        - col: regime_vol_ratio_24_168
          op: ge
          value: 0.95
        - col: adx_24
          op: ge
          value: 20.0
  forecast_threshold:
    enabled: false
    params:
      forecast_col: pred_ret
      signal_name: signal_forecast_threshold
      upper: 0.001
      lower: -0.001
      mode: long_short
  forecast_vol_adjusted:
    enabled: false
    params:
      forecast_col: pred_ret
      vol_col: pred_vol
      signal_name: signal_forecast_vol_adj
      vol_target: 0.0015
      clip: 0.6
      vol_floor: 1.0e-6
      forecast_floor: 0.0
  rsi:
    enabled: false
    params:
      rsi_col: close_rsi_14
      signal_name: signal_rsi
      buy_level: 30.0
      sell_level: 70.0
      mode: long_short
  momentum:
    enabled: false
    params:
      momentum_col: close_logret_mom_24
      signal_name: signal_momentum
      upper: 0.0
      lower: 0.0
      mode: long_short
  stochastic:
    enabled: false
    params:
      k_col: close_stoch_k_14
      d_col: close_stoch_d_14
      signal_name: signal_stochastic
      lower_band: 20.0
      upper_band: 80.0
      mode: long_short
  volatility_regime:
    enabled: false
    params:
      vol_ratio_col: regime_vol_ratio_24_168
      signal_name: signal_volatility_regime
      high_threshold: 1.35
      low_threshold: 0.8
      high_signal: 1.0
      low_signal: 0.0

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.00015
  target_vol: null
  max_leverage: 1.0
  dd_guard:
    max_drawdown: 0.12
    cooloff_bars: 48
    enabled: true
  vol_col: null

backtest:
  returns_col: close_logret
  signal_col: signal_prob_vol_adj
  periods_per_year: 8760
  returns_type: log
  missing_return_policy: raise_if_exposed
  min_holding_bars: 2
  subset: test
  vol_col: null

portfolio:
  enabled: false
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  expected_return_col: null
  covariance_window: 60
  covariance_rebalance_step: 1
  risk_aversion: 5.0
  trade_aversion: 0.0
  constraints: {}
  asset_groups: {}

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 1000000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  run_name: template_experiment_full
  save_report: true
