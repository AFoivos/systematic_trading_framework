# Full self-contained experiment template covering the current supported config surface.
# Every tracked experiment should stay standalone and valid without inheritance.
#
# Important:
# - Feature steps support `enabled: true/false`.
# - To disable the model path, use `model.kind: none`.
# - To disable the signal path, use `signals.kind: none`.
# - This template lists all currently supported feature-step families and the currently
#   supported model/signal kinds as comments, but only one active `model.kind` and one
#   active `signals.kind` can be selected in a valid run.

data:
  source: dukascopy_csv
  interval: 1h
  start: "2017-01-01 00:00:00"
  end: null
  alignment: inner
  symbol: BTCUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: "template_experiment_full"
    save_raw: false
    save_processed: true
    load_path: "data/raw/dukas_copy_bank/btcusd_h1.csv"
    raw_dir: "data/raw"
    processed_dir: "data/processed"

features:
  - step: returns
    enabled: true
    params:
      log: true
      col_name: close_logret

  - step: volatility
    enabled: true
    params:
      returns_col: close_logret
      rolling_windows: [24, 72, 168]
      ewma_spans: [24, 72]
      annualization_factor: 8760.0

  - step: trend
    enabled: true
    params:
      price_col: close
      sma_windows: [24, 72]
      ema_spans: [12, 24, 72]

  - step: trend_regime
    enabled: true
    params:
      price_col: close
      base_sma_for_sign: 72
      short_sma: 24
      long_sma: 72

  - step: session_context
    enabled: true
    params:
      timezone: UTC
      add_cyclical_time: true
      include_weekend_flag: true

  - step: regime_context
    enabled: true
    params:
      price_col: close
      returns_col: close_logret
      vol_short_window: 24
      vol_long_window: 168
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.35
      vol_ratio_low_threshold: 0.8

  - step: bollinger
    enabled: true
    params:
      price_col: close
      window: 24
      n_std: 2.0

  - step: macd
    enabled: true
    params:
      price_col: close
      fast: 12
      slow: 26
      signal: 9

  - step: ppo
    enabled: true
    params:
      price_col: close
      fast: 12
      slow: 26
      signal: 9

  - step: roc
    enabled: true
    params:
      price_col: close
      windows: [6, 24]

  - step: atr
    enabled: true
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      method: wilder
      add_over_price: true

  - step: adx
    enabled: true
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24

  - step: volume_features
    enabled: true
    params:
      volume_col: volume
      atr_col: atr_24
      high_col: high
      low_col: low
      close_col: close
      atr_window: 24
      vol_z_window: 72

  - step: mfi
    enabled: false
    params:
      high_col: high
      low_col: low
      close_col: close
      volume_col: volume
      window: 24

  - step: rsi
    enabled: true
    params:
      price_col: close
      windows: [2, 14]
      method: wilder

  - step: stochastic
    enabled: false
    params:
      price_col: close
      high_col: high
      low_col: low
      window: 14
      smooth: 3

  - step: price_momentum
    enabled: true
    params:
      price_col: close
      windows: [6, 24]

  - step: return_momentum
    enabled: true
    params:
      returns_col: close_logret
      windows: [6, 24]

  - step: vol_normalized_momentum
    enabled: true
    params:
      returns_col: close_logret
      vol_col: vol_rolling_24
      windows: [6, 24]
      eps: 1.0e-8

  - step: lags
    enabled: true
    params:
      cols: [close_logret]
      lags: [1, 2, 6, 24]

  - step: macro_context
    enabled: false
    params:
      columns: [dxy_close, spx_close]
      availability_lag: 1
      lags: [1, 24]
      pct_change_periods: [1, 24]
      zscore_window: 168
      ema_spans: [24]
      allow_missing: true

  - step: feature_transforms
    enabled: true
    params:
      transforms:
        - source_col: volume_over_atr_24
          kind: rolling_clip
          output_col: volume_over_atr_24_rollclip_2520_q01_q99
          window: 2520
          lower_q: 0.01
          upper_q: 0.99
          shift: 1

models:
  none:
    enabled: false
  logistic_regression_clf:
    enabled: false
    params:
      C: 1.0
      max_iter: 1000
      solver: lbfgs
      random_state: 7
    feature_cols:
      - regime_vol_ratio_24_168
      - regime_trend_state_24_72
      - close_rsi_14
      - bb_percent_b_24_2.0
      - adx_24
      - volume_z_72
      - lag_close_logret_1
    target:
      kind: triple_barrier
      price_col: close
      open_col: open
      high_col: high
      low_col: low
      returns_col: close_logret
      max_holding: 24
      upper_mult: 1.5
      lower_mult: 1.5
      vol_window: 24
      neutral_label: drop
    split:
      method: walk_forward
      train_size: 8760
      test_size: 336
      step_size: 336
      expanding: true
      max_folds: null
    runtime: {}
    env: {}
    use_features: true
    pred_prob_col: null
    pred_ret_col: null
    returns_input_col: null
    signal_col: null
    action_col: null
    overlay:
      kind: garch
      params:
        returns_input_col: close_logret
        mean_model: zero
  lightgbm_clf:
