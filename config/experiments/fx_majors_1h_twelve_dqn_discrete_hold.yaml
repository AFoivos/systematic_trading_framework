extends: experiments/fx_majors_1h_twelve_handcrafted_state.yaml

data:
  start: "2025-11-01"
  storage:
    dataset_id: "fx_majors_1h_twelve_dqn_discrete_hold"

model:
  kind: dqn_agent
  params:
    policy: MlpPolicy
    total_timesteps: 5000
    learning_starts: 500
    buffer_size: 20000
    batch_size: 64
    train_freq: 1
    gradient_steps: 1
    target_update_interval: 250
    exploration_fraction: 0.30
    exploration_initial_eps: 1.0
    exploration_final_eps: 0.05
    learning_rate: 0.0005
    gamma: 0.99
    device: cpu
    extractor:
      kind: transformer
      features_dim: 64
      hidden_dim: 64
      num_layers: 2
      num_heads: 4
      dropout: 0.1
  split:
    method: walk_forward
    train_size: 2160
    test_size: 168
    step_size: 168
    expanding: false
    max_folds: 4
  env:
    window_size: 48
    execution_lag_bars: 1
    action_space: discrete
    position_grid: [-0.2, 0.0, 0.2]
    max_signal_abs: 0.2
    reward:
      cost_per_turnover: 0.0001
      slippage_per_turnover: 0.0
      inventory_penalty: 0.0
      drawdown_penalty: 0.0
      switching_penalty: 0.0

logging:
  run_name: fx_majors_1h_twelve_dqn_discrete_hold_v1
