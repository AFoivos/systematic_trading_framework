extends: base/hourly.yaml

data:
  source: twelve_data
  symbol: "BTC/USD"
  interval: "1h"
  start: "2024-01-01"
  end: null
  api_key_env: "TWELVEDATA_API_KEY"
  storage:
    mode: live_or_cached
    dataset_id: "usdbtc_1h_twelve_vol_regime"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72]
      ewma_spans: [24]
      annualization_factor: 8760.0

model:
  kind: none

signals:
  kind: volatility_regime
  params:
    vol_col: vol_rolling_24
    quantile: 0.4
    signal_name: signal_vol_regime
    mode: long_short_hold

risk:
  target_vol: null
  max_leverage: 1.0
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.0

backtest:
  returns_col: close_logret
  signal_col: signal_vol_regime
  periods_per_year: 8760
  returns_type: log

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false

logging:
  run_name: usdbtc_1h_twelve_vol_regime_v1
