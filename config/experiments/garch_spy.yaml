extends: base/daily.yaml

data:
  symbol: "SPY"
  start: "2015-01-01"
  end: null
  storage:
    mode: live_or_cached
    dataset_id: "spy_daily_core"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: false
      col_name: close_ret
  - step: volatility
    params:
      returns_col: close_ret
      rolling_windows: [20, 60]
      ewma_spans: [20]
  - step: lags
    params:
      cols: [close_ret]
      lags: [1, 2, 5]

model:
  kind: garch_forecaster
  target:
    kind: forward_return
    price_col: close
    horizon: 5
  split:
    method: walk_forward
    train_size: 504
    test_size: 63
    step_size: 63
    expanding: true
  params:
    returns_input_col: close_ret
    mean_model: ar1

signals:
  kind: forecast_vol_adjusted
  params:
    forecast_col: pred_ret
    vol_col: pred_vol
    signal_name: signal_forecast_vol_adj
    clip: 1.0
    vol_floor: 1.0e-6

backtest:
  returns_col: close_ret
  signal_col: signal_forecast_vol_adj
  periods_per_year: 252
  returns_type: simple

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: true
  mode: paper
  capital: 1000000
  price_col: close
  min_trade_notional: 1000

logging:
  run_name: garch_spy_v1
