strategy:
  name: Causal Trend-VWAP Pullback Continuation with Path-Dependent Expected-R
  version: yaml6
  stage: Ehlers market structure and final 4-of-5 trend score
  symbol: US100
  timeframe: M30
  direction: long_only
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: US100
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: us100_m30_trend_vwap_expected_r_yaml6
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/us100_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed/trend_vwap_expected_r_us100_m30
features:
- step: trend_vwap_pullback_candidate
  params:
    stage: 6
    timezone: America/New_York
    session_open: 09:30
    session_close: '16:00'
    timestamp_convention: bar_start
  enabled: true
model:
  kind: lightgbm_regressor
  params:
    n_estimators: 400
    learning_rate: 0.025
    num_leaves: 15
    max_depth: 5
    min_child_samples: 120
    subsample: 0.8
    colsample_bytree: 0.75
    reg_alpha: 0.25
    reg_lambda: 2.0
    random_state: 7
    n_jobs: 1
    verbosity: -1
  preprocessing:
    scaler: none
  calibration: {}
  feature_cols:
  - atr_over_price_20
  - d_vwap_atr
  - d_vwap_pct
  - d_ema50_atr
  - ema50_ema100_spread_atr
  - return_1
  - return_4
  - return_4_atr
  - vwap_reclaim_cross
  - log_return_1
  - return_2
  - return_8
  - return_16
  - return_1_atr
  - return_2_atr
  - return_8_atr
  - return_16_atr
  - return_1_vol96
  - return_2_vol96
  - return_4_vol96
  - return_8_vol96
  - return_16_vol96
  - return_1_robust_z96
  - return_4_robust_z96
  - return_8_robust_z96
  - return_1_atr_lag_1
  - return_1_atr_lag_2
  - return_1_atr_lag_3
  - return_2_atr_lag_1
  - return_2_atr_lag_2
  - return_2_atr_lag_3
  - return_4_atr_lag_1
  - return_4_atr_lag_2
  - return_4_atr_lag_3
  - return_8_atr_lag_1
  - return_8_atr_lag_2
  - return_8_atr_lag_3
  - return_16_atr_lag_1
  - return_16_atr_lag_2
  - return_16_atr_lag_3
  - return_1_vol96_lag_1
  - return_1_vol96_lag_2
  - return_1_vol96_lag_3
  - return_2_vol96_lag_1
  - return_2_vol96_lag_2
  - return_2_vol96_lag_3
  - return_4_vol96_lag_1
  - return_4_vol96_lag_2
  - return_4_vol96_lag_3
  - return_8_vol96_lag_1
  - return_8_vol96_lag_2
  - return_8_vol96_lag_3
  - return_16_vol96_lag_1
  - return_16_vol96_lag_2
  - return_16_vol96_lag_3
  - return_1_robust_z96_lag_1
  - return_1_robust_z96_lag_2
  - return_1_robust_z96_lag_3
  - return_4_robust_z96_lag_1
  - return_4_robust_z96_lag_2
  - return_4_robust_z96_lag_3
  - return_8_robust_z96_lag_1
  - return_8_robust_z96_lag_2
  - return_8_robust_z96_lag_3
  - d_ema20_atr
  - ema20_slope_5_atr
  - ema50_slope_5_atr
  - ema50_slope_10_atr
  - rolling_log_price_slope_96
  - rolling_log_price_r2_96
  - trend_vwap_trend_score
  - session_vwap_slope_5_atr
  - d_rolling_vwap40_atr
  - d_vwap_atr_robust_z96
  - d_vwap_atr_percent_rank_252
  - d_vwap_atr_lag_1
  - d_vwap_atr_lag_2
  - d_vwap_atr_lag_3
  - d_vwap_atr_lag_4
  - vwap_loss_cross
  - prior_8_max_d_vwap_atr
  - prior_4_min_d_vwap_atr
  - pullback_depth_atr
  - bars_since_d_vwap_expansion_080
  - ppo_12_26
  - ppo_signal_9
  - ppo_hist_12_26_9
  - ppo_hist_diff_1
  - ppo_hist_diff_2
  - ppo_hist_zero_cross
  - stoch_rsi_14_k
  - stoch_rsi_14_d
  - stoch_rsi_bullish_cross
  - stoch_rsi_bearish_cross
  - mfi_14
  - mfi_14_centered
  - mama_fama_spread_atr
  - mama_fama_bullish_cross
  - decycler_oscillator_30_60_atr
  - roofing_filter_48_10_robust_z96
  - roofing_filter_slope_atr
  - roofing_filter_zero_cross
  - acp_dominant_period_10_48
  - acp_power_10_48
  - acp_period_std_24
  - hilbert_amplitude_64_atr
  - hilbert_phase_sin_64
  - hilbert_phase_cos_64
  - hilbert_period_64
  target:
    kind: triple_barrier
    label_mode: meta
    candidate_col: trend_vwap_base_candidate
    side_col: trend_vwap_candidate_side
    candidate_mode: all_nonzero
    entry_price_mode: next_open
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    volatility_col: atr_over_price_20
    lower_mult: 1.5
    upper_mult: 3.0
    max_holding: 16
    add_r_multiple: true
    target_col: tb_oriented_r
    oriented_r_col: tb_oriented_r
    r_col: tb_event_r
    r_clip:
    - -1.25
    - 2.25
    tie_break: lower
    neutral_label: lower
    label_col: tb_label
    event_ret_col: tb_event_ret
    candidate_out_col: tb_candidate
  split:
    method: purged
    train_size: 35040
    test_size: 4380
    step_size: 4380
    expanding: true
    max_folds: 17
    purge_bars: 24
    embargo_bars: 24
  runtime: {}
  env: {}
  use_features: true
  pred_ret_col: pred_tb_oriented_r
  pred_prob_col: pred_tb_positive_prob
  pred_is_oos_col: pred_is_oos
  returns_input_col: null
  signal_col: null
  action_col: null
signals:
  kind: forecast_threshold_candidate
  params:
    forecast_col: pred_tb_oriented_r
    pred_is_oos_col: pred_is_oos
    signal_col: signal_trend_vwap_expected_r
    upper: 0.0
    lower: -999.0
    inclusive: true
    mode: long_only
    activation_filters:
    - col: trend_vwap_base_candidate
      op: ge
      value: 1.0
    - col: pred_is_oos
      op: ge
      value: 1.0
    candidate_col: accepted_trend_vwap_candidate
    side_col: accepted_trend_vwap_side
    strength_col: accepted_predicted_r
    threshold_distance_col: accepted_predicted_r_margin
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  engine: manual_barrier
  signal_col: signal_trend_vwap_expected_r
  returns_col: return_1
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: false
  stop_mode: volatility_stop
  vol_col: atr_over_price_20
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 3.0
  stop_loss_r: 1.5
  risk_per_trade: 0.003
  max_holding_bars: 16
  dynamic_exits:
    enabled: false
  partial_exits:
    enabled: false
portfolio:
  enabled: false
  construction: signal_weights
  long_short: false
  gross_target: 1.0
monitoring:
  enabled: false
  psi_threshold: 0.2
  n_bins: 10
diagnostics:
  enabled: true
  model:
    enabled: false
  trade_path:
    enabled: false
  robustness:
    enabled: true
    cost_multipliers:
    - 1.0
    - 2.0
    - 3.0
    - 5.0
    entry_delay_bars:
    - 1
    - 2
    walk_forward_frequency: YE
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
logging:
  enabled: true
  run_name: us100_m30_trend_vwap_expected_r_yaml6
  output_dir: logs/experiments/trend_vwap_expected_r_us100_m30
  save_model: false
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
validation:
  method: purged_walk_forward
  purge_bars: 24
  embargo_bars: 24
evaluation:
  strict_oos_only: true
research_metadata:
  ladder: trend_vwap_expected_r_us100_m30
  yaml_stage: 6
  feature_stage: 6
  forecast_threshold_r: 0.0
  random_search_used: false
