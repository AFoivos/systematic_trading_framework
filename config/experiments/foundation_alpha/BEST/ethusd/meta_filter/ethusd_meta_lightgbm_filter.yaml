experiment:
  name: ethusd_meta_lightgbm_filter
  kind: ethusd_stacked_meta_filter_diagnostic
  role: lightgbm_meta_filter
base_config: config/experiments/foundation_alpha/BEST/ethusd/BEST_ethusd_30m_lightgbm_h24_structured_tail_alpha_v3_7_ehlers_trend_hybrid_trial_0054_manual_barrier.yaml
script: scripts/run_ethusd_meta_model_comparison.py
candidate_dataset:
  processed_dataset: data/processed/processed/ethusd_30m_lightgbm_h24_structured_tail_alpha_v3_7_ehlers_trend_hybrid_179ecc87_trial_0054/dataset.csv
  prediction_csv: logs/experiments/ethusd_30m_lightgbm_h24_structured_tail_alpha_v3_7_ehlers_trend_hybrid_trial_0041_0058_20260710_111948_120452_ecc3f515/artifacts/diagnostics/prediction_distribution.csv
  require_primary_oos: true
meta_filter:
  model_kind: lightgbm_clf
  label_col: meta_label_min_0_50r
  diagnostic_label_cols:
    - meta_label_positive
    - meta_label_min_1_00r
  scaler: none
  calibration:
    method: none
  purge_bars: 24
  embargo_bars: 24
  thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75]
  threshold_selection: validation_only_broad_plateau
signal:
  kind: meta_probability_side
  params:
    prob_col: meta_pred_prob
    side_col: primary_candidate_side
    candidate_col: primary_candidate
    pred_is_oos_col: meta_pred_is_oos
    threshold: 0.65
    signal_col: signal_meta_filtered
    mode: long_short
