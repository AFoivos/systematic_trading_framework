strategy:
  name: dense_return_forecasting_v2
  timeframe: 30m
  assets:
    - XAUUSD
    - US100
    - US30
    - SPX500
    - GER40

data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbols:
    - XAUUSD
    - US100
    - US30
    - SPX500
    - GER40
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: dense_return_forecasting_v2_30m
    save_raw: false
    save_processed: true
    load_paths:
      XAUUSD: data/raw/dukascopy_30m_clean/xauusd_30m.csv
      US100: data/raw/dukascopy_30m_clean/us100_30m.csv
      US30: data/raw/dukascopy_30m_clean/us30_30m.csv
      SPX500: data/raw/dukascopy_30m_clean/spx500_30m.csv
      GER40: data/raw/dukascopy_30m_clean/ger40_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed

features:
  - step: returns
    outputs:
      close_ret: close_ret
    params:
      log: false
      col_name: close_ret
  - step: volatility
    outputs:
      vol_rolling_10: realized_vol_10
      vol_rolling_20: realized_vol_20
    params:
      returns_col: close_ret
      rolling_windows: [10, 20]
      ewma_spans: []
      annualization_factor: null
  - step: trend
    params:
      price_col: close
      sma_windows: []
      ema_spans: [20, 50, 100]
      ema_col_template: "ema_{span}"
  - step: adx
    outputs:
      adx_14: adx_14
      plus_di_14: plus_di_14
      minus_di_14: minus_di_14
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 14
      windows: [14]
  - step: macd
    outputs:
      macd_12_26: macd
      macd_signal_9: macd_signal
      macd_hist_12_26_9: macd_hist
    params:
      price_col: close
      fast: 12
      slow: 26
      signal: 9
  - step: rsi
    outputs:
      close_rsi_14: rsi_14
    params:
      price_col: close
      windows: [14]
      method: wilder
  - step: stochastic_rsi
    outputs:
      stoch_rsi_k: stoch_rsi_k
      stoch_rsi_d: stoch_rsi_d
      stoch_rsi_k_minus_d: stoch_rsi_k_minus_d
      stoch_rsi_cross_up: stoch_rsi_cross_up
      stoch_rsi_cross_down: stoch_rsi_cross_down
      stoch_rsi_oversold: stoch_rsi_oversold
      stoch_rsi_overbought: stoch_rsi_overbought
      stoch_rsi_slope: stoch_rsi_slope
      stoch_rsi_recover_from_oversold: stoch_rsi_recover_from_oversold
      stoch_rsi_fall_from_overbought: stoch_rsi_fall_from_overbought
    params:
      price_col: close
      rsi_period: 14
      stoch_period: 14
      k_period: 3
      d_period: 3
      oversold: 0.20
      overbought: 0.80
      prefix: stoch_rsi
  - step: roc
    outputs:
      roc_3: roc_3
      roc_6: roc_6
    params:
      price_col: close
      windows: [3, 6]
  - step: atr
    outputs:
      atr_14: atr_14
      atr_over_price_14: atr_pct
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 14
      windows: [14]
      method: wilder
      add_over_price: true
  - step: bollinger
    outputs:
      bb_ma_20: bollinger_mid_20
      bb_upper_20_2.0: bollinger_upper_20
      bb_lower_20_2.0: bollinger_lower_20
      bb_width_20_2.0: bollinger_bandwidth
      bb_percent_b_20_2.0: bollinger_percent_b
    params:
      price_col: close
      window: 20
      n_std: 2.0
  - step: indicator_pullback
    params:
      asset_vocab: [XAUUSD, US100, US30, SPX500, GER40]
      asset_aliases:
        NAS100: US100
      open_col: open
      high_col: high
      low_col: low
      close_col: close
      ema_fast_period: 20
      ema_mid_period: 50
      ema_slow_period: 100
      atr_period: 14
      atr_pct_rank_window: 100
      macd_hist_col: macd_hist
      rsi_period: 14
      stoch_k_col: stoch_rsi_k
      stoch_d_col: stoch_rsi_d
      bollinger_bandwidth_col: bollinger_bandwidth
      bollinger_percent_b_col: bollinger_percent_b
      bb_bandwidth_rank_window: 100
      realized_vol_windows: [10, 20]
      return_windows: [1, 2, 3, 5, 6, 10, 20]
      rolling_return_windows: [4, 8]
  - step: lags
    params:
      cols:
        - close_ret
      lags: [1, 3, 5, 10, 20]
      prefix: lag
  - step: lags
    params:
      cols:
        - rolling_return_4
        - rolling_return_8
        - rsi_14
        - macd_hist
        - adx_14
        - bollinger_percent_b
      lags: [3, 5]
      prefix: lag
  - step: feature_transforms
    params:
      transforms:
        - source_col: ret_1
          kind: rolling_zscore
          output_col: ret_1_z_100
          window: 100
          shift: 1
        - source_col: ret_3
          kind: rolling_zscore
          output_col: ret_3_z_100
          window: 100
          shift: 1
        - source_col: ret_5
          kind: rolling_zscore
          output_col: ret_5_z_100
          window: 100
          shift: 1
        - source_col: ret_10
          kind: rolling_zscore
          output_col: ret_10_z_100
          window: 100
          shift: 1
        - source_col: ret_20
          kind: rolling_zscore
          output_col: ret_20_z_100
          window: 100
          shift: 1

model:
  kind: lightgbm_regressor
  minimum_expected_features: 50
  outputs:
    pred_ret_col: pred_ret
    pred_prob_col: pred_prob
    pred_is_oos_col: pred_is_oos
  target:
    kind: future_return_regression
    price_col: close
    returns_col: close_ret
    returns_type: simple
    horizon_bars: 8
    normalize_by_volatility: true
    volatility_col: atr_14
    clip: [-3.0, 3.0]
    fwd_col: target_future_return_v2
    label_col: target_future_return_v2
  split:
    method: purged
    train_frac: 0.70
    test_size: 5000
    step_size: 5000
    expanding: true
    max_folds: 4
    purge_bars: 8
    embargo_bars: 4
  feature_selectors:
    include:
      - regex: "^close_over_ema_"
      - regex: "^ema_slope_"
      - regex: "^distance_from_ema[0-9]+_atr$"
      - exact:
          - ema_alignment_score
          - adx_14
          - macd
          - macd_signal
          - macd_hist
          - macd_hist_slope
          - rsi_14
          - rsi_14_slope
          - stoch_rsi_k
          - stoch_rsi_d
          - stoch_rsi_cross_up
          - stoch_rsi_cross_down
          - roc_3
          - roc_6
          - atr_14
          - atr_pct
          - atr_pct_rank_100
          - realized_vol_10
          - realized_vol_20
          - bollinger_bandwidth
          - bollinger_bandwidth_rank_100
          - bollinger_percent_b
          - body_ratio
          - upper_wick_ratio
          - lower_wick_ratio
          - close_location
          - range_to_atr
          - ret_1
          - ret_3
          - ret_5
          - ret_10
          - ret_20
          - ret_1_z_100
          - ret_3_z_100
          - ret_5_z_100
          - ret_10_z_100
          - ret_20_z_100
          - rolling_return_4
          - rolling_return_8
          - lag_close_ret_1
          - lag_close_ret_3
          - lag_close_ret_5
          - lag_close_ret_10
          - lag_close_ret_20
          - lag_rolling_return_4_3
          - lag_rolling_return_4_5
          - lag_rolling_return_8_3
          - lag_rolling_return_8_5
          - lag_rsi_14_3
          - lag_rsi_14_5
          - lag_macd_hist_3
          - lag_macd_hist_5
          - lag_adx_14_3
          - lag_adx_14_5
          - lag_bollinger_percent_b_3
          - lag_bollinger_percent_b_5
          - asset_id
    strict:
      min_count: 50
  params:
    n_estimators: 300
    learning_rate: 0.03
    max_depth: 6
    num_leaves: 31
    min_child_samples: 40
    subsample: 0.9
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: 1
    verbosity: -1

signals:
  kind: dense_return_forecast
  outputs:
    signal_col: expected_net_return
  params:
    forecast_col: pred_ret
    signal_col: expected_net_return
    expected_net_return_col: expected_net_return
    estimated_cost_col: estimated_round_trip_cost
    cost_per_turnover: 0.00015
    slippage_per_turnover: 0.00010
    cost_round_trip_mult: 2.0
    forecast_is_vol_normalized: true
    volatility_col: atr_14
    price_col: close
    signed_cost_adjustment: true

validation:
  method: purged_walk_forward
  purge_bars: 8
  embargo_bars: 4

metrics:
  primary:
    - expectancy_r
    - profit_factor
    - max_drawdown
    - sharpe
    - sortino
  regression:
    - mae
    - rmse
    - r2
    - correlation
    - directional_accuracy
  trading:
    - trades_per_asset
    - win_rate
    - avg_win_r
    - avg_loss_r
    - max_consecutive_losses

runtime:
  seed: 42
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.00010
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: true
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null

backtest:
  engine: vectorized
  signal_col: expected_net_return
  returns_col: close_ret
  returns_type: simple
  subset: test
  min_holding_bars: 0
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  vol_col: null

portfolio:
  enabled: true
  construction: signal_weights
  long_short: true
  gross_target: 1.0
  expected_return_col: expected_net_return
  selection:
    enabled: true
    top_k: 2
    min_expected_net_return: 0.05
    rank_by_abs: true
    weighting: score
    rebalance_every_n_bars: 4
  covariance_window: 240
  covariance_rebalance_step: 48
  risk_aversion: 8.0
  trade_aversion: 0.0
  constraints:
    max_gross_leverage: 1.0
    max_weight: 0.35
    min_weight: -0.35
    target_net_exposure: 0.0
    enforce_target_net_exposure: false
  asset_groups:
    XAUUSD: metals
    US100: us_indices
    US30: us_indices
    SPX500: us_indices
    GER40: european_indices

evaluation:
  primary_metric: sharpe
  secondary_metrics:
    - profit_factor
    - max_drawdown
    - sharpe
    - trade_count
    - turnover
    - cost_to_gross_pnl

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

diagnostics:
  enabled: true
  model:
    enabled: true
    shap:
      enabled: true
      max_rows: 200
      top_n_features: 12
      per_prediction_top_k: 5
      per_prediction_row_limit: 3
      random_state: 42
  forecast:
    quantiles: 10
    autocorrelation_lags: [1, 2, 4, 8, 16]
    volatility_col: atr_pct_rank_100

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}
  hysteresis:
    enabled: true
    entry_threshold: 0.15
    exit_threshold: 0.05
    min_holding_bars: 4

logging:
  enabled: true
  run_name: dense_return_forecasting_v2
  output_dir: logs/experiments
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 36
    max_assets: 3
