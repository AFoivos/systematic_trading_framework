strategy:
  name: US100 M30 Trend-VWAP Expected Realized R Example
  version: 1
  symbol: US100
  timeframe: M30
  direction: long_only
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: US100
  pit:
    timestamp_alignment: {source_timezone: UTC, output_timezone: UTC, normalize_daily: false, duplicate_policy: last}
    corporate_actions: {policy: none, adj_close_col: adj_close}
    universe_snapshot: {inactive_policy: raise}
  storage:
    mode: cached_only
    dataset_id: us100_m30_trend_vwap_expected_realized_r_example
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/us100_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed/trade_evaluation_examples
features:
- step: trend_vwap_pullback_candidate
  params: {stage: 2, timezone: America/New_York, session_open: "09:30", session_close: "16:00", timestamp_convention: bar_start}
model:
  kind: lightgbm_regressor
  feature_cols: [atr_over_price_20, d_vwap_atr, d_vwap_pct, d_ema50_atr, ema50_ema100_spread_atr, return_1, return_4, return_4_atr, vwap_reclaim_cross, trend_vwap_trend_score]
  target:
    kind: expected_realized_r
    candidate_col: trend_vwap_base_candidate
    side_col: trend_vwap_candidate_side
    open_col: open
    high_col: high
    low_col: low
    close_col: close
    volatility_col: atr_over_price_20
    entry_price_mode: next_open
    stop_mode: volatility_stop
    take_profit_r: 3.0
    stop_loss_r: 1.5
    max_holding_bars: 16
    cost_per_unit_turnover: 0.00015
    slippage_per_unit_turnover: 0.00010
    tie_break: conservative
    allow_partial_horizon: false
    strict_path_validation: true
    fwd_col: target_realized_r
  split: {method: purged, train_size: 35040, test_size: 4380, step_size: 4380, expanding: true, max_folds: 17, purge_bars: 24, embargo_bars: 24}
  params: {n_estimators: 300, learning_rate: 0.03, num_leaves: 15, max_depth: 5, min_child_samples: 100, subsample: 0.8, colsample_bytree: 0.8, reg_alpha: 0.25, reg_lambda: 2.0, random_state: 7, n_jobs: 1, verbosity: -1}
  preprocessing: {scaler: none}
  calibration: {}
  runtime: {}
  env: {}
  use_features: true
  pred_ret_col: pred_expected_realized_r
  pred_prob_col: pred_positive_realized_r
  pred_is_oos_col: pred_is_oos
signals:
  kind: forecast_threshold_candidate
  params:
    forecast_col: pred_expected_realized_r
    pred_is_oos_col: pred_is_oos
    signal_col: signal_expected_realized_r
    upper: 0.0
    lower: -999.0
    inclusive: true
    mode: long_only
    activation_filters:
    - {col: trend_vwap_base_candidate, op: ge, value: 1.0}
    candidate_col: accepted_candidate
    side_col: accepted_side
    strength_col: accepted_expected_r
    threshold_distance_col: accepted_expected_r_margin
target: {}
validation: {method: purged_walk_forward, purge_bars: 24, embargo_bars: 24}
runtime: {seed: 7, repro_mode: strict, deterministic: true, threads: 1, seed_torch: false}
risk: {cost_per_turnover: 0.00015, slippage_per_turnover: 0.00010, target_vol: null, max_leverage: 1.0, sizing: {}, dd_guard: {enabled: false}, portfolio_guard: {}, drawdown_sizing: {}, vol_col: null}
backtest: {engine: manual_barrier, signal_col: signal_expected_realized_r, returns_col: return_1, returns_type: simple, subset: full, periods_per_year: 12096, missing_return_policy: raise_if_exposed, allow_short: false, stop_mode: volatility_stop, vol_col: atr_over_price_20, open_col: open, high_col: high, low_col: low, close_col: close, take_profit_r: 3.0, stop_loss_r: 1.5, risk_per_trade: 0.003, max_holding_bars: 16, dynamic_exits: {enabled: false}, partial_exits: {enabled: false}}
portfolio: {enabled: false, construction: signal_weights, long_short: false, gross_target: 1.0}
monitoring: {enabled: false, psi_threshold: 0.2, n_bins: 10}
diagnostics: {enabled: true, model: {enabled: false}, trade_path: {enabled: false}, robustness: {enabled: false}}
execution: {enabled: false, mode: paper, capital: 100000.0, price_col: close}
logging: {enabled: true, run_name: us100_m30_trend_vwap_expected_realized_r_example, output_dir: logs/experiments/trade_evaluation_examples, save_model: false}
evaluation: {strict_oos_only: true}
research_metadata: {source_strategy: trend_vwap_expected_r_us100_m30, supervised_target: expected_realized_r}
