strategy:
  name: ehlers_continuation_short_without_decycler
  timeframe: 30m
  assets:
    - SPX500
  description: Ehlers continuation short ablation without the Decycler Oscillator < 0 confirmation.

data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: SPX500
  storage:
    mode: cached_only
    dataset_id: ehlers_continuation_short_without_decycler
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/spx500_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed

features:
  - step: returns
    params:
      log: false
      col_name: close_ret
  - step: trend
    params:
      price_col: close
      sma_windows: []
      ema_spans: [50, 100]
      ema_col_template: "ema_{span}"
  - step: mama
    params:
      price_col: close
      output_col: mama
  - step: fama
    params:
      price_col: close
      output_col: fama
  - step: roofing_filter
    params:
      price_col: close
      high_pass_period: 48
      low_pass_period: 10
      slope_bars: 1
      output_col: roofing_filter_48_10
      slope_col: roofing_filter_48_10_slope
  - step: decycler_oscillator
    params:
      price_col: close
      fast_period: 30
      slow_period: 60
      output_col: decycler_oscillator_30_60
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 14
      windows: [14]
      method: wilder
      add_over_price: true
      atr_col: atr_14
      over_price_col: atr_over_price_14

model:
  kind: none

signals:
  kind: ehlers_continuation_short
  params:
    entry_mode: state
    entry_delay_bars: 0
    short_only: true
    use_ema_regime: true
    use_mama_fama: true
    use_roofing_lt_slope: true
    use_decycler: false
    ema_fast_col: ema_50
    ema_slow_col: ema_100
    mama_col: mama
    fama_col: fama
    roofing_col: roofing_filter_48_10
    roofing_slope_col: roofing_filter_48_10_slope
    decycler_osc_col: decycler_oscillator_30_60
    state_col: ehlers_continuation_short_state
    entry_col: ehlers_continuation_short_entry
    signal_col: ehlers_continuation_signal
    candidate_col: ehlers_continuation_candidate

target: {}

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null

backtest:
  engine: manual_barrier
  signal_col: ehlers_continuation_signal
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: true
  long_only: false
  short_only: true
  stop_mode: volatility_stop
  vol_col: atr_over_price_14
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 3.0
  stop_loss_r: 1.5
  risk_per_trade: 0.006
  max_holding_bars: null
  dynamic_exits: {}

portfolio:
  enabled: false
  construction: signal_weights
  long_short: true
  gross_target: 1.0

monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10

diagnostics:
  enabled: true
  robustness:
    enabled: true
    cost_multipliers: [2.0, 3.0, 5.0]
    entry_delay_bars: [1, 2]
    walk_forward_frequency: YE

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close

logging:
  enabled: true
  run_name: ehlers_continuation_short_without_decycler
  output_dir: logs/experiments
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true

