strategy:
  name: SPX500_30m_thursday_weak_prevday_reversal_v1
  description: >
    Codex-designed independent SPX500 intraday calendar/session reversal.
    The rule goes long on Thursday at the NY cash open when the previous
    completed trading day was weak, then exits by a fixed midday time stop.
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: SPX500
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: spx500_30m_thursday_weak_prevday_reversal_v1
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/spx500_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed
features:
- step: returns
  params:
    log: false
    col_name: close_ret
  outputs: {}
  enabled: true
- step: session_context
  params:
    timezone: America/New_York
    add_cyclical_time: false
    include_weekend_flag: true
    sessions:
      ny_cash:
      - 9
      - 16
  outputs: {}
  enabled: true
model:
  kind: none
signals:
  kind: weekday_prev_daily_return_reversal
  params:
    close_col: close
    timestamp_col: timestamp
    timezone_input: UTC
    timezone: America/New_York
    weekday: 3
    signal_hour: 9
    signal_minute: 0
    prev_daily_return_max: -0.0006369942365362478
    side: 1.0
    signal_col: signal_side
    candidate_col: signal_candidate
    prev_daily_return_col: prev_daily_return
    local_weekday_col: local_weekday
    local_hour_col: local_hour
  outputs: {}
target:
  kind: triple_barrier
  outputs:
    label_col: label
    event_ret_col: tb_event_ret
    fwd_col: tb_event_ret
    candidate_out_col: label_candidate
    r_col: tb_event_r
    oriented_r_col: tb_oriented_r
  price_col: close
  open_col: open
  high_col: high
  low_col: low
  volatility_col: null
  label_mode: meta
  side_col: signal_side
  candidate_col: signal_candidate
  candidate_mode: all_nonzero
  entry_price_mode: next_open
  max_holding: 6
  upper_mult: 100.0
  lower_mult: 100.0
  vol_window: 24
  min_vol: 0.0001
  neutral_label: lower
  tie_break: closest_to_open
  add_r_multiple: true
  r_clip:
  - -3
  - 3
  diagnostic_feature_cols:
  - prev_daily_return
  - local_weekday
  - local_hour
  - session_ny_cash
  - signal_candidate
  - signal_side
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  engine: manual_barrier
  signal_col: signal_side
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: false
  stop_mode: fixed_return
  vol_col: null
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 100.0
  stop_loss_r: 100.0
  risk_per_trade: 0.01
  max_holding_bars: 6
  dynamic_exits: {}
portfolio:
  enabled: false
  construction: signal_weights
  long_short: false
monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10
diagnostics:
  enabled: true
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
logging:
  enabled: true
  run_name: spx500_30m_thursday_weak_prevday_reversal_v1
  output_dir: logs/bot
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
