strategy:
  name: us100_30m_ehlers_trend_pullback_continuation_long_v1
  timeframe: 30m
  assets: [US100]
  description: Rule-based long-only Ehlers trend pullback continuation candidate generator.
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  symbol: US100
  storage:
    mode: cached_only
    dataset_id: us100_30m_ehlers_trend_pullback_continuation_long_v1
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/us100_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed
features:
- step: returns
  params:
    log: false
    col_name: close_ret
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans: [50]
    ema_col_template: ema_50
    add_ratios: false
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans: [100]
    ema_col_template: ema_100
    add_ratios: false
- step: mama
  params:
    price_col: close
    fast_limit: 0.5
    slow_limit: 0.05
    output_col: mama
- step: fama
  params:
    price_col: close
    fast_limit: 0.5
    slow_limit: 0.05
    output_col: fama
- step: supersmoother
  params:
    price_col: close
    period: 10
    output_col: supersmoother_10
- step: vwap
  params:
    high_col: high
    low_col: low
    close_col: close
    volume_col: volume
    window: 20
    windows: [20]
    vwap_col: vwap_20
    add_distance: false
- step: roofing_filter
  params:
    price_col: close
    high_pass_period: 48
    low_pass_period: 10
    output_col: roofing_filter_48_10
  transforms:
    difference:
      params:
        source_col: roofing_filter_48_10
        periods: 1
        output_col: roofing_filter_48_10_slope
- step: hilbert_transform
  params:
    price_col: close
    window: 64
    amplitude_col: hilbert_amplitude_64
    phase_col: hilbert_phase_64
    instantaneous_frequency_col: hilbert_frequency_64
    add_derived: false
  transforms:
    reciprocal:
      params:
        source_col: hilbert_frequency_64
        use_abs: true
        output_col: hilbert_dominant_cycle_64
    between_flag:
      params:
        source_col: hilbert_dominant_cycle_64
        lower: 10.0
        upper: 48.0
        output_col: hilbert_cycle_ok_64
    rolling_zscore:
      params:
        source_col: hilbert_amplitude_64
        window: 252
        shift: 1
        output_col: hilbert_amplitude_z_252
- step: decycler_oscillator
  params:
    price_col: close
    fast_period: 30
    slow_period: 60
    output_col: decycler_oscillator_30_60
- step: laguerre_rsi
  params:
    price_col: close
    gamma: 0.5
    output_col: laguerre_rsi
    as_percent: false
- step: stochastic_rsi
  params:
    price_col: close
    rsi_period: 14
    stoch_period: 14
    k_period: 3
    d_period: 3
    prefix: stoch_rsi
- step: autocorrelation_periodogram
  params:
    price_col: close
    min_period: 10
    max_period: 48
    window: 96
    output_col: autocorrelation_periodogram_10_48
    power_col: autocorrelation_periodogram_10_48_power
    add_power: true
- step: atr
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 14
    windows: [14]
    method: wilder
    atr_col: atr_14
    add_over_price: false
  transforms:
    rolling_linear_regression:
      source_col: close
      window: 96
      slope_col: rolling_r2_slope_96
      intercept_col: rolling_r2_intercept_96
      r2_col: rolling_r2_96
    rising_flag:
      source_col: rolling_r2_96
      periods: 1
      output_col: rolling_r2_96_rising
    threshold_flag:
      source_col: rolling_r2_96
      threshold: 0.60
      op: ge
      output_col: rolling_r2_96_ok
    ratio:
      items:
      - numerator_col: atr_14
        denominator_col: close
        output_col: atr_over_price_14
    rolling_zscore:
      params:
        source_col: atr_over_price_14
        window: 252
        shift: 1
        output_col: atr_over_price_z_252
  normalizations:
    atr_scaled_distance:
      items:
      - base_col: close
        ref_col: vwap_20
        atr_col: atr_14
        output_col: close_minus_vwap_20_over_atr_14
      - base_col: close
        ref_col: supersmoother_10
        atr_col: atr_14
        output_col: close_minus_supersmoother_10_over_atr_14
      - base_col: close
        ref_col: ema_50
        atr_col: atr_14
        output_col: close_minus_ema_50_over_atr_14
- step: trend_slope_volatility
  params:
    price_col: close
    volatility_col: atr_over_price_14
    window: 96
    slope_col: trend_slope_96
    volatility_used_col: trend_vol_used_96
    slope_vol_ratio_col: trend_slope_vol_ratio_96
- step: volatility_of_volatility
  params:
    volatility_col: atr_over_price_14
    window: 96
    mean_window: 192
    output_col: vov_atr_96
    mean_col: vov_atr_96_mean_192
    ratio_col: vov_atr_96_ratio_192
- step: support_resistance
  params:
    price_col: close
    high_col: high
    low_col: low
    windows: [96]
    atr_col: atr_14
    include_pct_distance: false
    include_atr_distance: true
  transforms:
    threshold_flag:
      params:
        source_col: resistance_distance_atr_96
        threshold: 1.0
        op: le
        output_col: near_resistance
model:
  kind: none
signals:
  kind: ehlers_trend_pullback_continuation_long
  params:
    entry_mode: transition
    entry_delay_bars: 1

    require_trend_slope_positive: true
    min_trend_slope_vol_ratio: 0.75

    require_acp_power: true
    min_acp_power: 0.20

    require_hilbert_amplitude: true
    min_hilbert_amplitude_z: 0.25

    require_hilbert_cycle_ok: false

    require_laguerre_rising: false
    avoid_near_resistance: false
    avoid_shock_active: true

    min_rolling_r2: 0.35
    max_atr_z: 1.5
    max_abs_vwap_distance_atr: 1.0
    max_abs_supersmoother_distance_atr: 1.0
    max_abs_ema_distance_atr: 1.25
target: {}
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  dynamic_exits:
    enabled: false
    breakeven:
      enabled: false
      trigger_r: 0.5
      lock_r: 0.15
    profit_lock:
      enabled: false
      trigger_r: 1.2
      lock_r: 0.3
    no_progress:
      enabled: true
      bars: 9
      min_favorable_r: 0.25
      exit_price: close
  engine: manual_barrier
  signal_col: signal_side
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: false
  long_only: true
  stop_mode: volatility_stop
  vol_col: atr_over_price_14
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 2.0
  stop_loss_r: 1.5
  risk_per_trade: 0.003
  max_holding_bars: 12
portfolio:
  enabled: false
  construction: signal_weights
  long_short: false
  gross_target: 1.0
monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10
diagnostics:
  enabled: true
  robustness:
    enabled: true
    cost_multipliers: [2.0, 3.0, 5.0]
    entry_delay_bars: [1, 2, 3, 4]
    walk_forward_frequency: YE
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
logging:
  enabled: true
  run_name: us100_30m_ehlers_trend_pullback_continuation_long_v1
  output_dir: logs/experiments
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
