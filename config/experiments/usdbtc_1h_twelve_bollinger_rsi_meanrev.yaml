extends: base/hourly.yaml

data:
  source: twelve_data
  symbol: "BTC/USD"
  interval: "1h"
  start: "2024-01-01"
  end: null
  api_key_env: "TWELVEDATA_API_KEY"
  storage:
    mode: live_or_cached
    dataset_id: "usdbtc_1h_twelve_bollinger_rsi_meanrev"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72]
      ewma_spans: [24]
      annualization_factor: 8760.0
  - step: trend
    params:
      price_col: close
      sma_windows: [24, 72]
      ema_spans: [6, 24]
  - step: indicators
    params:
      price_col: close
      high_col: high
      low_col: low
      volume_col: volume
      bb_window: 24
      roc_windows: [2, 6]
      atr_window: 24
      adx_window: 24
      vol_z_window: 72
      include_mfi: false
  - step: oscillators
    params:
      price_col: close
      high_col: high
      low_col: low
      rsi_windows: [2, 4, 14]
      stoch_windows: [14]
      stoch_smooth: 3
  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6]

model:
  kind: logistic_regression_clf
  feature_cols:
    - lag_close_logret_1
    - lag_close_logret_2
    - lag_close_logret_6
    - vol_rolling_24
    - close_over_ema_6
    - bb_width_24_2.0
    - bb_percent_b_24_2.0
    - atr_over_price_24
    - adx_24
    - roc_2
    - roc_6
    - close_rsi_2
    - close_rsi_4
    - close_rsi_14
    - close_stoch_k_14
    - close_stoch_d_14
  params:
    max_iter: 1000
    C: 0.25
  target:
    kind: forward_return
    price_col: close
    horizon: 1
    quantiles: [0.2, 0.8]
  split:
    method: walk_forward
    train_size: 1440
    test_size: 168
    step_size: 168
    expanding: false

signals:
  kind: probability_threshold
  params:
    prob_col: pred_prob
    upper: 0.6
    lower: 0.4
    signal_name: signal_prob

risk:
  target_vol: null
  max_leverage: 1.0
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.0

backtest:
  returns_col: close_logret
  signal_col: signal_prob
  periods_per_year: 8760
  returns_type: log

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false

logging:
  run_name: usdbtc_1h_twelve_bollinger_rsi_meanrev_v1
