extends: experiments/usdjpy_1h_twelve_ppo_handcrafted.yaml

data:
  start: "2025-11-01"
  storage:
    dataset_id: "usdjpy_1h_twelve_ppo_handcrafted_transformer_iter"

model:
  split:
    max_folds: 50
  env:
    max_signal_abs: 0.45
    reward:
      cost_per_turnover: 0.0001
      slippage_per_turnover: 0.0
      inventory_penalty: 0.00005
      drawdown_penalty: 0.0
  params:
    total_timesteps: 5000
    n_steps: 128
    batch_size: 64
    learning_rate: 0.0003
    gamma: 0.99
    device: cpu
    extractor:
      kind: transformer
      features_dim: 64
      hidden_dim: 64
      num_layers: 2
      num_heads: 4
      dropout: 0.1

logging:
  run_name: usdjpy_1h_twelve_ppo_handcrafted_transformer_iter_v1
