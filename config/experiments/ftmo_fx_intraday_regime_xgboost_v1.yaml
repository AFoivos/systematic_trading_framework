data:
  source: dukascopy_csv
  interval: 1h
  start: "2015-01-01 22:00:00"
  end: "2025-01-01"
  alignment: inner
  symbol: EURUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: "ftmo_fx_intraday_regime_xgboost_v1"
    save_raw: false
    save_processed: true
    load_path: "data/raw/dukas_copy_bank/eurusd_h1.csv"
    raw_dir: "data/raw"
    processed_dir: "data/processed"

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72, 168]
      ewma_spans: [24, 72]
      annualization_factor: 6048.0
  - step: trend
    params:
      price_col: close
      sma_windows: [24, 72]
      ema_spans: [12, 24, 72]
  - step: trend_regime
    params:
      price_col: close
      base_sma_for_sign: 72
      short_sma: 24
      long_sma: 72
  - step: session_context
    params:
      timezone: UTC
      sessions:
        liquid_fx: [7, 21]
  - step: regime_context
    params:
      price_col: close
      returns_col: close_logret
      vol_short_window: 24
      vol_long_window: 168
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.35
      vol_ratio_low_threshold: 0.8
  - step: bollinger
    params:
      price_col: close
      window: 24
      n_std: 2.0
  - step: roc
    params:
      price_col: close
      windows: [6, 24]
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      method: wilder
      add_over_price: true
  - step: adx
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
  - step: rsi
    params:
      price_col: close
      windows: [2, 14]
      method: wilder
  - step: price_momentum
    params:
      price_col: close
      windows: [6, 24]
  - step: return_momentum
    params:
      returns_col: close_logret
      windows: [6, 24]
  - step: vol_normalized_momentum
    params:
      returns_col: close_logret
      vol_col: vol_rolling_24
      vol_window: 24
      windows: [6, 24]
      eps: 1.0e-8
  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6, 24]

model:
  kind: xgboost_clf
  params:
    n_estimators: 300
    learning_rate: 0.03
    max_depth: 3
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 8.0
    reg_lambda: 2.0
    reg_alpha: 0.1
    random_state: 7
    objective: binary:logistic
    eval_metric: logloss
    tree_method: hist
  preprocessing:
    scaler: none
  feature_selectors:
    exact:
      - hour_sin_24
      - hour_cos_24
      - day_of_week_sin_7
      - day_of_week_cos_7
      - session_europe
      - session_us
      - session_europe_us_overlap
      - session_liquid_fx
      - is_weekend
      - close_trend_regime_sma_72
      - close_trend_state_sma_24_72
    include:
      - startswith: vol_rolling_
      - startswith: vol_ewma_
      - startswith: regime_vol_ratio_
      - startswith: regime_high_vol_state_
      - startswith: regime_low_vol_state_
      - startswith: regime_trend_ratio_
      - startswith: regime_trend_state_
      - startswith: regime_absret_z_
      - startswith: close_over_sma_
      - startswith: close_over_ema_
      - startswith: bb_percent_b_
      - startswith: bb_width_
      - startswith: roc_
      - startswith: atr_over_price_
      - startswith: plus_di_
      - startswith: minus_di_
      - startswith: adx_
      - startswith: close_rsi_
      - startswith: close_mom_
      - startswith: close_logret_mom_
      - startswith: close_logret_norm_mom_
      - startswith: lag_close_logret_
    exclude:
      - startswith: target_
      - startswith: label
      - startswith: pred_
      - startswith: signal_
      - startswith: tb_
    strict:
      min_count: 32
  target:
    kind: triple_barrier
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    returns_col: close_logret
    max_holding: 12
    upper_mult: 1.2
    lower_mult: 1.0
    vol_window: 24
    min_vol: 1.0e-5
    neutral_label: drop
  split:
    method: walk_forward
    train_size: 6048
    test_size: 240
    step_size: 240
    expanding: true
    max_folds: null
  overlay:
    kind: garch
    params:
      returns_input_col: close_logret
      mean_model: zero

signals:
  kind: probability_vol_adjusted
  params:
    prob_col: pred_prob
    vol_col: pred_vol
    signal_col: signal_prob_vol_adj
    prob_center: 0.5
    upper: 0.57
    lower: 0.43
    vol_target: 0.0006
    clip: 0.25
    vol_floor: 1.0e-6
    min_signal_abs: 0.02
    activation_filters:
      - selector:
          exact: session_liquid_fx
        op: ge
        value: 1.0
      - selector:
          exact: is_weekend
        op: le
        value: 0.0
      - selector:
          exact: adx_24
        op: ge
        value: 18.0
      - selector:
          exact: regime_vol_ratio_24_168
        op: ge
        value: 0.75
      - selector:
          exact: regime_vol_ratio_24_168
        op: le
        value: 1.75

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.000025
  slippage_per_turnover: 0.00001
  target_vol: null
  max_leverage: 0.75
  dd_guard:
    enabled: true
    max_drawdown: 0.07
    rearm_drawdown: 0.04
    cooloff_bars: 72
  vol_col: null

backtest:
  returns_col: close_logret
  signal_col: signal_prob_vol_adj
  periods_per_year: 6048
  returns_type: log
  missing_return_policy: raise_if_exposed
  min_holding_bars: 3
  subset: test
  vol_col: null

portfolio:
  enabled: false
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  expected_return_col: null
  covariance_window: 60
  covariance_rebalance_step: 1
  risk_aversion: 5.0
  trade_aversion: 0.0
  constraints: {}
  asset_groups: {}

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: true
  run_name: ftmo_fx_intraday_regime_xgboost_v1
  output_dir: "logs/experiments"
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 18
    max_assets: 1
