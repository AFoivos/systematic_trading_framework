extends: base/hourly.yaml

data:
  source: twelve_data
  symbols: ["EURUSD", "USDJPY", "GBPUSD", "AUDUSD"]
  interval: "1h"
  start: "2024-01-01"
  end: null
  alignment: inner
  api_key_env: "TWELVEDATA_API_KEY"
  storage:
    mode: live_or_cached
    dataset_id: "fx_majors_1h_twelve_vol_regime"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72]
      ewma_spans: [24]
      annualization_factor: 6048.0

model:
  kind: none

signals:
  kind: volatility_regime
  params:
    vol_col: vol_rolling_24
    quantile: 0.4
    signal_name: signal_vol_regime
    mode: long_short_hold

portfolio:
  enabled: true
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  constraints:
    min_weight: -0.4
    max_weight: 0.4
    max_gross_leverage: 1.0
    target_net_exposure: 0.0
    turnover_limit: 0.3
  asset_groups:
    EURUSD: fx
    USDJPY: fx
    GBPUSD: fx
    AUDUSD: fx

risk:
  target_vol: null
  max_leverage: 1.0
  cost_per_turnover: 0.0001
  slippage_per_turnover: 0.0

backtest:
  returns_col: close_logret
  signal_col: signal_vol_regime
  periods_per_year: 6048
  returns_type: log

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false

logging:
  run_name: fx_majors_1h_twelve_vol_regime_v1
