extends: base/hourly.yaml

data:
  source: twelve_data
  symbols: ["EURUSD", "USDJPY", "GBPUSD", "AUDUSD"]
  interval: "1h"
  start: "2025-11-01"
  end: null
  alignment: inner
  api_key_env: "TWELVEDATA_API_KEY"
  storage:
    mode: live_or_cached
    dataset_id: "fx_majors_1h_twelve_dqn_portfolio_agent"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: false
      col_name: close_ret
  - step: lags
    params:
      cols: ["close_ret"]
      lags: [1, 2]
  - step: volatility
    params:
      returns_col: close_ret
      rolling_windows: [24]
      ewma_spans: []
      annualization_factor: 6048.0

model:
  kind: dqn_portfolio_agent
  signal_col: signal_rl
  action_col: action_rl
  feature_cols:
    - lag_close_ret_1
    - lag_close_ret_2
    - vol_rolling_24
  params:
    policy: MlpPolicy
    total_timesteps: 20000
    learning_starts: 500
    buffer_size: 50000
    batch_size: 64
    train_freq: 1
    gradient_steps: 1
    target_update_interval: 250
    learning_rate: 0.0005
    gamma: 0.99
    device: cpu
    extractor:
      kind: flatten
  target:
    kind: forward_return
    price_col: close
    horizon: 1
  split:
    method: walk_forward
    train_size: 2160
    test_size: 168
    step_size: 168
    expanding: false
  env:
    window_size: 48
    execution_lag_bars: 1
    action_space: discrete
    max_signal_abs: 1.0
    reward:
      cost_per_turnover: 0.0001
      slippage_per_turnover: 0.0
      inventory_penalty: 0.0
      drawdown_penalty: 0.0
      switching_penalty: 0.0

signals:
  kind: none
  params: {}

portfolio:
  enabled: true
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  constraints:
    min_weight: -0.4
    max_weight: 0.4
    max_gross_leverage: 1.0
    target_net_exposure: 0.0
    turnover_limit: 0.35
  asset_groups:
    EURUSD: fx
    USDJPY: fx
    GBPUSD: fx
    AUDUSD: fx

risk:
  target_vol: null
  max_leverage: 1.0
  cost_per_turnover: 0.0001
  slippage_per_turnover: 0.0
  dd_guard:
    enabled: false
    max_drawdown: 0.2
    cooloff_bars: 20

backtest:
  returns_col: close_ret
  signal_col: signal_rl
  periods_per_year: 6048
  returns_type: simple

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false

logging:
  run_name: fx_majors_1h_twelve_dqn_portfolio_agent_v1
