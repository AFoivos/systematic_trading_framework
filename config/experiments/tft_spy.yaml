extends: base/daily.yaml

data:
  symbol: "SPY"
  start: "2015-01-01"
  end: null
  storage:
    mode: live_or_cached
    dataset_id: "spy_daily_core"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: false
      col_name: close_ret
  - step: volatility
    params:
      returns_col: close_ret
      rolling_windows: [20, 60]
      ewma_spans: [20]
  - step: trend
    params:
      price_col: close
      sma_windows: [20, 50]
      ema_spans: [20]
  - step: indicators
    params:
      price_col: close
      high_col: high
      low_col: low
      volume_col: volume
  - step: oscillators
    params:
      price_col: close
      high_col: high
      low_col: low
      rsi_windows: [14]
      stoch_windows: [14]
      stoch_smooth: 3
  - step: lags
    params:
      cols: [close_ret]
      lags: [1, 2, 5]

model:
  kind: tft_forecaster
  feature_cols:
    - lag_close_ret_1
    - lag_close_ret_2
    - lag_close_ret_5
    - vol_rolling_20
    - vol_ewma_20
    - close_over_sma_20
    - close_over_sma_50
    - close_rsi_14
    - mfi_14
  target:
    kind: forward_return
    price_col: close
    horizon: 5
  split:
    method: walk_forward
    train_size: 504
    test_size: 63
    step_size: 63
    expanding: true
  params:
    lookback: 32
    hidden_dim: 32
    num_heads: 4
    num_layers: 2
    dropout: 0.1
    epochs: 25
    batch_size: 64
    learning_rate: 0.001
    weight_decay: 0.0001
    quantiles: [0.1, 0.5, 0.9]

signals:
  kind: forecast_vol_adjusted
  params:
    forecast_col: pred_ret
    vol_col: pred_vol
    signal_name: signal_tft
    clip: 1.0
    vol_floor: 1.0e-6

backtest:
  returns_col: close_ret
  signal_col: signal_tft
  periods_per_year: 252
  returns_type: simple

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: true
  mode: paper
  capital: 1000000
  price_col: close
  min_trade_notional: 1000

logging:
  run_name: tft_spy_v1
