strategy:
  name: spx500_30m_ehlers_semiscalp_xgboost_meta_v1
  timeframe: 30m
  assets: [SPX500]
  description: Ehlers semi-scalp candidates filtered by a purged walk-forward XGBoost challenger meta-model.

data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: SPX500
  storage:
    mode: cached_only
    dataset_id: spx500_30m_ehlers_semiscalp_xgboost_meta_v1
    save_raw: false
    save_processed: false
    load_path: data/raw/dukascopy_30m_clean/spx500_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed

features:
  - step: returns
    params: {log: false, col_name: close_ret}
  - step: supersmoother
    params: {price_col: close, period: 10, output_col: ehlers_supersmoother_10}
  - step: feature_transforms
    params:
      transforms:
        - {kind: rolling_stat, source_col: ehlers_supersmoother_10, mode: slope, window: 2, shift: 0, output_col: ehlers_supersmoother_10_slope}
  - step: roofing_filter
    params:
      price_col: close
      high_pass_period: 48
      low_pass_period: 10
      slope_bars: 1
      output_col: ehlers_roofing_48_10
      slope_col: ehlers_roofing_48_10_slope
      cross_up_zero_col: ehlers_roofing_48_10_cross_up
      cross_down_zero_col: ehlers_roofing_48_10_cross_down
      add_derived: true
  - step: hilbert_transform
    params:
      price_col: close
      window: 64
      amplitude_col: ehlers_hilbert_amplitude_64
      phase_col: ehlers_hilbert_phase_64
      instantaneous_frequency_col: ehlers_hilbert_frequency_64
      add_derived: false
  - step: dominant_cycle_period
    params: {price_col: close, output_col: dominant_cycle_period}
  - step: dominant_cycle_phase
    params: {price_col: close, output_col: dominant_cycle_phase}
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 14
      windows: [14]
      method: wilder
      add_over_price: true
      atr_col: atr_14
      over_price_col: atr_over_price_14
  - step: feature_transforms
    params:
      transforms:
        - {kind: ratio, numerator_col: ehlers_supersmoother_10_slope, denominator_col: atr_14, output_col: ehlers_supersmoother_slope_atr}
        - {kind: ratio, numerator_col: ehlers_roofing_48_10, denominator_col: atr_14, output_col: ehlers_roofing_atr}
        - {kind: ratio, numerator_col: ehlers_roofing_48_10_slope, denominator_col: atr_14, output_col: ehlers_roofing_slope_atr}
        - {kind: ratio, numerator_col: ehlers_hilbert_amplitude_64, denominator_col: atr_14, output_col: ehlers_hilbert_amplitude_atr}
        - {kind: rolling_zscore, source_col: ehlers_hilbert_amplitude_64, window: 252, shift: 1, output_col: ehlers_hilbert_amplitude_z_252}
        - {kind: rolling_zscore, source_col: atr_over_price_14, window: 252, shift: 1, output_col: atr_over_price_z_252}
  - step: lags
    params: {cols: [close_ret], lags: [1, 2, 4]}
  - step: ehlers_semiscalp_long
    params:
      entry_mode: transition
      price_col: close
      supersmoother_col: ehlers_supersmoother_10
      supersmoother_slope_col: ehlers_supersmoother_10_slope
      roofing_col: ehlers_roofing_48_10
      roofing_slope_col: ehlers_roofing_48_10_slope
      roofing_cross_up_col: ehlers_roofing_48_10_cross_up
      roofing_cross_down_col: ehlers_roofing_48_10_cross_down
      hilbert_amplitude_col: ehlers_hilbert_amplitude_64
      dominant_cycle_period_col: dominant_cycle_period
      atr_col: atr_over_price_14
      min_cycle_period: 10.0
      max_cycle_period: 48.0
      amplitude_quantile_lookback: 252
      amplitude_min_quantile: 0.30
      atr_quantile_lookback: 252
      atr_min_quantile: 0.30
      signal_col: signal_side
      candidate_col: signal_candidate

model:
  kind: xgboost_clf
  pred_prob_col: pred_prob
  pred_is_oos_col: pred_is_oos
  target:
    kind: r_multiple
    candidate_col: signal_candidate
    candidate_out_col: r_target_candidate
    label_col: label
    fwd_col: r_target_event_ret
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    volatility_col: atr_over_price_14
    entry_price_mode: next_open
    target_r_min: 0.10
    take_profit_r: 1.50
    stop_loss_r: 1.00
    max_holding_bars: 6
    stop_mode: volatility_stop
    tie_break: conservative
    allow_partial_horizon: false
  split:
    method: purged
    train_size: 36000
    test_size: 8000
    step_size: 8000
    expanding: true
    max_folds: 4
    purge_bars: 6
    embargo_bars: 6
  feature_cols:
    - close_ret
    - lag_close_ret_1
    - lag_close_ret_2
    - lag_close_ret_4
    - ehlers_supersmoother_slope_atr
    - ehlers_roofing_atr
    - ehlers_roofing_slope_atr
    - ehlers_hilbert_amplitude_atr
    - ehlers_hilbert_amplitude_z_252
    - dominant_cycle_period
    - dominant_cycle_phase
    - atr_over_price_14
    - atr_over_price_z_252
  params:
    n_estimators: 300
    learning_rate: 0.03
    max_depth: 3
    min_child_weight: 5.0
    subsample: 0.80
    colsample_bytree: 0.80
    reg_lambda: 5.0
    reg_alpha: 0.10
    scale_pos_weight: 1.0
    objective: binary:logistic
    eval_metric: logloss
    tree_method: hist
    random_state: 7
    n_jobs: 1

signals:
  kind: manual_long_model_filter
  params:
    prob_col: pred_prob
    candidate_col: signal_candidate
    base_signal_col: signal_side
    threshold: 0.55
    min_signal_abs: 0.0
    profit_barrier_r: 1.50
    stop_barrier_r: 1.00
    signal_col: model_filtered_long_signal

target: {}
runtime: {seed: 7, repro_mode: strict, deterministic: true, threads: 1, seed_torch: false}
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.00010
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard: {enabled: false, max_drawdown: 0.08, rearm_drawdown: 0.04, cooloff_bars: 48}
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  engine: manual_barrier
  signal_col: model_filtered_long_signal
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: false
  long_only: true
  stop_mode: volatility_stop
  vol_col: atr_over_price_14
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 1.50
  stop_loss_r: 1.00
  risk_per_trade: 0.003
  max_holding_bars: 6
  dynamic_exits: {}
portfolio: {enabled: false, construction: signal_weights, long_short: false, gross_target: 1.0}
monitoring: {enabled: true, psi_threshold: 0.2, n_bins: 10}
diagnostics:
  enabled: true
  robustness: {enabled: true, cost_multipliers: [2.0, 3.0, 5.0], entry_delay_bars: [1, 2], walk_forward_frequency: YE}
execution: {enabled: false, mode: paper, capital: 100000.0, price_col: close}
logging:
  enabled: true
  run_name: spx500_30m_ehlers_semiscalp_xgboost_meta_v1
  output_dir: logs/experiments
  stage_tails: {enabled: false}
  execution_source_audit: {enabled: true}
