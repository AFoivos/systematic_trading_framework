strategy:
  name: us100_30m_ehlers_decycler_continuation_long_v1
  timeframe: 30m
  assets:
  - US100
  description: Deterministic US100 long-only Ehlers decycler continuation setup calibrated
    from training-only threshold diagnostics.
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: US100
  storage:
    mode: cached_only
    dataset_id: us100_30m_ehlers_decycler_continuation_long_v1
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/us100_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed
features:
- step: returns
  params:
    log: false
    col_name: close_ret
- step: supersmoother
  params:
    price_col: close
    period: 10
    output_col: ehlers_supersmoother_10
- step: roofing_filter
  params:
    price_col: close
    high_pass_period: 48
    low_pass_period: 10
    slope_bars: 1
    output_col: ehlers_roofing_48_10
    slope_col: ehlers_roofing_48_10_slope
    cross_up_zero_col: ehlers_roofing_48_10_cross_up
    cross_down_zero_col: ehlers_roofing_48_10_cross_down
    add_derived: true
- step: hilbert_transform
  params:
    price_col: close
    window: 64
    amplitude_col: ehlers_hilbert_amplitude_64
    phase_col: ehlers_hilbert_phase_64
    instantaneous_frequency_col: ehlers_hilbert_frequency_64
    add_derived: false
- step: dominant_cycle_period
  params:
    price_col: close
    output_col: dominant_cycle_period
- step: dominant_cycle_phase
  params:
    price_col: close
    output_col: dominant_cycle_phase
- step: decycler
  params:
    price_col: close
    period: 60
    output_col: decycler
- step: decycler_oscillator
  params:
    price_col: close
    fast_period: 30
    slow_period: 60
    output_col: decycler_oscillator_30_60
- step: laguerre_rsi
  params:
    price_col: close
    gamma: 0.5
    output_col: laguerre_rsi
    as_percent: false
- step: fisher_transform
  params:
    price_col: close
    window: 10
    output_col: fisher_transform
    add_signal: false
- step: autocorrelation_periodogram
  params:
    price_col: close
    min_period: 10
    max_period: 48
    window: 96
    output_col: autocorrelation_periodogram_10_48
    power_col: autocorrelation_periodogram_10_48_power
    add_power: true
- step: rolling_r2_trend_quality
  params:
    price_col: close
    window: 96
    output_col: rolling_r2_96
    slope_col: rolling_r2_slope_96
- step: atr
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 14
    windows:
    - 14
    method: wilder
    add_over_price: false
    atr_col: atr_14
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: atr_14
        denominator_col: close
        output_col: atr_over_price_14
      - numerator_col: ehlers_supersmoother_10_slope
        denominator_col: atr_14
        output_col: ehlers_supersmoother_slope_atr
      - numerator_col: ehlers_roofing_48_10
        denominator_col: atr_14
        output_col: ehlers_roofing_atr
      - numerator_col: ehlers_roofing_48_10_slope
        denominator_col: atr_14
        output_col: ehlers_roofing_slope_atr
      - numerator_col: ehlers_hilbert_amplitude_64
        denominator_col: atr_14
        output_col: ehlers_hilbert_amplitude_atr
      - numerator_col: decycler
        denominator_col: close
        output_col: ehlers_decycler_over_close
    slope:
      enabled: true
      items:
      - source_col: ehlers_supersmoother_10
        window: 2
        shift: 0
        output_col: ehlers_supersmoother_10_slope
    rolling_zscore:
      enabled: true
      items:
      - source_col: ehlers_hilbert_amplitude_64
        window: 252
        shift: 1
        output_col: ehlers_hilbert_amplitude_z_252
      - source_col: atr_over_price_14
        window: 252
        shift: 1
        output_col: atr_over_price_z_252
model:
  kind: none
signals:
  kind: ehlers_decycler_continuation
  params:
    decycler_osc_col: decycler_oscillator_30_60
    decycler_ratio_col: ehlers_decycler_over_close
    decycler_osc_min: 0.45
    decycler_ratio_max: 0.994
    entry_mode: state
    signal_col: signal_side
    candidate_col: signal_candidate
target: {}
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  engine: manual_barrier
  signal_col: signal_side
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: false
  long_only: true
  stop_mode: volatility_stop
  vol_col: atr_over_price_14
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 3.0
  stop_loss_r: 2.0
  risk_per_trade: 0.003
  max_holding_bars: 16
  dynamic_exits: {}
portfolio:
  enabled: false
  construction: signal_weights
  long_short: false
  gross_target: 1.0
monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10
diagnostics:
  enabled: true
  robustness:
    enabled: true
    cost_multipliers:
    - 2.0
    - 3.0
    - 5.0
    entry_delay_bars:
    - 1
    - 2
    walk_forward_frequency: YE
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
logging:
  enabled: true
  run_name: us100_30m_ehlers_decycler_continuation_long_v1
  output_dir: logs/experiments
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
