strategy:
  name: all_assets_30m_ehlers_cycle_dqn_portfolio_v1
  timeframe: 30m
  assets:
  - XAUUSD
  - XAGUSD
  - SPX500
  - US100
  - GER40
  - US30
  - BRENT
  - ETHUSD
  - EURUSD
  - NIKKEI225
  - USOIL
  description: Eleven-asset Ehlers quant-feature panel trained with DQN portfolio
    RL on inner-aligned histories.
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: all_assets_30m_ehlers_cycle_dqn_portfolio_v1
    save_raw: false
    save_processed: true
    raw_dir: data/raw
    processed_dir: data/processed
    load_paths:
      XAUUSD: data/raw/dukascopy_30m_clean/xauusd_30m.csv
      XAGUSD: data/raw/dukascopy_30m_clean/xagusd_30m.csv
      SPX500: data/raw/dukascopy_30m_clean/spx500_30m.csv
      US100: data/raw/dukascopy_30m_clean/us100_30m.csv
      GER40: data/raw/dukascopy_30m_clean/ger40_30m.csv
      US30: data/raw/dukascopy_30m_clean/us30_30m.csv
      BRENT: data/raw/dukascopy_30m_clean/brent_30m.csv
      ETHUSD: data/raw/dukascopy_30m_clean/ethusd_30m.csv
      EURUSD: data/raw/dukascopy_30m_clean/eurusd_30m.csv
      NIKKEI225: data/raw/dukascopy_30m_clean/nikkei225_30m.csv
      USOIL: data/raw/dukascopy_30m_clean/usoil_30m.csv
  symbols:
  - XAUUSD
  - XAGUSD
  - SPX500
  - US100
  - GER40
  - US30
  - BRENT
  - ETHUSD
  - EURUSD
  - NIKKEI225
  - USOIL
features:
- step: returns
  params:
    log: false
    col_name: close_ret
- step: supersmoother
  params:
    price_col: close
    period: 10
    output_col: ehlers_supersmoother_10
- step: mama
  params:
    price_col: close
    fast_limit: 0.5
    slow_limit: 0.05
    output_col: mama
- step: fama
  params:
    price_col: close
    fast_limit: 0.5
    slow_limit: 0.05
    output_col: fama
- step: roofing_filter
  params:
    price_col: close
    high_pass_period: 48
    low_pass_period: 10
    slope_bars: 1
    output_col: ehlers_roofing_48_10
    slope_col: ehlers_roofing_48_10_slope
    cross_up_zero_col: ehlers_roofing_48_10_cross_up
    cross_down_zero_col: ehlers_roofing_48_10_cross_down
    add_derived: true
- step: hilbert_transform
  params:
    price_col: close
    window: 64
    amplitude_col: ehlers_hilbert_amplitude_64
    phase_col: ehlers_hilbert_phase_64
    instantaneous_frequency_col: ehlers_hilbert_frequency_64
    add_derived: false
- step: dominant_cycle_period
  params:
    price_col: close
    output_col: dominant_cycle_period
- step: dominant_cycle_phase
  params:
    price_col: close
    output_col: dominant_cycle_phase
- step: decycler
  params:
    price_col: close
    period: 60
    output_col: decycler
- step: decycler_oscillator
  params:
    price_col: close
    fast_period: 30
    slow_period: 60
    output_col: decycler_oscillator_30_60
- step: laguerre_rsi
  params:
    price_col: close
    gamma: 0.5
    output_col: laguerre_rsi
    as_percent: false
- step: fisher_transform
  params:
    price_col: close
    window: 10
    output_col: fisher_transform
    add_signal: false
- step: autocorrelation_periodogram
  params:
    price_col: close
    min_period: 10
    max_period: 48
    window: 96
    output_col: autocorrelation_periodogram_10_48
    power_col: autocorrelation_periodogram_10_48_power
    add_power: true
- step: rolling_r2_trend_quality
  params:
    price_col: close
    window: 96
    output_col: rolling_r2_96
    slope_col: rolling_r2_slope_96
- step: atr
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 14
    windows:
    - 14
    method: wilder
    add_over_price: false
    atr_col: atr_14
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: atr_14
        denominator_col: close
        output_col: atr_over_price_14
      - numerator_col: ehlers_supersmoother_10_slope
        denominator_col: atr_14
        output_col: ehlers_supersmoother_slope_atr
      - numerator_col: ehlers_roofing_48_10
        denominator_col: atr_14
        output_col: ehlers_roofing_atr
      - numerator_col: ehlers_roofing_48_10_slope
        denominator_col: atr_14
        output_col: ehlers_roofing_slope_atr
      - numerator_col: ehlers_hilbert_amplitude_64
        denominator_col: atr_14
        output_col: ehlers_hilbert_amplitude_atr
      - numerator_col: decycler
        denominator_col: close
        output_col: ehlers_decycler_over_close
    slope:
      enabled: true
      items:
      - source_col: ehlers_supersmoother_10
        window: 2
        shift: 0
        output_col: ehlers_supersmoother_10_slope
    rolling_zscore:
      enabled: true
      items:
      - source_col: ehlers_hilbert_amplitude_64
        window: 252
        shift: 1
        output_col: ehlers_hilbert_amplitude_z_252
      - source_col: atr_over_price_14
        window: 252
        shift: 1
        output_col: atr_over_price_z_252
- step: ehlers_semiscalp_long
  params:
    entry_mode: transition
    price_col: close
    supersmoother_col: ehlers_supersmoother_10
    supersmoother_slope_col: ehlers_supersmoother_10_slope
    roofing_col: ehlers_roofing_48_10
    roofing_slope_col: ehlers_roofing_48_10_slope
    roofing_cross_up_col: ehlers_roofing_48_10_cross_up
    roofing_cross_down_col: ehlers_roofing_48_10_cross_down
    hilbert_amplitude_col: ehlers_hilbert_amplitude_64
    dominant_cycle_period_col: dominant_cycle_period
    atr_col: atr_over_price_14
    min_cycle_period: 10.0
    max_cycle_period: 48.0
    amplitude_quantile_lookback: 252
    amplitude_min_quantile: 0.3
    atr_quantile_lookback: 252
    atr_min_quantile: 0.3
    signal_col: signal_side
    candidate_col: signal_candidate
model:
  kind: dqn_portfolio_agent
  signal_col: signal_rl
  action_col: action_rl
  pred_is_oos_col: pred_is_oos
  data_alignment: inner
  target:
    kind: forward_return
    price_col: close
    horizon: 1
  split:
    method: purged
    train_size: 36000
    test_size: 6000
    step_size: 6000
    expanding: true
    max_folds: 4
    purge_bars: 1
    embargo_bars: 1
  backtest:
    returns_col: close_ret
    returns_type: simple
  runtime:
    seed: 7
    deterministic: true
    threads: 1
    repro_mode: strict
  feature_cols:
  - ehlers_supersmoother_slope_atr
  - ehlers_roofing_atr
  - ehlers_roofing_slope_atr
  - ehlers_hilbert_amplitude_atr
  - ehlers_hilbert_amplitude_z_252
  - ehlers_hilbert_phase_64
  - ehlers_hilbert_frequency_64
  - dominant_cycle_period
  - dominant_cycle_phase
  - ehlers_decycler_over_close
  - decycler_oscillator_30_60
  - autocorrelation_periodogram_10_48
  - autocorrelation_periodogram_10_48_power
  - rolling_r2_96
  - rolling_r2_slope_96
  - atr_over_price_14
  - atr_over_price_z_252
  env:
    window_size: 32
    execution_lag_bars: 1
    action_space: discrete
    max_signal_abs: 1.0
    reward:
      cost_per_turnover: 0.00015
      slippage_per_turnover: 0.0001
      inventory_penalty: 2.0e-05
      switching_penalty: 5.0e-05
      drawdown_penalty: 0.0
  params:
    total_timesteps: 25000
    learning_starts: 1000
    buffer_size: 100000
    batch_size: 256
    train_freq: 4
    gradient_steps: 1
    target_update_interval: 1000
    learning_rate: 0.0005
    gamma: 0.99
    device: cpu
    extractor:
      kind: flatten
      features_dim: 128
signals:
  kind: none
  params: {}
target: {}
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: true
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.12
    rearm_drawdown: 0.06
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  engine: vectorized
  signal_col: signal_rl
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
portfolio:
  enabled: true
  construction: signal_weights
  long_short: true
  gross_target: 1.0
  constraints:
    min_weight: -0.5
    max_weight: 0.5
    max_gross_leverage: 1.0
    target_net_exposure: 0.0
    turnover_limit: 1.0
monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10
diagnostics:
  enabled: true
  robustness:
    enabled: false
    cost_multipliers:
    - 2.0
    - 3.0
    entry_delay_bars:
    - 1
    walk_forward_frequency: YE
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
logging:
  enabled: true
  run_name: all_assets_30m_ehlers_cycle_dqn_portfolio_v1
  output_dir: logs/experiments
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
