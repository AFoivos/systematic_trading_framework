strategy:
  name: all_assets_30m_ehlers_semiscalp_logistic_meta_v2
  timeframe: 30m
  assets: &assets [BRENT, ETHUSD, EURUSD, GER40, NIKKEI225, SPX500, US100, US30, USOIL, XAGUSD, XAUUSD]
  description: Multi-asset Ehlers semi-scalp candidates filtered independently per asset by purged walk-forward logistic regression.

data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbols: *assets
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: all_assets_30m_ehlers_semiscalp_logistic_meta_v2
    save_raw: false
    save_processed: false
    load_paths:
      BRENT: data/raw/dukascopy_30m_clean/brent_30m.csv
      ETHUSD: data/raw/dukascopy_30m_clean/ethusd_30m.csv
      EURUSD: data/raw/dukascopy_30m_clean/eurusd_30m.csv
      GER40: data/raw/dukascopy_30m_clean/ger40_30m.csv
      NIKKEI225: data/raw/dukascopy_30m_clean/nikkei225_30m.csv
      SPX500: data/raw/dukascopy_30m_clean/spx500_30m.csv
      US100: data/raw/dukascopy_30m_clean/us100_30m.csv
      US30: data/raw/dukascopy_30m_clean/us30_30m.csv
      USOIL: data/raw/dukascopy_30m_clean/usoil_30m.csv
      XAGUSD: data/raw/dukascopy_30m_clean/xagusd_30m.csv
      XAUUSD: data/raw/dukascopy_30m_clean/xauusd_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed

features:
  - step: returns
    params: {log: false, col_name: close_ret}
  - step: volatility
    params:
      returns_col: close_ret
      rolling_windows: [8, 24, 96]
      ewma_spans: [24, 96]
      annualization_factor: null
  - step: supersmoother
    params: {price_col: close, period: 10, output_col: ehlers_supersmoother_10}
  - step: feature_transforms
    params:
      transforms:
        - {kind: rolling_stat, source_col: ehlers_supersmoother_10, mode: slope, window: 2, shift: 0, output_col: ehlers_supersmoother_10_slope}
  - step: roofing_filter
    params:
      price_col: close
      high_pass_period: 48
      low_pass_period: 10
      slope_bars: 1
      output_col: ehlers_roofing_48_10
      slope_col: ehlers_roofing_48_10_slope
      cross_up_zero_col: ehlers_roofing_48_10_cross_up
      cross_down_zero_col: ehlers_roofing_48_10_cross_down
      add_derived: true
  - step: hilbert_transform
    params:
      price_col: close
      window: 64
      amplitude_col: ehlers_hilbert_amplitude_64
      phase_col: ehlers_hilbert_phase_64
      instantaneous_frequency_col: ehlers_hilbert_frequency_64
      add_derived: false
  - step: dominant_cycle_period
    params: {price_col: close, output_col: dominant_cycle_period}
  - step: dominant_cycle_phase
    params: {price_col: close, output_col: dominant_cycle_phase}
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 14
      windows: [14]
      method: wilder
      add_over_price: true
      atr_col: atr_14
      over_price_col: atr_over_price_14
  - step: adx
    params: {high_col: high, low_col: low, close_col: close, window: 14, windows: [14]}
  - step: rsi
    params: {price_col: close, windows: [14], method: wilder}
  - step: stochastic_rsi
    params:
      price_col: close
      rsi_period: 14
      stoch_period: 14
      k_period: 3
      d_period: 3
      oversold: 0.20
      overbought: 0.80
      prefix: stoch_rsi
  - step: bollinger
    params: {price_col: close, window: 20, n_std: 2.0}
    outputs:
      bb_width_20_2.0: bollinger_bandwidth
      bb_percent_b_20_2.0: bollinger_percent_b
  - step: macd
    params: {price_col: close, fast: 12, slow: 26, signal: 9}
    outputs:
      macd_12_26: macd
      macd_signal_9: macd_signal
      macd_hist_12_26_9: macd_hist
  - step: roc
    params: {price_col: close, windows: [2, 4, 8, 16]}
  - step: return_momentum
    params: {returns_col: close_ret, windows: [2, 4, 8, 16]}
  - step: vol_normalized_momentum
    params: {returns_col: close_ret, vol_col: vol_rolling_24, windows: [2, 4, 8, 16]}
  - step: session_context
    params:
      timezone: UTC
      include_weekend_flag: true
      sessions:
        weak_08_13: [8, 13]
        allowed_13_08: [13, 8]
  - step: regime_context
    params:
      price_col: close
      returns_col: close_ret
      vol_short_window: 24
      vol_long_window: 168
      vol_window_pairs: [[24, 168]]
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.20
      vol_ratio_low_threshold: 0.85
  - step: volume_features
    params: {volume_col: volume, atr_col: atr_14, atr_window: 14, vol_z_window: 48}
  - step: feature_transforms
    params:
      transforms:
        - {kind: ratio, numerator_col: close, denominator_col: ehlers_supersmoother_10, output_col: price_over_supersmoother}
        - {kind: ratio, numerator_col: ehlers_supersmoother_10_slope, denominator_col: atr_14, output_col: ehlers_supersmoother_slope_atr}
        - {kind: ratio, numerator_col: ehlers_roofing_48_10, denominator_col: atr_14, output_col: ehlers_roofing_atr}
        - {kind: ratio, numerator_col: ehlers_roofing_48_10_slope, denominator_col: atr_14, output_col: ehlers_roofing_slope_atr}
        - {kind: ratio, numerator_col: ehlers_hilbert_amplitude_64, denominator_col: atr_14, output_col: ehlers_hilbert_amplitude_atr}
        - {kind: rolling_zscore, source_col: ehlers_hilbert_amplitude_64, window: 252, shift: 1, output_col: ehlers_hilbert_amplitude_z_252}
        - {kind: rolling_zscore, source_col: atr_over_price_14, window: 252, shift: 1, output_col: atr_over_price_z_252}
  - step: lags
    params: {cols: [close_ret], lags: [1, 2, 4, 8]}
  - step: ehlers_semiscalp_long
    params: &semiscalp_params
      entry_mode: transition
      price_col: close
      supersmoother_col: ehlers_supersmoother_10
      supersmoother_slope_col: ehlers_supersmoother_10_slope
      roofing_col: ehlers_roofing_48_10
      roofing_slope_col: ehlers_roofing_48_10_slope
      roofing_cross_up_col: ehlers_roofing_48_10_cross_up
      roofing_cross_down_col: ehlers_roofing_48_10_cross_down
      hilbert_amplitude_col: ehlers_hilbert_amplitude_64
      dominant_cycle_period_col: dominant_cycle_period
      atr_col: atr_over_price_14
      min_cycle_period: 10.0
      max_cycle_period: 48.0
      amplitude_quantile_lookback: 252
      amplitude_min_quantile: 0.30
      atr_quantile_lookback: 252
      atr_min_quantile: 0.30
      signal_col: signal_side
      candidate_col: signal_candidate

model:
  kind: logistic_regression_clf
  pred_prob_col: pred_prob
  pred_is_oos_col: pred_is_oos
  preprocessing: {scaler: standard}
  target:
    kind: r_multiple
    candidate_col: signal_candidate
    candidate_out_col: r_target_candidate
    label_col: label
    fwd_col: r_target_event_ret
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    volatility_col: atr_over_price_14
    entry_price_mode: next_open
    target_r_min: 0.35
    take_profit_r: 2.50
    stop_loss_r: 1.25
    max_holding_bars: 8
    stop_mode: volatility_stop
    tie_break: conservative
    allow_partial_horizon: false
  split:
    method: purged
    train_size: 36000
    test_size: 6000
    step_size: 6000
    expanding: true
    max_folds: 4
    purge_bars: 8
    embargo_bars: 8
  feature_cols: &model_features
    - close_ret
    - lag_close_ret_1
    - lag_close_ret_2
    - lag_close_ret_4
    - lag_close_ret_8
    - vol_rolling_8
    - vol_rolling_24
    - vol_rolling_96
    - vol_ewma_24
    - price_over_supersmoother
    - ehlers_supersmoother_slope_atr
    - ehlers_roofing_atr
    - ehlers_roofing_slope_atr
    - ehlers_hilbert_amplitude_atr
    - ehlers_hilbert_amplitude_z_252
    - ehlers_hilbert_phase_64
    - ehlers_hilbert_frequency_64
    - dominant_cycle_period
    - dominant_cycle_phase
    - atr_over_price_14
    - atr_over_price_z_252
    - adx_14
    - plus_di_14
    - minus_di_14
    - close_rsi_14
    - stoch_rsi_k
    - stoch_rsi_d
    - stoch_rsi_slope
    - bollinger_bandwidth
    - bollinger_percent_b
    - macd_hist
    - roc_2
    - roc_4
    - roc_8
    - close_ret_mom_2
    - close_ret_mom_4
    - close_ret_norm_mom_2
    - close_ret_norm_mom_4
    - hour_sin_24
    - hour_cos_24
    - session_weak_08_13
    - regime_vol_ratio_z_24_168
    - regime_trend_ratio_24_72
    - volume_z_48
  params:
    penalty: l2
    C: 0.10
    class_weight: balanced
    solver: lbfgs
    max_iter: 3000
    random_state: 7
    n_jobs: 1

signals:
  kind: manual_long_model_filter
  params:
    prob_col: pred_prob
    candidate_col: signal_candidate
    base_signal_col: signal_side
    threshold: 0.58
    gate_col: session_allowed_13_08
    min_signal_abs: 0.0
    profit_barrier_r: 2.0
    stop_barrier_r: 1.0
    signal_col: model_filtered_long_signal

target: {}

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.00010
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard: {enabled: false, max_drawdown: 0.12, rearm_drawdown: 0.06, cooloff_bars: 48}
  portfolio_guard:
    enabled: true
    max_open_trades: 5
    group_max_open_trades: {equity_indices: 3, metals: 1, energy: 1, fx: 1, crypto: 1}
    kill_switch_max_drawdown: 0.15
  drawdown_sizing: {}
  vol_col: null

backtest:
  engine: portfolio_barrier
  signal_col: model_filtered_long_signal
  returns_col: close_ret
  returns_type: simple
  subset: test
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  min_holding_bars: 0
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  volatility_col: atr_14
  entry_price_mode: next_open
  profit_barrier_r: 2.50
  stop_barrier_r: 1.25
  vertical_barrier_bars: 8
  tie_break: closest_to_open
  risk_per_trade: 0.0015

portfolio:
  enabled: true
  construction: signal_weights
  long_short: false
  gross_target: 1.0
  constraints:
    max_gross_leverage: 1.0
    max_weight: 0.25
    min_weight: 0.0
    target_net_exposure: 1.0
    enforce_target_net_exposure: false
    group_max_exposure: {equity_indices: 0.60, metals: 0.30, energy: 0.30, fx: 0.20, crypto: 0.20}
  asset_groups:
    BRENT: energy
    ETHUSD: crypto
    EURUSD: fx
    GER40: equity_indices
    NIKKEI225: equity_indices
    SPX500: equity_indices
    US100: equity_indices
    US30: equity_indices
    USOIL: energy
    XAGUSD: metals
    XAUUSD: metals

monitoring: {enabled: true, psi_threshold: 0.20, n_bins: 10}
diagnostics:
  enabled: true
  robustness:
    enabled: true
    cost_multipliers: [1.0, 2.0, 3.0]
    entry_delay_bars: [1, 2]
    walk_forward_frequency: YE
    gap_loss_per_exposure: 0.001
    max_gap_multiple: 3.0
execution: {enabled: false, mode: paper, capital: 100000.0, price_col: close}
logging:
  enabled: true
  run_name: all_assets_30m_ehlers_semiscalp_logistic_meta_v2
  output_dir: logs/experiments
  stage_tails: {enabled: false}
  execution_source_audit: {enabled: true}
