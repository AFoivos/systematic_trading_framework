# Full 1h intraday experiment template.
# Keep exactly one active model block and one active signals block.
# Annualization guide for 1h bars:
# - US cash-session equities: 1638
# - FX / 24h x 252 trading days: 6048
# - 24/7 crypto: 8760
# RL / DRL guide:
# - Set model.kind to ppo_agent | dqn_agent | ppo_portfolio_agent | dqn_portfolio_agent
# - RL currently requires model.target.horizon=1 and model.env.execution_lag_bars=1
# - RL runs must keep signals.kind: none and backtest.signal_col aligned with model.signal_col
# - Portfolio RL also requires data.alignment=inner, portfolio.enabled=true, portfolio.construction=signal_weights
extends: base/hourly.yaml

data:
  source: twelve_data  # yahoo | twelve_data ; alpha supports only 1d, not 1h
  symbol: "EURUSD"  # single asset example; set to null if you use `symbols`
  # symbols: ["EURUSD", "USDJPY", "GBPUSD", "AUDUSD"]  # multi-asset example
  interval: "1h"
  start: "2024-01-01"
  end: null  # e.g. "2025-12-31"
  alignment: inner  # inner | outer ; portfolio RL currently requires inner
  api_key_env: "TWELVEDATA_API_KEY"  # preferred over api_key
  # api_key: null
  pit:
    timestamp_alignment:
      source_timezone: "UTC"
      output_timezone: "UTC"
      normalize_daily: false
      duplicate_policy: "last"  # first | last | raise
    corporate_actions:
      policy: "none"  # none | adj_close_ratio | adj_close_replace_close
      adj_close_col: "adj_close"
    universe_snapshot:
      path: null  # e.g. "data/metadata/fx_universe_snapshot.csv"
      as_of: null  # e.g. "2024-01-01"
      inactive_policy: "raise"  # raise | drop_inactive_rows
  storage:
    mode: live_or_cached  # live | live_or_cached | cached_only
    dataset_id: "eurusd_1h_template_full"
    load_path: null  # e.g. "data/raw/eurusd_snapshot"
    raw_dir: data/raw
    processed_dir: data/processed
    save_raw: true
    save_processed: true

runtime:
  seed: 7
  repro_mode: strict  # strict | relaxed
  deterministic: true
  threads: 1
  seed_torch: false  # switch to true only when you need torch-level seeding

features:
  - step: returns
    params:
      log: true
      col_name: close_logret  # e.g. close_ret | close_logret

  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72, 120]
      ewma_spans: [24, 72]
      annualization_factor: 6048.0  # FX=6048.0 | US equities=1638.0 | crypto=8760.0

  - step: trend
    params:
      price_col: close
      sma_windows: [24, 72, 120]
      ema_spans: [6, 24, 72]

  - step: trend_regime
    params:
      price_col: close
      base_sma_for_sign: 72
      short_sma: 24
      long_sma: 72

  - step: indicators
    params:
      price_col: close
      high_col: high
      low_col: low
      volume_col: volume
      bb_window: 24
      bb_nstd: 2.0
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      ppo_fast: 12
      ppo_slow: 26
      ppo_signal: 9
      roc_windows: [2, 6, 24]
      atr_window: 24
      adx_window: 24
      vol_z_window: 72
      include_mfi: false

  - step: oscillators
    params:
      price_col: close
      high_col: high
      low_col: low
      rsi_windows: [2, 6, 14]
      stoch_windows: [14]
      stoch_smooth: 3

  - step: momentum
    params:
      price_col: close
      returns_col: close_logret
      vol_col: vol_rolling_24
      windows: [6, 24, 72]

  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6]
      prefix: lag

model:
  kind: logistic_regression_clf  # none | logistic_regression_clf | lightgbm_clf | sarimax_forecaster | garch_forecaster | tft_forecaster | ppo_agent | dqn_agent | ppo_portfolio_agent | dqn_portfolio_agent
  use_features: true  # mainly relevant for forecasters; leave true unless you want no exogenous features
  pred_prob_col: pred_prob
  pred_ret_col: pred_ret  # used by forecasters; harmless for classifiers
  # signal_col: signal_rl  # RL only; backtest.signal_col must match
  # action_col: action_rl  # RL only; stores raw agent actions
  # returns_input_col: close_logret  # use only for GARCH
  # feature_cols: [lag_close_logret_1, lag_close_logret_2, vol_rolling_24]  # prefer explicit lists once stable
  target:
    kind: forward_return
    price_col: close
    horizon: 3  # e.g. 1 | 3 | 6 ; RL currently supports only 1
    # quantiles: [0.25, 0.75]  # classification only; build labels from train-fold quantiles
  split:
    method: walk_forward  # time | walk_forward | purged
    train_size: 2160  # e.g. 90 days * 24 bars for 1h FX
    # train_frac: 0.7  # alternative to train_size
    test_size: 168  # e.g. 1 week of 1h FX bars
    step_size: 168
    expanding: false
    # max_folds: 8
    # purge_bars: 3  # use when method=purged; must be >= target.horizon
    # embargo_bars: 24
  # If model.feature_cols is omitted, the framework infers numeric feature columns.
  # For maximum reproducibility, replace inference with an explicit list once stable.
  params:
    max_iter: 1000
    C: 0.25
    solver: lbfgs

