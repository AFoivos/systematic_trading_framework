portfolio:
  enabled: false  # set true for multi-asset portfolio construction; required for portfolio RL agents
  construction: signal_weights  # signal_weights | mean_variance ; RL with portfolio.enabled=true requires signal_weights
  gross_target: 1.0
  long_short: true
  expected_return_col: null  # for mean_variance; defaults to backtest.signal_col if null
  covariance_window: 60
  covariance_rebalance_step: 1
  risk_aversion: 5.0
  trade_aversion: 0.0
  constraints:
    min_weight: -0.4
    max_weight: 0.4
    max_gross_leverage: 1.0
    target_net_exposure: 0.0
    turnover_limit: 0.35
    # group_max_exposure:
    #   fx: 1.0
    #   crypto: 0.5
  asset_groups:
    # EURUSD: fx
    # USDJPY: fx
    # GBPUSD: fx
    # BTC/USD: crypto

risk:
  cost_per_turnover: 0.0001
  slippage_per_turnover: 0.0
  target_vol: null  # e.g. 0.10 ; single-asset RL currently requires null
  max_leverage: 1.0
  vol_col: vol_rolling_24  # used when target_vol is not null or for diagnostics
  dd_guard:
    enabled: true  # set false when you want RL reward and backtest path to stay closer
    max_drawdown: 0.15
    cooloff_bars: 24

backtest:
  returns_col: close_logret  # use close_ret if features.returns.log=false ; RL examples often use close_ret/simple
  signal_col: signal_prob  # switch to signal_rl for RL / DRL runs
  vol_col: vol_rolling_24
  periods_per_year: 6048  # FX=6048 | US equities=1638 | crypto=8760
  returns_type: log  # log if returns_col is log-return; simple if returns_col is simple-return
  missing_return_policy: raise_if_exposed  # raise | raise_if_exposed | fill_zero
  subset: test  # backtest only OOS/test predictions when model output is available

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: true
  run_name: eurusd_1h_template_full_v1
  output_dir: logs/experiments
