signals:
  kind: probability_threshold  # none | trend_state | probability_threshold | probability_conviction | forecast_threshold | forecast_vol_adjusted | rsi | momentum | stochastic | volatility_regime
  params:
    prob_col: pred_prob
    upper: 0.55
    lower: 0.45
    signal_name: signal_prob

