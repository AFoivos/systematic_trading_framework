strategy:
  name: lab_04_quantile_return_chronos_bolt_h24
  timeframe: 30m
  assets: [ETHUSD]
  description: >
    Forecast-first quantile lab using a wider Chronos-Bolt predictive interval
    to inspect calibration and uncertainty around 24-bar forward returns.
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: ETHUSD
  pit:
    timestamp_alignment: {source_timezone: UTC, output_timezone: UTC, normalize_daily: false, duplicate_policy: last}
    corporate_actions: {policy: none, adj_close_col: adj_close}
    universe_snapshot: {inactive_policy: raise}
  storage: {mode: cached_only, dataset_id: lab_04_quantile_return_chronos_bolt_h24, save_raw: false, save_processed: true, load_path: data/raw/dukascopy_30m_clean/ethusd_30m.csv, raw_dir: data/raw, processed_dir: data/processed}
features:
- step: returns
  params: {log: false, col_name: close_ret}
- step: volatility
  params: {returns_col: close_ret, rolling_windows: [24, 96, 192], ewma_spans: [], annualization_factor: null}
- step: atr
  params: {high_col: high, low_col: low, close_col: close, window: 48, windows: [48], method: wilder, add_over_price: false, atr_col: atr_48}
  transforms:
    ratio:
      enabled: true
      items:
      - {numerator_col: atr_48, denominator_col: close, output_col: atr_over_price_48}
model:
  kind: chronos_bolt_forecaster
  outputs: {pred_ret_col: pred_ret, pred_is_oos_col: pred_is_oos}
  target: {kind: future_return_regression, price_col: close, returns_col: close_ret, returns_type: simple, horizon_bars: 24, fwd_col: target_future_return_h24, label_col: target_future_return_h24}
  split: {method: walk_forward, train_size: 12000, test_size: 256, step_size: 256, expanding: true, max_folds: 1, purge_bars: 24, embargo_bars: 24}
  params: {model_id: amazon/chronos-bolt-tiny, source_col: close, source_kind: price, lookback: 512, min_context: 96, prediction_length: 24, quantiles: [0.05, 0.25, 0.5, 0.75, 0.95]}
signals:
  kind: forecast_threshold
  params: {forecast_col: pred_ret, signal_col: signal_forecast_lab, upper: 999.0, lower: -999.0, mode: long_short}
target: {}
validation: {method: walk_forward, purge_bars: 24, embargo_bars: 24}
metrics: {regression: [mae, rmse, r2, correlation, directional_accuracy]}
runtime: {seed: 7, repro_mode: strict, deterministic: true, threads: 1, seed_torch: false}
risk: {cost_per_turnover: 0.0, slippage_per_turnover: 0.0, target_vol: null, max_leverage: 1.0, sizing: {}, dd_guard: {enabled: false}, portfolio_guard: {}, drawdown_sizing: {}, vol_col: null}
backtest: {engine: vectorized, returns_col: close_ret, signal_col: signal_forecast_lab, periods_per_year: 17520, returns_type: simple, missing_return_policy: raise_if_exposed, min_holding_bars: 24, subset: test, vol_col: null}
portfolio: {enabled: false, construction: signal_weights, gross_target: 1.0, long_short: true, expected_return_col: pred_ret}
monitoring: {enabled: true, psi_threshold: 0.15, n_bins: 10}
diagnostics: {enabled: true, model: {enabled: true}, forecast: {quantiles: 10, autocorrelation_lags: [1, 2, 4, 8, 24], volatility_col: atr_over_price_48}}
execution: {enabled: false, mode: paper, capital: 100000.0, price_col: close, min_trade_notional: 0.0, current_weights: {}, current_prices: {}}
logging: {enabled: true, run_name: lab_04_quantile_return_chronos_bolt_h24, output_dir: logs/lab}
