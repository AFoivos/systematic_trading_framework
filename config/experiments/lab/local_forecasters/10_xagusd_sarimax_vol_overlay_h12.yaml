strategy: {name: lab_local_10_xagusd_sarimax_vol_overlay_h12, timeframe: 30m, assets: [XAGUSD], description: "Local SARIMAX return forecast with GARCH volatility overlay for XAGUSD."}
data:
  source: dukascopy_csv
  interval: 30m
  symbol: XAGUSD
  alignment: inner
  storage: {mode: cached_only, dataset_id: lab_local_10_xagusd_sarimax_vol_overlay_h12, save_raw: false, save_processed: true, load_path: data/raw/dukascopy_30m_clean/xagusd_30m.csv, raw_dir: data/raw, processed_dir: data/processed}
features:
- {step: returns, outputs: {close_ret: close_ret}, params: {log: false, col_name: close_ret}}
- {step: volatility, params: {returns_col: close_ret, rolling_windows: [12, 24, 48, 96], ewma_spans: [], annualization_factor: null}}
- step: trend
  params: {price_col: close, sma_windows: [], ema_spans: [24, 72, 144], ema_col_template: "ema_{span}", add_ratios: false}
  transforms: {ratio: {enabled: true, items: [{numerator_col: close, denominator_col: ema_72, output_col: close_over_ema_72, subtract: 1.0}, {numerator_col: ema_24, denominator_col: ema_144, output_col: ema_trend_24_144, subtract: 1.0}]}}
- step: atr
  params: {high_col: high, low_col: low, close_col: close, window: 48, windows: [48], method: wilder}
  transforms: {ratio: {enabled: true, items: [{numerator_col: atr_48, denominator_col: close, output_col: atr_over_price_48}]}}
- {step: rsi, params: {price_col: close, windows: [14], method: wilder}}
- {step: roc, params: {price_col: close, windows: [4, 12, 24]}}
model:
  kind: sarimax_forecaster
  outputs: {pred_ret_col: pred_ret, pred_prob_col: pred_prob, pred_is_oos_col: pred_is_oos}
  target: {kind: future_return_regression, price_col: close, returns_col: close_ret, returns_type: simple, horizon_bars: 24, fwd_col: target_ret_12h, label_col: target_ret_12h}
  split: {method: purged, train_size: 18000, test_size: 2500, step_size: 2500, expanding: true, max_folds: 5, purge_bars: 24, embargo_bars: 24}
  feature_selectors: {include: [{exact: [close_over_ema_72, ema_trend_24_144, rsi_14, roc_4, roc_12, roc_24, vol_rolling_24, vol_rolling_48, atr_over_price_48]}], strict: {min_count: 9}}
  overlay: {kind: garch, returns_col: close_ret, params: {mean_model: ar1, returns_input_col: close_ret}}
  params: {order: [1, 0, 1], seasonal_order: [0, 0, 0, 0], trend: c, use_exog: true, enforce_stationarity: false, enforce_invertibility: false, maxiter: 100, allow_fallback: true}
signals: {kind: forecast_vol_adjusted, params: {forecast_col: pred_ret, vol_col: pred_vol, signal_col: signal_sarimax_garch, clip: 1.0, vol_floor: 0.000001}}
validation: {method: purged_walk_forward, purge_bars: 24, embargo_bars: 24}
runtime: {seed: 7, repro_mode: strict, deterministic: true, threads: 1, seed_torch: false}
risk: {cost_per_turnover: 0.0001}
backtest: {engine: vectorized, signal_col: signal_sarimax_garch, returns_col: close_ret, returns_type: simple, subset: test, periods_per_year: 12096, missing_return_policy: raise_if_exposed}
diagnostics: {enabled: true, model: {enabled: true}, forecast: {quantiles: 10, autocorrelation_lags: [1, 2, 4, 8, 12, 24], volatility_col: atr_over_price_48}}
logging: {enabled: true, run_name: lab_local_10_xagusd_sarimax_vol_overlay_h12, output_dir: logs/lab/local_forecasters}
