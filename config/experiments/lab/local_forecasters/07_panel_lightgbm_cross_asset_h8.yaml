strategy: {name: lab_local_07_panel_lightgbm_cross_asset_h8, timeframe: 30m, assets: [XAUUSD, US100, US30, SPX500, GER40], description: "Local LightGBM panel lab for cross-asset 8-hour returns."}
data:
  source: dukascopy_csv
  interval: 30m
  symbols: [XAUUSD, US100, US30, SPX500, GER40]
  alignment: inner
  storage:
    mode: cached_only
    dataset_id: lab_local_07_panel_lightgbm_cross_asset_h8
    save_raw: false
    save_processed: true
    load_paths: {XAUUSD: data/raw/dukascopy_30m_clean/xauusd_30m.csv, US100: data/raw/dukascopy_30m_clean/us100_30m.csv, US30: data/raw/dukascopy_30m_clean/us30_30m.csv, SPX500: data/raw/dukascopy_30m_clean/spx500_30m.csv, GER40: data/raw/dukascopy_30m_clean/ger40_30m.csv}
    raw_dir: data/raw
    processed_dir: data/processed
features:
- {step: returns, outputs: {close_ret: close_ret}, params: {log: false, col_name: close_ret}}
- {step: volatility, params: {returns_col: close_ret, rolling_windows: [8, 24, 48, 96], ewma_spans: [], annualization_factor: null}}
- step: trend
  params: {price_col: close, sma_windows: [], ema_spans: [20, 50, 100], ema_col_template: "ema_{span}", add_ratios: false}
  transforms: {ratio: {enabled: true, items: [{numerator_col: close, denominator_col: ema_50, output_col: close_over_ema_50, subtract: 1.0}, {numerator_col: ema_20, denominator_col: ema_100, output_col: ema_trend_20_100, subtract: 1.0}]}}
- step: atr
  params: {high_col: high, low_col: low, close_col: close, window: 24, windows: [24], method: wilder}
  transforms: {ratio: {enabled: true, items: [{numerator_col: atr_24, denominator_col: close, output_col: atr_over_price_24}]}}
- {step: rsi, params: {price_col: close, windows: [14], method: wilder}}
- {step: macd, outputs: {macd_12_26: macd, macd_signal_9: macd_signal, macd_hist_12_26_9: macd_hist}, params: {price_col: close, fast: 12, slow: 26, signal: 9}}
- {step: roc, params: {price_col: close, windows: [3, 8, 16]}}
- {step: indicator_pullback, params: {asset_vocab: [XAUUSD, US100, US30, SPX500, GER40], open_col: open, high_col: high, low_col: low, close_col: close, ema_fast_period: 20, ema_mid_period: 50, ema_slow_period: 100, atr_period: 24, atr_pct_rank_window: 96, macd_hist_col: macd_hist, rsi_period: 14, realized_vol_windows: [8, 24, 48], return_windows: [1, 3, 8, 16], rolling_return_windows: [4, 8]}}
model:
  kind: lightgbm_regressor
  minimum_expected_features: 30
  outputs: {pred_ret_col: pred_ret, pred_prob_col: pred_prob, pred_is_oos_col: pred_is_oos}
  target: {kind: future_return_regression, price_col: close, returns_col: close_ret, returns_type: simple, horizon_bars: 16, normalize_by_volatility: true, volatility_col: atr_24, clip: [-3.0, 3.0], fwd_col: target_panel_8h_atr, label_col: target_panel_8h_atr}
  split: {method: purged, train_size: 30000, test_size: 5000, step_size: 5000, expanding: true, max_folds: 5, purge_bars: 16, embargo_bars: 16}
  feature_selectors: {include: [{regex: "^(close_ret|ret_|rolling_return_|vol_rolling_|close_over_ema_|ema_trend_|atr_|atr_over_price_|atr_pct|rsi_|macd|macd_signal|macd_hist|roc_|asset_id|ema_alignment_score|body_ratio|upper_wick_ratio|lower_wick_ratio|close_location|range_to_atr)"}], strict: {min_count: 30}}
  params: {n_estimators: 400, learning_rate: 0.03, max_depth: 6, num_leaves: 31, min_child_samples: 100, subsample: 0.85, colsample_bytree: 0.8, reg_alpha: 0.2, reg_lambda: 1.0, random_state: 7, n_jobs: 1, verbosity: -1}
signals: {kind: dense_return_forecast, params: {forecast_col: pred_ret, signal_col: expected_net_return, expected_net_return_col: expected_net_return, estimated_cost_col: estimated_round_trip_cost, cost_per_turnover: 0.0001, slippage_per_turnover: 0.00005, cost_round_trip_mult: 2.0, forecast_is_vol_normalized: true, volatility_col: atr_24, price_col: close, signed_cost_adjustment: true, clip: 3.0}}
validation: {method: purged_walk_forward, purge_bars: 16, embargo_bars: 16}
runtime: {seed: 7, repro_mode: strict, deterministic: true, threads: 1, seed_torch: false}
risk: {cost_per_turnover: 0.0001, slippage_per_turnover: 0.00005}
backtest: {engine: vectorized, signal_col: expected_net_return, returns_col: close_ret, returns_type: simple, subset: test, periods_per_year: 12096, missing_return_policy: raise_if_exposed}
portfolio: {enabled: true, construction: signal_weights, long_short: true, gross_target: 1.0, expected_return_col: expected_net_return, selection: {enabled: true, top_k: 2, min_expected_net_return: 0.10, rank_by_abs: true, weighting: score, rebalance_every_n_bars: 4}, constraints: {max_gross_leverage: 1.0, max_weight: 0.35, min_weight: -0.35}}
diagnostics: {enabled: true, model: {enabled: true}, forecast: {quantiles: 10, autocorrelation_lags: [1, 2, 4, 8, 16], volatility_col: atr_over_price_24}}
logging: {enabled: true, run_name: lab_local_07_panel_lightgbm_cross_asset_h8, output_dir: logs/lab/local_forecasters}
