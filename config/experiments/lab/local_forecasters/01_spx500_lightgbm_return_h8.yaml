strategy: {name: lab_local_01_spx500_lightgbm_return_h8, timeframe: 30m, assets: [SPX500], description: "Local LightGBM 8-hour return forecast lab for SPX500 using model-driven sizing instead of threshold entries."}
data:
  source: dukascopy_csv
  interval: 30m
  symbol: SPX500
  alignment: inner
  storage: {mode: cached_only, dataset_id: lab_local_01_spx500_lightgbm_return_h8, save_raw: false, save_processed: true, load_path: data/raw/dukascopy_30m_clean/spx500_30m.csv, raw_dir: data/raw, processed_dir: data/processed}
features:
- {step: returns, outputs: {close_ret: close_ret}, params: {log: false, col_name: close_ret}}
- {step: volatility, params: {returns_col: close_ret, rolling_windows: [8, 24, 48, 96, 192], ewma_spans: [], annualization_factor: null}}
- step: trend
  params: {price_col: close, sma_windows: [], ema_spans: [20, 50, 100, 200], ema_col_template: "ema_{span}", add_ratios: false}
  transforms: {ratio: {enabled: true, items: [{numerator_col: close, denominator_col: ema_50, output_col: close_over_ema_50, subtract: 1.0}, {numerator_col: close, denominator_col: ema_200, output_col: close_over_ema_200, subtract: 1.0}, {numerator_col: ema_20, denominator_col: ema_100, output_col: ema_trend_20_100, subtract: 1.0}]}}
- step: atr
  params: {high_col: high, low_col: low, close_col: close, window: 24, windows: [24], method: wilder}
  transforms: {ratio: {enabled: true, items: [{numerator_col: atr_24, denominator_col: close, output_col: atr_over_price_24}]}}
- {step: macd, outputs: {macd_12_26: macd, macd_signal_9: macd_signal, macd_hist_12_26_9: macd_hist}, params: {price_col: close, fast: 12, slow: 26, signal: 9}}
- {step: roc, params: {price_col: close, windows: [8, 16, 24]}}
model:
  kind: lightgbm_regressor
  minimum_expected_features: 10
  outputs: {pred_ret_col: pred_ret, pred_prob_col: pred_prob, pred_is_oos_col: pred_is_oos}
  target: {kind: future_return_regression, price_col: close, returns_col: close_ret, returns_type: simple, horizon_bars: 16, normalize_by_volatility: true, volatility_col: atr_24, clip: [-4.0, 4.0], fwd_col: target_ret_8h_atr, label_col: target_ret_8h_atr}
  split: {method: purged, train_size: 20000, test_size: 3000, step_size: 3000, expanding: true, max_folds: 6, purge_bars: 16, embargo_bars: 16}
  feature_cols: [close_ret, vol_rolling_8, vol_rolling_24, vol_rolling_48, vol_rolling_96, vol_rolling_192, atr_24, atr_over_price_24, close_over_ema_50, close_over_ema_200, ema_trend_20_100, macd_signal, macd_hist, roc_8, roc_16, roc_24]
  params: {n_estimators: 500, learning_rate: 0.02, max_depth: 4, num_leaves: 15, min_child_samples: 160, subsample: 0.8, colsample_bytree: 0.75, reg_alpha: 0.25, reg_lambda: 2.0, random_state: 7, n_jobs: 1, verbosity: -1}
signals: {kind: dense_return_forecast, params: {forecast_col: pred_ret, signal_col: expected_net_return, expected_net_return_col: expected_net_return, estimated_cost_col: estimated_round_trip_cost, cost_per_turnover: 0.0001, slippage_per_turnover: 0.00005, cost_round_trip_mult: 2.0, forecast_is_vol_normalized: true, volatility_col: atr_24, price_col: close, signed_cost_adjustment: true, clip: 1.0}}
validation: {method: purged_walk_forward, purge_bars: 16, embargo_bars: 16}
runtime: {seed: 7, repro_mode: strict, deterministic: true, threads: 1, seed_torch: false}
risk: {cost_per_turnover: 0.0001, slippage_per_turnover: 0.00005}
backtest: {engine: vectorized, signal_col: expected_net_return, returns_col: close_ret, returns_type: simple, subset: test, periods_per_year: 12096, missing_return_policy: raise_if_exposed}
diagnostics: {enabled: true, model: {enabled: true, shap: {enabled: true, max_rows: 300, top_n_features: 12, per_prediction_top_k: 5, per_prediction_row_limit: 5, random_state: 7}}, forecast: {quantiles: 10, autocorrelation_lags: [1, 2, 4, 8, 16], volatility_col: atr_over_price_24}}
logging: {enabled: true, run_name: lab_local_01_spx500_lightgbm_return_h8, output_dir: logs/lab/local_forecasters}
