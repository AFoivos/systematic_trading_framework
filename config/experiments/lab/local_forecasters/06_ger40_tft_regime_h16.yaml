strategy: {name: lab_local_06_ger40_tft_regime_h16, timeframe: 30m, assets: [GER40], description: "Local TFT regime-conditioned return forecast lab for GER40."}
data:
  source: dukascopy_csv
  interval: 30m
  symbol: GER40
  alignment: inner
  storage: {mode: cached_only, dataset_id: lab_local_06_ger40_tft_regime_h16, save_raw: false, save_processed: true, load_path: data/raw/dukascopy_30m_clean/ger40_30m.csv, raw_dir: data/raw, processed_dir: data/processed}
features:
- {step: returns, outputs: {close_ret: close_ret}, params: {log: false, col_name: close_ret}}
- {step: volatility, params: {returns_col: close_ret, rolling_windows: [16, 48, 96, 192], ewma_spans: [], annualization_factor: null}}
- step: trend
  params: {price_col: close, sma_windows: [], ema_spans: [24, 72, 144], ema_col_template: "ema_{span}", add_ratios: false}
  transforms: {ratio: {enabled: true, items: [{numerator_col: close, denominator_col: ema_72, output_col: close_over_ema_72, subtract: 1.0}, {numerator_col: ema_24, denominator_col: ema_144, output_col: ema_trend_24_144, subtract: 1.0}]}}
- step: atr
  params: {high_col: high, low_col: low, close_col: close, window: 48, windows: [48], method: wilder}
  transforms: {ratio: {enabled: true, items: [{numerator_col: atr_48, denominator_col: close, output_col: atr_over_price_48}]}}
- {step: adx, params: {high_col: high, low_col: low, close_col: close, window: 14, windows: [14]}}
- {step: rsi, params: {price_col: close, windows: [14], method: wilder}}
- {step: bollinger, params: {price_col: close, window: 96, n_std: 2.0}}
- {step: roc, params: {price_col: close, windows: [4, 8, 16, 32]}}
model:
  kind: tft_forecaster
  minimum_expected_features: 16
  outputs: {pred_ret_col: pred_ret, pred_prob_col: pred_prob, pred_is_oos_col: pred_is_oos}
  target: {kind: future_return_regression, price_col: close, returns_col: close_ret, returns_type: simple, horizon_bars: 32, normalize_by_volatility: true, volatility_col: atr_48, clip: [-3.5, 3.5], fwd_col: target_regime_16h_atr, label_col: target_regime_16h_atr}
  split: {method: purged, train_size: 18000, test_size: 2500, step_size: 2500, expanding: true, max_folds: 4, purge_bars: 32, embargo_bars: 32}
  feature_selectors: {include: [{regex: "^(close_ret|vol_rolling_|close_over_ema_|ema_trend_|atr_|atr_over_price_|adx_|plus_di_|minus_di_|rsi_|bb_|bollinger_|roc_)"}], strict: {min_count: 16}}
  params: {lookback: 64, hidden_dim: 32, num_heads: 4, num_layers: 1, dropout: 0.10, epochs: 6, batch_size: 128, learning_rate: 0.001, weight_decay: 0.0001, min_train_samples: 64, quantiles: [0.1, 0.5, 0.9], scale_target: true}
signals: {kind: forecast_threshold, params: {forecast_col: pred_ret, signal_col: signal_tft_regime, upper: 0.30, lower: -0.30, mode: long_short}}
validation: {method: purged_walk_forward, purge_bars: 32, embargo_bars: 32}
runtime: {seed: 7, repro_mode: strict, deterministic: true, threads: 1, seed_torch: true}
risk: {cost_per_turnover: 0.0001}
backtest: {engine: vectorized, signal_col: signal_tft_regime, returns_col: close_ret, returns_type: simple, subset: test, periods_per_year: 12096, missing_return_policy: raise_if_exposed}
diagnostics: {enabled: true, model: {enabled: true}, forecast: {quantiles: 10, autocorrelation_lags: [1, 2, 4, 8, 16, 32], volatility_col: atr_over_price_48}}
logging: {enabled: true, run_name: lab_local_06_ger40_tft_regime_h16, output_dir: logs/lab/local_forecasters}
