extends: base/hourly.yaml

data:
  source: twelve_data
  symbol: "BTC/USD"
  interval: "1h"
  start: "2024-01-01"
  end: null
  api_key_env: "TWELVEDATA_API_KEY"
  storage:
    mode: live_or_cached
    dataset_id: "usdbtc_1h_twelve_garch_hybrid"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72]
      ewma_spans: [24]
      annualization_factor: 8760.0
  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6]

model:
  kind: garch_forecaster
  target:
    kind: forward_return
    price_col: close
    horizon: 1
  split:
    method: walk_forward
    train_size: 1440
    test_size: 168
    step_size: 168
    expanding: false
  params:
    returns_input_col: close_logret
    mean_model: ar1

signals:
  kind: forecast_vol_adjusted
  params:
    forecast_col: pred_ret
    vol_col: pred_vol
    signal_name: signal_forecast_vol_adj
    clip: 1.0
    vol_floor: 1.0e-6

risk:
  target_vol: null
  max_leverage: 1.0
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.0

backtest:
  returns_col: close_logret
  signal_col: signal_forecast_vol_adj
  periods_per_year: 8760
  returns_type: log

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false

logging:
  run_name: usdbtc_1h_twelve_garch_hybrid_v1
