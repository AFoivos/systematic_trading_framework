backtest:
  engine: manual_barrier
  signal_col: manual_vol_adjusted_signal
  returns_col: close_ret
  returns_type: simple
  subset: full
  min_holding_bars: 0
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  vol_col: null
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 1.8
  stop_loss_r: 1.0
  risk_per_trade: 0.003
  max_holding_bars: 12

portfolio:
  enabled: false
  construction: signal_weights
  long_short: false
  gross_target: 1.0
  expected_return_col: null
  covariance_window: 240
  covariance_rebalance_step: 48
  risk_aversion: 8.0
  trade_aversion: 0.0
  constraints:
    max_gross_leverage: 1.0
    max_weight: 1.0
    min_weight: 0.0
    target_net_exposure: 0.0
    enforce_target_net_exposure: false
  asset_groups: {}

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: true
  run_name: roc_long_only_xauusd_manual_barrier
  output_dir: logs/experiments
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 24
    max_assets: 1
