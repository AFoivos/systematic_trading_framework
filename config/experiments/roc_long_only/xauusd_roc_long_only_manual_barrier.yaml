signals:
  kind: roc_long_only_conditions
  params:
    signal_col: manual_vol_adjusted_signal
    roc_window: 12
    roc_min: 0.002
    vol_short_window: 24
    vol_long_window: 168
    vol_z_min: -1.5
    vol_z_max: 1.75
    close_z_col: close_z
    close_z_min: 0.0
    close_z_max: 2.3
    close_open_ratio_col: close_open_ratio
    close_open_ratio_min: 0.0002
    mtf_1h_col: mtf_1h_trend_score
    mtf_1h_min: -0.001
    mtf_4h_col: mtf_4h_trend_score
    mtf_4h_min: -0.002
    is_weekend_col: is_weekend
    macro_condition_col: null
    min_score_required: 6
    require_all_conditions: false
    vol_adjustment_strength: 0.9
    min_exposure: 0.10
    max_exposure: 1.0

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.00010
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null

