data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: XAUUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: roc_long_only_xauusd_30m
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/xauusd_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed

features:
  - step: returns
    params:
      log: false
      col_name: close_ret
  - step: volatility
    params:
      returns_col: close_ret
      rolling_windows: [24]
      ewma_spans: []
      annualization_factor: null
  - step: roc
    params:
      price_col: close
      windows: [12]
  - step: session_context
    params:
      timezone: UTC
      include_weekend_flag: true
  - step: regime_context
    params:
      price_col: close
      returns_col: close_ret
      vol_short_window: 24
      vol_long_window: 168
      vol_window_pairs:
        - [24, 168]
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.25
      vol_ratio_low_threshold: 0.85
  - step: multi_timeframe
    params:
      base_interval_minutes: 30
      timeframes: [1h, 4h]
      price_col: close
      high_col: high
      low_col: low
      open_col: open
      volume_col: volume
      returns_col: close_ret
      timezone: UTC
      shift_to_last_closed: true
      timestamp_convention: bar_start
  - step: feature_transforms
    params:
      transforms:
        - kind: rolling_zscore
          source_col: close
          output_col: close_z
          window: 252
          shift: 1

