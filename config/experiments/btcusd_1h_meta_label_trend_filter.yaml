# Closest valid approximation to "primary rule side + meta-labeling" in the current repo.
# There is no explicit two-stage orchestration where a rule-based side is emitted first and
# then filtered by a secondary model. This config uses the strongest supported directional
# rule family (trend-state) as the primary-side proxy inside the feature set, then applies a
# logistic_regression_clf event filter on triple-barrier labels and maps probabilities to
# conviction-sized exposure.
data:
  source: dukascopy_csv
  interval: 1h
  start: "2017-05-07 23:00:00"
  end: "2024-12-31 14:00:00"
  alignment: inner
  symbol: BTCUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: "btcusd_1h_meta_label_trend_filter"
    save_raw: false
    save_processed: true
    load_path: "data/raw/dukas_copy_bank/btcusd_h1.csv"
    raw_dir: "data/raw"
    processed_dir: "data/processed"

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72, 168]
      ewma_spans: [24, 72]
      annualization_factor: 8760.0
  - step: trend
    params:
      price_col: close
      sma_windows: [24, 72]
      ema_spans: [12, 24, 72]
  - step: trend_regime
    params:
      price_col: close
      base_sma_for_sign: 72
      short_sma: 24
      long_sma: 72
  - step: session_context
    params:
      timezone: UTC
  - step: regime_context
    params:
      price_col: close
      returns_col: close_logret
      vol_short_window: 24
      vol_long_window: 168
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.35
      vol_ratio_low_threshold: 0.8
  - step: macro_context
    params:
      columns: [dxy_close, spx_close, xauusd_close]
      availability_lag: 1
      lags: [1, 24]
      pct_change_periods: [1, 24]
      zscore_window: 168
      ema_spans: [24]
      allow_missing: true
  - step: bollinger
    params:
      price_col: close
      window: 24
      n_std: 2.0
  - step: roc
    params:
      price_col: close
      windows: [6, 24]
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      method: wilder
      add_over_price: true
  - step: adx
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
  - step: volume_features
    params:
      volume_col: volume
      atr_col: atr_24
      high_col: high
      low_col: low
      close_col: close
      atr_window: 24
      vol_z_window: 72
  - step: mfi
    params:
      high_col: high
      low_col: low
      close_col: close
      volume_col: volume
      window: 24
  - step: price_momentum
    params:
      price_col: close
      windows: [6, 24]
  - step: return_momentum
    params:
      returns_col: close_logret
      windows: [6, 24]
  - step: vol_normalized_momentum
    params:
      returns_col: close_logret
      vol_col: vol_rolling_24
      windows: [6, 24]
      eps: 1.0e-8
  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6, 24]

model:
  kind: logistic_regression_clf
  params:
    C: 1.0
    max_iter: 1000
    solver: lbfgs
    random_state: 7
  feature_cols:
    - close_trend_state_sma_24_72
    - close_trend_regime_sma_72
    - regime_trend_ratio_24_72
    - regime_trend_state_24_72
    - close_over_ema_24
    - close_over_sma_24
    - vol_rolling_24
    - vol_ewma_24
    - adx_24
    - atr_over_price_24
    - bb_percent_b_24_2.0
    - close_logret_mom_24
    - lag_close_logret_1
    - lag_close_logret_6
    - session_us
    - regime_vol_ratio_24_168
    - regime_absret_z_24_168
  target:
    kind: triple_barrier
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    returns_col: close_logret
    max_holding: 24
    upper_mult: 1.5
    lower_mult: 1.5
    vol_window: 24
    neutral_label: drop
  split:
    method: walk_forward
    train_size: 8760
    test_size: 336
    step_size: 336
    expanding: true
    max_folds: null

signals:
  kind: probability_threshold
  params:
    prob_col: pred_prob
    signal_col: signal_prob_threshold
    upper: 0.55
    lower: 0.45
    mode: long_short

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.00015
  target_vol: null
  max_leverage: 1.0
  dd_guard:
    max_drawdown: 0.12
    cooloff_bars: 48
    enabled: true
  vol_col: null

backtest:
  returns_col: close_logret
  signal_col: signal_prob_size
  periods_per_year: 8760
  returns_type: log
  missing_return_policy: raise_if_exposed
  min_holding_bars: 2
  subset: test
  vol_col: null

portfolio:
  enabled: false
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  expected_return_col: null
  covariance_window: 60
  covariance_rebalance_step: 1
  risk_aversion: 5.0
  trade_aversion: 0.0
  constraints: {}
  asset_groups: {}

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 1000000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: true
  run_name: btcusd_1h_meta_label_trend_filter
  output_dir: "logs/experiments"
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 18
    max_assets: 1
