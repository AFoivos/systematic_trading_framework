extends: base/hourly.yaml

data:
  source: twelve_data
  symbols: ["EURUSD", "USDJPY", "GBPUSD", "AUDUSD"]
  interval: "1h"
  start: "2025-11-01"
  end: null
  alignment: inner
  api_key_env: "TWELVEDATA_API_KEY"
  storage:
    mode: live_or_cached
    dataset_id: "fx_majors_1h_twelve_handcrafted_state"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: true
      col_name: close_logret

  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72]
      ewma_spans: [24]
      annualization_factor: 6048.0

  - step: trend
    params:
      price_col: close
      sma_windows: [24, 72]
      ema_spans: [6, 24]

  - step: trend_regime
    params:
      price_col: close
      base_sma_for_sign: 72
      short_sma: 24
      long_sma: 72

  - step: indicators
    params:
      price_col: close
      high_col: high
      low_col: low
      volume_col: volume
      bb_window: 24
      bb_nstd: 2.0
      roc_windows: [6, 24]
      atr_window: 24
      adx_window: 24
      vol_z_window: 72
      include_mfi: false

  - step: oscillators
    params:
      price_col: close
      high_col: high
      low_col: low
      rsi_windows: [2, 14]
      stoch_windows: [14]
      stoch_smooth: 3

  - step: momentum
    params:
      price_col: close
      returns_col: close_logret
      vol_col: vol_rolling_24
      windows: [6, 24]

  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6, 24]

model:
  kind: none
  signal_col: signal_rl
  action_col: action_rl
  feature_cols:
    - lag_close_logret_1
    - lag_close_logret_2
    - lag_close_logret_6
    - lag_close_logret_24
    - vol_rolling_24
    - vol_ewma_24
    - close_over_ema_6
    - close_trend_state_sma_24_72
    - close_logret_mom_6
    - close_logret_mom_24
    - close_logret_norm_mom_24
    - close_rsi_2
    - close_rsi_14
    - bb_percent_b_24_2.0
  target:
    kind: forward_return
    price_col: close
    horizon: 1
  split:
    method: walk_forward
    train_size: 2160
    test_size: 168
    step_size: 168
    expanding: false
    max_folds: 4

signals:
  kind: none
  params: {}

portfolio:
  enabled: true
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  constraints:
    min_weight: -0.4
    max_weight: 0.4
    max_gross_leverage: 1.0
    target_net_exposure: 0.0
    turnover_limit: 0.35
  asset_groups:
    EURUSD: fx
    USDJPY: fx
    GBPUSD: fx
    AUDUSD: fx

risk:
  target_vol: null
  max_leverage: 1.0
  cost_per_turnover: 0.0001
  slippage_per_turnover: 0.0
  dd_guard:
    enabled: false
    max_drawdown: 0.2
    cooloff_bars: 20

backtest:
  returns_col: close_logret
  signal_col: signal_rl
  periods_per_year: 6048
  returns_type: log
  subset: test

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false

logging:
  run_name: fx_majors_1h_twelve_handcrafted_state_v1
