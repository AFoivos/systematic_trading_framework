data:
  source: dukascopy_csv
  interval: 1h
  start: "2017-05-07 23:00:00"
  end: "2024-12-31 14:00:00"
  alignment: inner
  symbol: BTCUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: "btcusd_1h_shock_meta_xgboost_long_only"
    save_raw: false
    save_processed: true
    load_path: "data/raw/dukas_copy_bank/btcusd_h1.csv"
    raw_dir: "data/raw"
    processed_dir: "data/processed"

features:
  - step: returns
    enabled: true
    params:
      log: true
      col_name: close_logret
  - step: trend
    enabled: true
    params:
      price_col: close
      sma_windows: []
      ema_spans: [24]
  - step: regime_context
    enabled: true
    params:
      price_col: close
      returns_col: close_logret
      vol_short_window: 24
      vol_long_window: 168
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.35
      vol_ratio_low_threshold: 0.8
  - step: bollinger
    enabled: true
    params:
      price_col: close
      window: 24
      n_std: 2.0
  - step: atr
    enabled: true
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      method: wilder
      add_over_price: true
  - step: shock_context
    enabled: true
    params:
      price_col: close
      high_col: high
      low_col: low
      returns_col: close_logret
      ema_col: close_ema_24
      atr_col: atr_24
      short_horizon: 1
      medium_horizon: 4
      vol_window: 24
      ret_z_threshold: 2.5
      atr_mult_threshold: 1.75
      distance_from_mean_threshold: 1.10
      post_shock_active_bars: 4
  - step: rsi
    enabled: true
    params:
      price_col: close
      windows: [2, 14]
      method: wilder
  - step: lags
    enabled: true
    params:
      cols: [close_logret]
      lags: [1]

model:
  kind: xgboost_clf
  params:
    n_estimators: 350
    learning_rate: 0.03
    num_leaves: null
    max_depth: 4
    subsample: 0.9
    colsample_bytree: 0.9
    min_child_samples: null
    random_state: 7
    min_child_weight: 5.0
    reg_lambda: 1.0
    objective: binary:logistic
    eval_metric: logloss
    tree_method: hist
  preprocessing:
    scaler: none
  feature_cols:
    - shock_ret_z_1h
    - shock_ret_z_4h
    - shock_atr_multiple_1h
    - shock_atr_multiple_4h
    - shock_distance_ema
    - shock_strength
    - bars_since_shock
    - shock_active_window
    - regime_vol_ratio_24_168
    - regime_absret_z_24_168
    - bb_percent_b_24_2.0
    - close_rsi_2
    - close_rsi_14
    - lag_close_logret_1
  target:
    kind: triple_barrier
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    returns_col: close_logret
    max_holding: 24
    upper_mult: 1.5
    lower_mult: 1.5
    vol_window: 24
    neutral_label: drop
    side_col: shock_side_contrarian
    candidate_col: shock_down_candidate
    candidate_out_col: meta_candidate
  split:
    method: walk_forward
    train_size: 8760
    test_size: 336
    step_size: 336
    expanding: true
    max_folds: null

signals:
  kind: probability_threshold
  params:
    prob_col: pred_prob
    signal_col: signal_prob_threshold
    base_signal_col: shock_side_contrarian_active
    upper: 0.56
    upper_exit: 0.49
    lower: 0.43
    lower_exit: 0.48
    mode: long_only

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.00015
  target_vol: null
  max_leverage: 1.0
  dd_guard:
    enabled: true
    max_drawdown: 0.12
    rearm_drawdown: 0.08
    cooloff_bars: 48
  vol_col: null

backtest:
  returns_col: close_logret
  signal_col: signal_prob_threshold
  periods_per_year: 8760
  returns_type: log
  missing_return_policy: raise_if_exposed
  min_holding_bars: 3
  subset: test
  vol_col: null

portfolio:
  enabled: false
  construction: signal_weights
  gross_target: 1.0
  long_short: false
  expected_return_col: null
  covariance_window: 60
  covariance_rebalance_step: 1
  risk_aversion: 5.0
  trade_aversion: 0.0
  constraints: {}
  asset_groups: {}

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 1000000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: true
  run_name: btcusd_1h_shock_meta_xgboost_long_only
  output_dir: "logs/experiments"
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 18
    max_assets: 1
