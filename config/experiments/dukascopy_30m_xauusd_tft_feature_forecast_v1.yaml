data:
  source: dukascopy_csv
  interval: 30m
  start: "2023-01-01 00:00:00"
  end: "2024-10-01 00:00:00"
  alignment: inner
  symbol: XAUUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: "dukascopy_30m_xauusd_tft_feature_forecast_v1"
    save_raw: false
    save_processed: true
    load_path: "data/raw/dukascopy_30m_clean/xauusd_30m.csv"
    raw_dir: "data/raw"
    processed_dir: "data/processed"

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [12, 24, 48, 96, 192]
      ewma_spans: [12, 24, 48, 96]
      annualization_factor: 12096.0
  - step: trend
    params:
      price_col: close
      sma_windows: [24, 48, 96, 192]
      ema_spans: [8, 12, 24, 48, 96]
  - step: trend_regime
    params:
      price_col: close
      base_sma_for_sign: 96
      short_sma: 24
      long_sma: 96
  - step: session_context
    params:
      timezone: UTC
      sessions:
        london_ny_liquid: [7, 17]
  - step: regime_context
    params:
      price_col: close
      returns_col: close_logret
      vol_short_window: 24
      vol_long_window: 192
      vol_window_pairs:
        - [12, 96]
        - [24, 192]
        - [48, 384]
      trend_fast_span: 24
      trend_slow_span: 96
      vol_ratio_high_threshold: 1.35
      vol_ratio_low_threshold: 0.8
  - step: bollinger
    params:
      price_col: close
      window: 24
      n_std: 2.0
  - step: roc
    params:
      price_col: close
      windows: [4, 12, 24]
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      windows: [14, 24]
      method: wilder
      add_over_price: true
  - step: adx
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      windows: [14, 24]
  - step: rsi
    params:
      price_col: close
      windows: [2, 14]
      method: wilder
  - step: price_momentum
    params:
      price_col: close
      windows: [4, 12, 24]
  - step: return_momentum
    params:
      returns_col: close_logret
      windows: [4, 12, 24]
  - step: vol_normalized_momentum
    params:
      returns_col: close_logret
      vol_col: vol_rolling_24
      vol_window: 24
      windows: [4, 6, 8, 12, 18, 24]
      eps: 1.0e-8
  - step: multi_timeframe
    params:
      base_interval_minutes: 30
      timeframes: [1h, 4h]
      price_col: close
      high_col: high
      low_col: low
      open_col: open
      volume_col: volume
      returns_col: close_logret
      timezone: UTC
      shift_to_last_closed: true
      timestamp_convention: bar_start
  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 4, 12, 24, 48]

model:
  kind: tft_forecaster
  params:
    lookback: 96
    hidden_dim: 64
    num_heads: 4
    num_layers: 2
    dropout: 0.1
    epochs: 8
    batch_size: 128
    learning_rate: 0.001
    weight_decay: 0.0001
    quantiles: [0.1, 0.5, 0.9]
    scale_target: true
    min_train_samples: 128
  feature_selectors:
    profile: ftmo_fx_intraday_balanced_v1
    families:
      returns_lags: true
      volatility: true
      trend: true
      momentum: true
      regime: true
      session_time: true
      atr_adx_range: true
      cross_asset: false
    exact:
      - spread_bps
    include:
      - startswith: mtf_1h_
      - startswith: mtf_4h_
    exclude:
      - startswith: label_
      - startswith: pred_
      - startswith: signal_
      - startswith: tb_
    strict:
      min_count: 32
  target:
    kind: forward_return
    price_col: close
    returns_col: close_logret
    returns_type: log
    horizon: 1
  split:
    method: walk_forward
    train_size: 8064
    test_size: 336
    step_size: 336
    expanding: true
    max_folds: 6
  pred_ret_col: tft_pred_ret
  pred_prob_col: tft_pred_prob

signals:
  kind: forecast_vol_adjusted
  params:
    forecast_col: tft_pred_ret
    vol_col: pred_vol
    signal_col: signal_tft_vol_adj
    clip: 0.75
    vol_floor: 1.0e-6

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: true

risk:
  cost_per_turnover: 0.000025
  slippage_per_turnover: 0.00001
  target_vol: null
  max_leverage: 1.0
  dd_guard:
    enabled: true
    max_drawdown: 0.10
    rearm_drawdown: 0.06
    cooloff_bars: 48
  vol_col: null

backtest:
  signal_col: signal_tft_vol_adj
  returns_col: close_logret
  returns_type: log
  subset: test
  min_holding_bars: 2
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  vol_col: null

portfolio:
  enabled: false
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  expected_return_col: null
  covariance_window: 240
  covariance_rebalance_step: 48
  risk_aversion: 8.0
  trade_aversion: 0.0
  constraints: {}
  asset_groups: {}

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: true
  run_name: dukascopy_30m_xauusd_tft_feature_forecast_v1
  output_dir: "logs/experiments"
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 18
    max_assets: 1
