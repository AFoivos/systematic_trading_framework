# The repo supports both tft_forecaster and patchtst_forecaster.
# This config uses TFT because the implementation is already wired into the same
# forward-forecast + GARCH-overlay contract as the rest of the forecasting stack.
# The tracked BTCUSD Dukas CSV does not ship external macro covariates, so macro-derived
# features are intentionally not referenced in model.feature_cols.
data:
  source: dukascopy_csv
  interval: 1h
  start: "2017-05-07 23:00:00"
  end: "2026-03-22"
  alignment: inner
  symbol: BTCUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: "btcusd_1h_tft_or_patchtst_forecast"
    save_raw: false
    save_processed: true
    load_path: "data/raw/dukas_copy_bank/btcusd_h1.csv"
    raw_dir: "data/raw"
    processed_dir: "data/processed"

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72, 168]
      ewma_spans: [24, 72]
      annualization_factor: 8760.0
  - step: trend
    params:
      price_col: close
      sma_windows: [24, 72]
      ema_spans: [12, 24, 72]
  - step: session_context
    params:
      timezone: UTC
  - step: regime_context
    params:
      price_col: close
      returns_col: close_logret
      vol_short_window: 24
      vol_long_window: 168
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.35
      vol_ratio_low_threshold: 0.8
  - step: macro_context
    params:
      columns: [dxy_close, spx_close, xauusd_close]
      availability_lag: 1
      lags: [1, 24]
      pct_change_periods: [1, 24]
      zscore_window: 168
      ema_spans: [24]
      allow_missing: true
  - step: momentum
    params:
      price_col: close
      returns_col: close_logret
      vol_col: vol_rolling_24
      windows: [6, 24]

model:
  kind: tft_forecaster
  params:
    lookback: 48
    hidden_dim: 64
    num_heads: 4
    num_layers: 2
    dropout: 0.1
    epochs: 10
    batch_size: 64
    learning_rate: 0.001
    weight_decay: 0.0001
    quantiles: [0.1, 0.5, 0.9]
    scale_target: true
  feature_cols:
    - close_logret
    - vol_rolling_24
    - vol_ewma_24
    - close_over_sma_24
    - close_over_ema_24
    - close_logret_mom_6
    - close_logret_mom_24
    - close_logret_norm_mom_24
    - hour_sin_24
    - hour_cos_24
    - session_us
    - session_europe_us_overlap
    - regime_vol_ratio_24_168
    - regime_vol_ratio_z_24_168
    - regime_trend_ratio_24_72
    - regime_trend_state_24_72
    - regime_absret_z_24_168
  target:
    kind: forward_return
    price_col: close
    horizon: 1
  split:
    method: walk_forward
    train_size: 8760
    test_size: 336
    step_size: 336
    expanding: true
    max_folds: null
  overlay:
    kind: garch
    params:
      returns_input_col: close_logret
      mean_model: zero

signals:
  kind: forecast_vol_adjusted
  params:
    forecast_col: pred_ret
    vol_col: pred_vol
    signal_name: signal_forecast_vol_adj
    clip: 0.6
    vol_floor: 1.0e-6

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.00015
  target_vol: null
  max_leverage: 1.0
  dd_guard:
    max_drawdown: 0.12
    cooloff_bars: 48
    enabled: true
  vol_col: null

backtest:
  returns_col: close_logret
  signal_col: signal_forecast_vol_adj
  periods_per_year: 8760
  returns_type: log
  missing_return_policy: raise_if_exposed
  subset: test
  vol_col: null

portfolio:
  enabled: false
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  expected_return_col: null
  covariance_window: 60
  covariance_rebalance_step: 1
  risk_aversion: 5.0
  trade_aversion: 0.0
  constraints: {}
  asset_groups: {}

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 1000000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: true
  run_name: btcusd_1h_tft_or_patchtst_forecast
  output_dir: "logs/experiments"
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 18
    max_assets: 1
