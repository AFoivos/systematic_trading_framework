data:
  source: dukascopy_csv
  interval: 1h
  start: "2023-01-01 00:00:00"
  end: "2025-01-01 00:00:00"
  alignment: inner
  symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
    - AUDUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: "ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_conservative_v1"
    save_raw: false
    save_processed: true
    load_paths:
      EURUSD: "data/raw/dukas_copy_bank/eurusd_h1.csv"
      GBPUSD: "data/raw/dukas_copy_bank/gbpusd_h1.csv"
      USDJPY: "data/raw/dukas_copy_bank/usdjpy_h1.csv"
      AUDUSD: "data/raw/dukas_copy_bank/audusd_h1.csv"
    raw_dir: "data/raw"
    processed_dir: "data/processed"

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [12, 24, 48, 72, 96, 120, 168]
      ewma_spans: [12, 24, 48, 72, 96]
      annualization_factor: 6048.0
  - step: trend
    params:
      price_col: close
      sma_windows: [24, 36, 72, 96]
      ema_spans: [8, 12, 16, 24, 36, 72, 96]
  - step: trend_regime
    params:
      price_col: close
      base_sma_for_sign: 72
      short_sma: 24
      long_sma: 72
  - step: session_context
    params:
      timezone: UTC
      sessions:
        liquid_fx: [7, 21]
  - step: regime_context
    params:
      price_col: close
      returns_col: close_logret
      vol_short_window: 24
      vol_long_window: 168
      vol_window_pairs:
        - [12, 120]
        - [24, 168]
        - [36, 240]
      trend_fast_span: 24
      trend_slow_span: 72
      vol_ratio_high_threshold: 1.35
      vol_ratio_low_threshold: 0.8
  - step: bollinger
    params:
      price_col: close
      window: 24
      n_std: 2.0
  - step: roc
    params:
      price_col: close
      windows: [6, 24]
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      windows: [14, 18, 24, 30]
      method: wilder
      add_over_price: true
  - step: adx
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 24
      windows: [14, 18, 24, 30]
  - step: rsi
    params:
      price_col: close
      windows: [2, 14]
      method: wilder
  - step: price_momentum
    params:
      price_col: close
      windows: [6, 24]
  - step: return_momentum
    params:
      returns_col: close_logret
      windows: [6, 24]
  - step: vol_normalized_momentum
    params:
      returns_col: close_logret
      vol_col: vol_rolling_24
      vol_window: 24
      windows: [4, 6, 8, 12, 18, 24, 30, 36]
      eps: 1.0e-8
  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6, 24]

model:
  kind: xgboost_clf
  params:
    n_estimators: 250
    learning_rate: 0.025
    max_depth: 3
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 10.0
    reg_lambda: 2.0
    reg_alpha: 0.1
    random_state: 7
    objective: binary:logistic
    eval_metric: logloss
    tree_method: hist
  preprocessing:
    scaler: none
  feature_selectors:
    profile: ftmo_fx_intraday_balanced_v1
    families:
      returns_lags: true
      volatility: true
      trend: true
      momentum: true
      regime: true
      session_time: true
      atr_adx_range: true
      cross_asset: false
    drift_filter:
      enabled: true
      max_psi: 0.5
      action: warn
      apply_scope: train_only_report
      family_drift_ratio_threshold: 0.5
    strict:
      min_count: 32
  target:
    kind: triple_barrier
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    returns_col: close_logret
    returns_type: log
    max_holding: 24
    upper_mult: 2.0
    lower_mult: 1.0
    neutral_label: lower
    tie_break: lower
    vol_window: 24
    min_vol: 0.0001
    entry_price_mode: next_open
    label_col: label
    event_ret_col: tb_event_ret
    add_r_multiple: true
    r_col: tb_event_r
    oriented_r_col: tb_oriented_r
    label_mode: binary
  split:
    method: walk_forward
    train_size: 6048
    test_size: 240
    step_size: 240
    expanding: true
    max_folds: null
  overlay:
    kind: garch
    params:
      returns_input_col: close_logret
      mean_model: zero

signals:
  kind: probability_vol_adjusted
  params:
    prob_col: pred_prob
    vol_col: pred_vol
    signal_col: signal_prob_vol_adj
    prob_center: 0.5
    upper: 0.65
    lower: 0.35
    vol_target: null
    clip: 1.0
    vol_floor: 1.0e-6
    min_signal_abs: 0.05
    activation_filters:
      - selector:
          exact: session_liquid_fx
        op: ge
        value: 1.0
      - selector:
          exact: is_weekend
        op: le
        value: 0.0
      - selector:
          exact: adx_30
        op: ge
        value: 24.0

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.000025
  slippage_per_turnover: 0.00001
  target_vol: null
  max_leverage: 1.0
  sizing:
    kind: ftmo_risk_per_trade
    vol_col: pred_vol
    risk_per_trade: 0.0015
    stop_mult: 1.0
    max_leverage: 1.0
    min_leverage: 0.0
    min_abs_signal: 0.05
    target_vol: null
    confidence_col: pred_prob
    confidence_floor: 0.65
    confidence_power: 1.5
  dd_guard:
    enabled: true
    max_drawdown: 0.07
    rearm_drawdown: 0.04
    cooloff_bars: 72
  portfolio_guard:
    enabled: true
    daily_soft_stop: 0.01
    daily_hard_stop: 0.025
    weekly_return_target: 0.015
    weekly_profit_lock: 0.015
    after_target_mode: flatten
    after_target_risk_multiplier: 0.0
    max_daily_loss: 0.025
    weekly_drawdown: 0.04
    max_total_loss: 0.08
    cooloff_bars: 24
    rearm_on_new_period: true
    weekly_anchor: W-FRI
  drawdown_sizing:
    enabled: true
    levels:
      - max_dd: 0.02
        multiplier: 1.0
      - max_dd: 0.04
        multiplier: 0.5
      - max_dd: 0.06
        multiplier: 0.25
      - max_dd: 0.08
        multiplier: 0.0
  vol_col: null

backtest:
  returns_col: close_logret
  signal_col: signal_prob_vol_adj
  periods_per_year: 6048
  returns_type: log
  missing_return_policy: raise_if_exposed
  min_holding_bars: 4
  subset: test
  vol_col: null

portfolio:
  enabled: true
  construction: signal_weights
  gross_target: 1.0
  long_short: true
  expected_return_col: null
  covariance_window: 120
  covariance_rebalance_step: 24
  risk_aversion: 8.0
  trade_aversion: 0.0
  constraints:
    min_weight: -1.0
    max_weight: 1.0
    max_gross_leverage: 1.0
    target_net_exposure: 0.0
  asset_groups: {}

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}

logging:
  enabled: true
  run_name: ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_conservative_v1
  output_dir: "logs/experiments"
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 18
    max_assets: 4
