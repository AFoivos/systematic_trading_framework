strategy:
  name: btcusd_30m_shock_meta_xgboost_long_only_v1
  timeframe: 30m
  assets:
  - BTCUSD
  description: Rebuilt 30m long-only BTCUSD contrarian shock meta-model from the legacy
    1h BEST artifact.
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: BTCUSD
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: btcusd_30m_shock_meta_xgboost_long_only_v1
    save_raw: false
    save_processed: false
    load_path: data/raw/dukascopy_30m_clean/btcusd_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed
features:
- step: returns
  params:
    log: true
    col_name: close_logret
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans:
    - 48
    add_ratios: false
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: close_ema_48
        output_col: close_over_ema_48
        subtract: 1.0
- step: regime_context
  params:
    price_col: close
    returns_col: close_logret
    vol_short_window: 48
    vol_long_window: 336
    trend_fast_span: 48
    trend_slow_span: 144
    vol_ratio_high_threshold: 1.35
    vol_ratio_low_threshold: 0.8
- step: bollinger
  params:
    price_col: close
    window: 48
    n_std: 2.0
- step: atr
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 48
    windows:
    - 48
    method: wilder
    add_over_price: false
    atr_col: atr_48
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: atr_48
        denominator_col: close
        output_col: atr_over_price_48
- step: shock_context
  params:
    price_col: close
    high_col: high
    low_col: low
    returns_col: close_logret
    ema_col: close_ema_48
    atr_col: atr_48
    short_horizon: 2
    medium_horizon: 8
    vol_window: 48
    ret_z_threshold: 2.5
    atr_mult_threshold: 1.75
    distance_from_mean_threshold: 1.1
    post_shock_active_bars: 4
    use_log_returns: true
- step: rsi
  params:
    price_col: close
    windows:
    - 4
    - 28
    method: wilder
- step: lags
  params:
    cols:
    - close_logret
    lags:
    - 1
    - 2
model:
  kind: xgboost_clf
  pred_prob_col: pred_prob
  preprocessing:
    scaler: none
  feature_cols:
  - shock_ret_z_2h
  - shock_ret_z_8h
  - shock_atr_multiple_2h
  - shock_atr_multiple_8h
  - shock_distance_ema
  - shock_strength
  - regime_vol_ratio_48_336
  - regime_absret_z_48_336
  - bb_percent_b_48_2.0
  - close_rsi_4
  - close_rsi_28
  - lag_close_logret_1
  - lag_close_logret_2
  target:
    kind: triple_barrier
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    returns_col: close_logret
    entry_price_mode: next_open
    max_holding: 48
    upper_mult: 1.5
    lower_mult: 1.5
    vol_window: 48
    neutral_label: drop
    side_col: shock_side_contrarian
    candidate_col: shock_down_candidate
    candidate_out_col: meta_candidate
  split:
    method: walk_forward
    train_size: 17520
    test_size: 672
    step_size: 672
    expanding: true
    max_folds: null
  params:
    n_estimators: 350
    learning_rate: 0.03
    max_depth: 4
    min_child_weight: 5.0
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    objective: binary:logistic
    eval_metric: logloss
    tree_method: hist
    random_state: 7
    n_jobs: 1
signals:
  kind: probability_threshold
  params:
    prob_col: pred_prob
    signal_col: signal_prob_threshold
    base_signal_col: shock_side_contrarian_active
    upper: 0.555
    upper_exit: 0.49
    lower: 0.43
    lower_exit: 0.48
    mode: long_only
target: {}
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.00015
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: true
    max_drawdown: 0.12
    rearm_drawdown: 0.08
    cooloff_bars: 96
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  engine: vectorized
  returns_col: close_logret
  signal_col: signal_prob_threshold
  periods_per_year: 17520
  returns_type: log
  missing_return_policy: raise_if_exposed
  min_holding_bars: 2
  subset: test
  vol_col: null
portfolio:
  enabled: false
  construction: signal_weights
  gross_target: 1.0
  long_short: false
  expected_return_col: null
  covariance_window: 120
  covariance_rebalance_step: 2
  risk_aversion: 5.0
  trade_aversion: 0.0
  constraints: {}
  asset_groups: {}
evaluation:
  probability_thresholds: []
  primary_metric: sharpe
  secondary_metrics:
  - cumulative_return
  - max_drawdown
  - profit_factor
  - cost_to_gross_pnl
monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10
diagnostics:
  enabled: true
  robustness:
    enabled: true
    cost_multipliers:
    - 2.0
    - 3.0
    entry_delay_bars:
    - 1
    - 2
    walk_forward_frequency: YE
execution:
  enabled: false
  mode: paper
  capital: 1000000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}
logging:
  enabled: true
  run_name: btcusd_30m_shock_meta_xgboost_long_only_v1
  output_dir: logs/experiments
  stage_tails:
    enabled: true
    stdout: true
    report: true
    limit: 10
    max_columns: 30
    max_assets: 1
