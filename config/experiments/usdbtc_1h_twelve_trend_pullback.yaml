extends: base/hourly.yaml

data:
  source: twelve_data
  symbol: "BTC/USD"
  interval: "1h"
  start: "2024-01-01"
  end: null
  api_key_env: "TWELVEDATA_API_KEY"
  storage:
    mode: live_or_cached
    dataset_id: "usdbtc_1h_twelve_trend_pullback"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72]
      ewma_spans: [24, 72]
      annualization_factor: 8760.0
  - step: trend
    params:
      price_col: close
      sma_windows: [24, 72, 120]
      ema_spans: [6, 24, 72]
  - step: trend_regime
    params:
      price_col: close
      base_sma_for_sign: 72
      short_sma: 24
      long_sma: 72
  - step: indicators
    params:
      price_col: close
      high_col: high
      low_col: low
      volume_col: volume
      bb_window: 24
      roc_windows: [2, 6, 24]
      atr_window: 24
      adx_window: 24
      vol_z_window: 72
      include_mfi: false
  - step: oscillators
    params:
      price_col: close
      high_col: high
      low_col: low
      rsi_windows: [2, 6, 14]
      stoch_windows: [14]
      stoch_smooth: 3
  - step: momentum
    params:
      price_col: close
      returns_col: close_logret
      vol_col: vol_rolling_24
      windows: [6, 24, 72]
  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6]

model:
  kind: logistic_regression_clf
  feature_cols:
    - lag_close_logret_1
    - lag_close_logret_2
    - lag_close_logret_6
    - close_over_ema_6
    - close_over_ema_24
    - close_over_sma_72
    - close_trend_state_sma_24_72
    - adx_24
    - atr_over_price_24
    - roc_2
    - roc_6
    - ppo_12_26
    - ppo_hist_12_26_9
    - close_rsi_2
    - close_rsi_6
    - close_stoch_k_14
    - close_logret_mom_6
    - close_logret_norm_mom_24
  params:
    max_iter: 1000
    C: 0.35
  target:
    kind: forward_return
    price_col: close
    horizon: 3
  split:
    method: walk_forward
    train_size: 1440
    test_size: 168
    step_size: 168
    expanding: false

signals:
  kind: probability_threshold
  params:
    prob_col: pred_prob
    upper: 0.58
    lower: 0.42
    signal_name: signal_prob

risk:
  target_vol: null
  max_leverage: 1.0
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.0

backtest:
  returns_col: close_logret
  signal_col: signal_prob
  periods_per_year: 8760
  returns_type: log

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false

logging:
  run_name: usdbtc_1h_twelve_trend_pullback_v1
