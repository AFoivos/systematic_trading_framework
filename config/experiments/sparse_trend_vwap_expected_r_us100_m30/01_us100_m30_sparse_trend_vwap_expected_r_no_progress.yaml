strategy:
  name: Sparse Causal Trend-VWAP Pullback with Expected-R
  version: sparse_v2
  stage: Exit stale trades after 6 bars if MFE < 0.30R
  symbol: US100
  timeframe: M30
  direction: long_only
data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: US100
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: us100_m30_sparse_trend_vwap_expected_r_no_progress
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/us100_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed/sparse_trend_vwap_expected_r_us100_m30
features:
- step: trend_vwap_pullback_candidate
  params:
    stage: 8
    timezone: America/New_York
    session_open: 09:30
    session_close: '16:00'
    timestamp_convention: bar_start
  enabled: true
model:
  kind: lightgbm_regressor
  params:
    n_estimators: 350
    learning_rate: 0.03
    num_leaves: 7
    max_depth: 3
    min_child_samples: 180
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.5
    reg_lambda: 3.0
    random_state: 7
    n_jobs: 1
    verbosity: -1
  preprocessing:
    scaler: none
  calibration: {}
  feature_cols:
  - atr_over_price_20
  - atr_percent_rank_252
  - volatility_ratio_24_96
  - d_vwap_atr
  - d_vwap_atr_robust_z96
  - d_vwap_atr_percent_rank_252
  - session_vwap_slope_5_atr
  - d_rolling_vwap40_atr
  - pullback_depth_atr
  - bars_since_d_vwap_expansion_080
  - ema50_ema100_spread_atr
  - ema50_slope_5_atr
  - rolling_log_price_slope_96
  - rolling_log_price_r2_96
  - mama_fama_spread_atr
  - roofing_filter_slope_atr
  - return_1_atr
  - return_4_atr
  - return_8_atr
  - return_4_vol96
  - return_8_vol96
  - ppo_hist_diff_1
  - stoch_rsi_bullish_cross
  - mfi_14_centered
  - relative_volume_96
  - range_position_96
  - bar_range_atr
  - close_location_value
  - minutes_since_ny_cash_open
  - shock_active
  - resistance_distance_atr
  target:
    kind: triple_barrier
    label_mode: meta
    candidate_col: trend_vwap_base_candidate
    side_col: trend_vwap_candidate_side
    candidate_mode: all_nonzero
    entry_price_mode: next_open
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    volatility_col: atr_over_price_20
    lower_mult: 1.5
    upper_mult: 3.0
    max_holding: 16
    add_r_multiple: true
    target_col: tb_oriented_r
    oriented_r_col: tb_oriented_r
    r_col: tb_event_r
    r_clip:
    - -1.25
    - 2.25
    tie_break: lower
    neutral_label: lower
    label_col: tb_label
    event_ret_col: tb_event_ret
    candidate_out_col: tb_candidate
  split:
    method: purged
    train_size: 35040
    test_size: 4380
    step_size: 4380
    expanding: true
    max_folds: 17
    purge_bars: 24
    embargo_bars: 24
  runtime: {}
  env: {}
  use_features: true
  pred_ret_col: pred_tb_oriented_r
  pred_prob_col: pred_tb_positive_prob
  pred_is_oos_col: pred_is_oos
  returns_input_col: null
  signal_col: null
  action_col: null
signals:
  kind: forecast_threshold_candidate
  params:
    forecast_col: pred_tb_oriented_r
    pred_is_oos_col: pred_is_oos
    signal_col: signal_trend_vwap_expected_r
    upper: 0.25
    lower: -999.0
    inclusive: true
    mode: long_only
    activation_filters:
    - col: trend_vwap_base_candidate
      op: ge
      value: 1.0
    - col: pred_is_oos
      op: ge
      value: 1.0
    candidate_col: accepted_trend_vwap_candidate
    side_col: accepted_trend_vwap_side
    strength_col: accepted_predicted_r
    threshold_distance_col: accepted_predicted_r_margin
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard:
    enabled: true
    timezone: America/New_York
    daily_soft_stop: 0.012
    daily_soft_stop_risk_multiplier: 0.5
    daily_hard_stop: 0.015
    weekly_drawdown: 0.03
    weekly_anchor: W-FRI
  drawdown_sizing: {}
  vol_col: null
  max_correlated_us_index_risk: 0.0045
backtest:
  engine: manual_barrier
  signal_col: signal_trend_vwap_expected_r
  returns_col: return_1
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: false
  stop_mode: volatility_stop
  vol_col: atr_over_price_20
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 3.0
  stop_loss_r: 1.5
  risk_per_trade: 0.003
  max_holding_bars: 16
  dynamic_exits:
    enabled: true
    no_progress:
      enabled: true
      bars: 6
      min_favorable_r: 0.3
      exit_price: close
  partial_exits:
    enabled: false
  max_entry_gap_atr: 0.35
  entry_gap_atr_col: atr_20
  stop_cooldown_bars: 8
portfolio:
  enabled: false
  construction: signal_weights
  long_short: false
  gross_target: 1.0
monitoring:
  enabled: false
  psi_threshold: 0.2
  n_bins: 10
diagnostics:
  enabled: true
  model:
    enabled: false
  trade_path:
    enabled: false
  robustness:
    enabled: true
    cost_multipliers:
    - 1.0
    - 2.0
    - 3.0
    - 5.0
    entry_delay_bars:
    - 1
    - 2
    walk_forward_frequency: YE
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
logging:
  enabled: true
  run_name: us100_m30_sparse_trend_vwap_expected_r_no_progress
  output_dir: logs/experiments/sparse_trend_vwap_expected_r_us100_m30
  save_model: false
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
validation:
  method: purged_walk_forward
  purge_bars: 24
  embargo_bars: 24
evaluation:
  strict_oos_only: true
research_metadata:
  family: sparse_trend_vwap_expected_r_us100_m30
  base_config: config/experiments/foundation_alpha/trend_vwap_expected_r_us100_m30/10_us100_m30_trend_vwap_expected_r_yaml10_FINAL.yaml
  feature_count: 31
  forecast_threshold_r: 0.25
  hypothesis: Exit stale trades after 6 bars if MFE < 0.30R
  random_search_used: false
