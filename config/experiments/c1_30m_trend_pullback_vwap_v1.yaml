strategy:
  name: C1_v1_baseline
  timeframe: 30m
  assets:
    - SPX500
  description: 30m trend-pullback VWAP/RMS system with directional triple-barrier diagnostics.

data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: SPX500
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: c1_30m_trend_pullback_vwap_v1
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/spx500_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed

features:
  - step: returns
    params:
      log: false
      col_name: close_ret
  - step: lags
    params:
      cols: [close_ret]
      lags: [1, 2, 4, 8, 16]
      prefix: lag
  - step: trend
    params:
      price_col: close
      sma_windows: []
      ema_spans: [20, 50, 100]
      ema_col_template: "ema_{span}"
  - step: trend_regime
    params:
      price_col: close
      fast_span: 50
      slow_span: 100
      neutral_threshold: 0.0002
      output_col: trend_regime
      method: ema
  - step: rolling_r2_trend_quality
    params:
      price_col: close
      window: 96
      output_col: rolling_r2_trend_quality_96
      slope_col: rolling_r2_slope_96
      intercept_col: rolling_r2_intercept_96
      rising_col: rolling_r2_trend_quality_96_rising
      trend_quality_col: rolling_r2_trend_quality_96_ok
      trend_quality_threshold: 0.35
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 14
      windows: [14]
      method: wilder
      add_over_price: true
      atr_col: atr_14
      over_price_col: atr_over_price_14
  - step: volatility_regime
    params:
      vol_col: atr_over_price_14
      vol_window: 20
      regime_window: 96
      method: percentile
      lower_quantile: 0.33
      upper_quantile: 0.67
      output_col: volatility_regime
  - step: vwap
    params:
      high_col: high
      low_col: low
      close_col: close
      volume_col: volume
      window: 20
      windows: [20]
      add_distance: true
      vwap_col: vwap_20
      distance_col: close_over_vwap_20
  - step: ppo
    params:
      price_col: close
      fast: 12
      slow: 26
      signal: 9
      ppo_col: ppo
      ppo_signal_col: ppo_signal
      ppo_hist_col: ppo_hist_raw
  - step: mfi
    params:
      high_col: high
      low_col: low
      close_col: close
      volume_col: volume
      window: 14
  - step: stochastic_rsi
    params:
      price_col: close
      rsi_period: 14
      stoch_period: 14
      k_period: 3
      d_period: 3
      oversold: 0.20
      overbought: 0.80
      prefix: stoch_rsi
      method: wilder
  - step: zscore_momentum
    params:
      price_col: close
      window: 20
      output_col: zscore_momentum_20
  - step: feature_transforms
    params:
      transforms:
        - kind: tsfresh_rolling
          source_col: ema_50
          output_prefix: ema_50
          calculators: [root_mean_square]
          window: 48
          shift: 0
        - kind: tsfresh_rolling
          source_col: ema_100
          output_prefix: ema_100
          calculators: [root_mean_square]
          window: 48
          shift: 0
        - kind: tsfresh_rolling
          source_col: vwap_20
          output_prefix: vwap_20
          calculators: [root_mean_square]
          window: 48
          shift: 0
  - step: vwap_rms_ema_cross_long
    params:
      mode: long_short
      ema_mid_col: ema_50
      ema_slow_col: ema_100
      ema_mid_rms_col: ema_50__root_mean_square
      vwap_rms_col: vwap_20__root_mean_square
      ppo_col: ppo
      ppo_signal_col: ppo_signal
      ppo_hist_min: 0.0
      regime_col: ema_50_above_ema_100
      short_regime_col: ema_50_below_ema_100
      cross_up_col: vwap_rms_cross_above_ema_50_rms
      cross_down_col: vwap_rms_cross_below_ema_50_rms
      ppo_hist_col: ppo_hist
      ppo_hist_positive_col: ppo_hist_positive
      ppo_hist_negative_col: ppo_hist_negative
      ppo_above_signal_col: ppo_above_signal
      ppo_below_signal_col: ppo_below_signal
      long_setup_col: vwap_rms_ema_cross_long_setup
      short_setup_col: vwap_rms_ema_cross_short_setup
      signal_col: vwap_rms_signal_side
      candidate_col: vwap_rms_signal_candidate

model:
  kind: none

signals:
  kind: c1_trend_pullback_vwap
  params:
    mode: long_short
    trend_regime_col: trend_regime
    long_trigger_col: vwap_rms_ema_cross_long_setup
    short_trigger_col: vwap_rms_ema_cross_short_setup
    ppo_hist_col: ppo_hist
    ppo_above_signal_col: ppo_above_signal
    ppo_below_signal_col: ppo_below_signal
    mfi_col: mfi_14
    stoch_k_col: stoch_rsi_k
    stoch_d_col: stoch_rsi_d
    zscore_momentum_col: zscore_momentum_20
    volatility_regime_col: volatility_regime
    trend_quality_col: rolling_r2_trend_quality_96
    max_volatility_regime: 1.0
    mfi_long_min: 40.0
    mfi_long_max: 80.0
    mfi_short_min: 20.0
    mfi_short_max: 60.0
    strict_trend_quality_min: 0.35
    use_strict_signal: false
    long_candidate_col: c1_long_candidate
    short_candidate_col: c1_short_candidate
    long_candidate_strict_col: c1_long_candidate_strict
    short_candidate_strict_col: c1_short_candidate_strict
    signal_col: signal_side
    candidate_col: signal_candidate

target:
  kind: directional_triple_barrier
  outputs:
    label_col: label
    event_ret_col: dtb_event_ret
    fwd_col: dtb_event_ret
    candidate_out_col: label_candidate
    r_col: dtb_event_r
    oriented_r_col: dtb_oriented_r
  price_col: close
  open_col: open
  high_col: high
  low_col: low
  direction_col: signal_side
  candidate_col: signal_candidate
  entry_price_mode: next_open
  profit_barrier_r: 3.0
  stop_barrier_r: 1.5
  vertical_barrier_bars: 16
  volatility_col: atr_14
  neutral_label: drop
  tie_break: closest_to_open
  add_r_multiple: true
  r_clip: [-3, 3]
  diagnostic_feature_cols:
    - trend_regime
    - rolling_r2_trend_quality_96
    - rolling_r2_slope_96
    - atr_14
    - atr_over_price_14
    - volatility_regime
    - vwap_20
    - vwap_20__root_mean_square
    - vwap_rms_cross_above_ema_50_rms
    - vwap_rms_cross_below_ema_50_rms
    - vwap_rms_ema_cross_long_setup
    - vwap_rms_ema_cross_short_setup
    - ppo
    - ppo_signal
    - ppo_hist
    - ppo_above_signal
    - ppo_below_signal
    - mfi_14
    - stoch_rsi_k
    - stoch_rsi_d
    - zscore_momentum_20
    - c1_long_candidate
    - c1_short_candidate
    - c1_long_candidate_strict
    - c1_short_candidate_strict
    - signal_side
    - signal_candidate

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null

backtest:
  engine: manual_barrier
  signal_col: signal_side
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: true
  stop_mode: volatility_stop
  vol_col: atr_14
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 3.0
  stop_loss_r: 1.5
  risk_per_trade: 0.006
  max_holding_bars: 16
  dynamic_exits: {}

portfolio:
  enabled: false
  construction: signal_weights
  long_short: true

monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10

diagnostics:
  enabled: true
  robustness:
    enabled: true
    cost_multipliers: [2.0, 3.0]
    entry_delay_bars: [1, 2]
    walk_forward_frequency: YE

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close

logging:
  enabled: true
  run_name: c1_30m_trend_pullback_vwap_v1
  output_dir: logs/experiments
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
