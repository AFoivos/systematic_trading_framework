schema_version: 1

experiment:
  name: adaptive_inventory_microprice
  description: "Two-sided Kraken BTC perpetual quoting around microprice with volatility and inventory adaptation."
  research_only: true

execution:
  mode: research_smoke
  venue: kraken_derivatives
  allow_order_submission: false
  quote_order_type: post_only
  hedge_order_type: none
  stale_order_book_ms: 3000

instruments:
  quote_symbol: PF_XBTUSD
  quote_market: derivatives_perpetual

quote:
  fair_price_model: microprice
  quote_placement_mode: fair_price_bps
  spread_model: volatility_adjusted
  base_spread_bps: 8.0
  min_spread_bps: 6.0
  max_spread_bps: 30.0
  volatility_multiplier: 1.0
  inventory_skew_strength: 1.5
  order_size: 0.001
  max_inventory: 0.01
  tick_size: 0.5
  lot_size: 0.0001
  min_order_size: 0.0001
  min_notional: 5.0

fees:
  maker_fee_bps: 2.0
  taker_fee_bps: 5.0
  assumption: "Kraken Derivatives entry tier; replace with the account's actual rolling-volume tier before replay or deployment."
  verified_at: "2026-07-17"
  source_url: "https://support.kraken.com/articles/360048917612-fee-schedule"

risk:
  max_inventory: 0.01
  max_position_value: 600.0
  max_daily_loss: 50.0
  max_open_orders: 2
  max_order_size: 0.001
  max_allowed_spread_bps: 25.0
  kill_on_websocket_disconnect: true
  kill_on_stale_order_book: true
  kill_on_spread_widening: true

strategy:
  type: adaptive_inventory_microprice
  parameters:
    min_expected_edge_bps: 0.5
    adverse_selection_buffer_bps: 0.75
    inventory_penalty_bps_per_unit: 0.5

scenario:
  timestamp: "2026-07-17T12:00:00+00:00"
  inventory: 0.0
  realized_pnl: 0.0
  unrealized_pnl: 0.0
  open_orders: 0
  websocket_connected: true
  recent_returns:
    - 0.0
    - 0.00005
    - -0.00002
  books:
    quote:
      symbol: PF_XBTUSD
      bids:
        - [50000.0, 6.0]
        - [49999.5, 4.0]
      asks:
        - [50001.0, 4.0]
        - [50001.5, 5.0]
