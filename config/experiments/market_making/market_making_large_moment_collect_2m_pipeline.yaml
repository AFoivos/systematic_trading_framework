pipeline:
  output_dir: logs/experiments/market_making/pipeline_runs/large_moment_collect_2m
  write_manifest: true
  collect_orderbook:
    enabled: true
    output_path: logs/experiments/market_making/orderbook_events_btcusd_large_2m.csv
    max_events: 2000000
  paper_replay:
    enabled: true
    use_outputs_for_moment: true
  moment_experiment:
    enabled: true

data:
  orderbook_events_path: logs/experiments/market_making/orderbook_events_btcusd_large_2m.csv
  quote_events_paths: []
  trades_path: ""
  moment_dataset:
    path: logs/experiments/market_making/datasets/moment_large_collect_2m_dataset.parquet
    reuse_existing: false
    rebuild: true
    horizons: [1, 5, 10, 30]

execution:
  mode: data_only
  venue: kraken_spot_public
  symbol: BTC/USD
  depth: 100
  reconnect: true
  max_events: 2000000
  quote_interval_ms: 500
  cancel_replace_interval_ms: 1000
  stale_order_book_ms: 3000
  allow_demo_orders: false

market_making:
  fair_price_model: microprice
  quote_placement_mode: join_top_of_book
  spread_model: volatility_adjusted
  base_spread_bps: 1
  min_spread_bps: 0.1
  max_spread_bps: 5
  volatility_window_seconds: 60
  inventory_skew_strength: 0.5
  order_size: 0.001
  max_inventory: 0.01
  tick_size: 0.5
  lot_size: 0.0001
  min_order_size: 0.0001
  min_notional: 5
  feature_return_lookback: 5

fees:
  maker_fee_bps: 2
  taker_fee_bps: 5

risk:
  max_daily_loss: 50
  max_position_value: 500
  max_open_orders: 2
  max_order_size: 0.002
  kill_on_websocket_disconnect: true
  kill_on_stale_order_book: true
  kill_on_spread_widening: true
  max_allowed_spread_bps: 80

filters:
  use_adverse_selection_filter: true
  use_fee_aware_gate: true
  use_side_selection_gate: true
  use_directional_feature_gate: true
  max_imbalance: 0.8
  min_imbalance: 0.2
  disable_on_high_volatility: true
  disable_on_strong_trend: true
  min_expected_edge_bps: 0.25
  adverse_selection_buffer_bps: 0.45
  inventory_penalty_bps_per_unit: 0.25
  microprice_offset_threshold_bps: 0.08
  inventory_soft_limit_ratio: 0.2
  allowed_side_mode: buy_only_with_unwind
  feature_microprice_offset_threshold_bps: 0.08
  feature_imbalance_threshold: 0.35
  feature_trend_threshold_bps: 0.05
  feature_max_volatility_bps: 0.15
  feature_edge_credit_bps: 2.25

moment:
  enabled: true
  backend: moment
  checkpoint: AutonLab/MOMENT-1-large
  frozen_encoder: true
  fine_tune: false
  lookback_length: 512
  target_horizon: h5
  batch_size: 8
  device: cpu
  ridge_alpha: 1.0
  max_fit_rows: 50000
  local_files_only: false

moment_filter:
  expected_spread_capture_bps: 0.0
  safety_buffer_bps: 0.5
  max_uncertainty: 1.0
  min_expected_edge_bps: 0.0

split:
  train_fraction: 0.6
  validation_fraction: 0.2

moment_output:
  root: logs/experiments/market_making
  run_name: market_making_large_moment_collect_2m
  write_report: true

logging:
  level: INFO
  save_events: true
  output_dir: logs/experiments/market_making

diagnostics:
  enabled: true
  make_plots: true
  make_report: true
  language: el
  markout_horizons: [1, 5, 10, 30]

runtime:
  random_seed: 42
  deterministic: true
