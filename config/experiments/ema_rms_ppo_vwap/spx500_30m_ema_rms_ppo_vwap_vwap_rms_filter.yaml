data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: SPX500
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: spx500_30m_ema_rms_ppo_vwap_vwap_rms_filter
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/spx500_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed

features:
  - step: returns
    params:
      log: false
      col_name: close_ret
  - step: trend
    outputs:
      close_ema_20: ema_20
      close_ema_50: ema_50
      close_ema_100: ema_100
    params:
      price_col: close
      sma_windows: []
      ema_spans: [20, 50, 100]
  - step: vwap
    params:
      high_col: high
      low_col: low
      close_col: close
      volume_col: volume
      windows: [20]
      add_distance: true
  - step: ppo
    outputs:
      ppo_12_26: ppo
      ppo_signal_9: ppo_signal
      ppo_hist_12_26_9: ppo_hist_raw
    params:
      price_col: close
      fast: 12
      slow: 26
      signal: 9
  - step: atr
    params:
      high_col: high
      low_col: low
      close_col: close
      window: 14
      windows: [14]
      method: wilder
      add_over_price: true
  - step: feature_transforms
    params:
      transforms:
        - kind: tsfresh_rolling
          source_col: ema_20
          calculators: [root_mean_square]
          window: 48
        - kind: tsfresh_rolling
          source_col: ema_50
          calculators: [root_mean_square]
          window: 48
        - kind: tsfresh_rolling
          source_col: ema_100
          calculators: [root_mean_square]
          window: 48
        - kind: tsfresh_rolling
          source_col: vwap_20
          calculators: [root_mean_square]
          window: 48

model:
  kind: none

signals:
  kind: ema_rms_ppo_vwap
  params:
    close_col: close
    atr_col: atr_14
    ema_fast_rms_col: ema_20__root_mean_square
    ema_mid_rms_col: ema_50__root_mean_square
    ema_slow_rms_col: ema_100__root_mean_square
    vwap_col: vwap_20
    vwap_rms_col: vwap_20__root_mean_square
    ppo_col: ppo
    ppo_signal_col: ppo_signal
    mode: long_short
    require_vwap_rms_filter: true
    require_rms_slope_filter: false
    max_vwap_distance_atr: 1.0
    min_rms_slope: 0.0
    signal_col: signal_side
    candidate_col: signal_candidate

target:
  kind: triple_barrier
  outputs:
    label_col: label
    event_ret_col: tb_event_ret
    fwd_col: tb_event_ret
    candidate_out_col: label_candidate
    r_col: tb_event_r
    oriented_r_col: tb_oriented_r
  price_col: close
  open_col: open
  high_col: high
  low_col: low
  volatility_col: atr_over_price_14
  label_mode: meta
  side_col: signal_side
  candidate_col: signal_candidate
  candidate_mode: all_nonzero
  entry_price_mode: next_open
  max_holding: 16
  upper_mult: 1.8
  lower_mult: 1.0
  vol_window: 24
  min_vol: 0.0001
  neutral_label: lower
  tie_break: closest_to_open
  add_r_multiple: true
  r_clip: [-3, 3]
  diagnostic_feature_cols:
    - ema_20
    - ema_50
    - ema_100
    - ema_20__root_mean_square
    - ema_50__root_mean_square
    - ema_100__root_mean_square
    - ema_rms_fast_slope
    - ema_rms_bull_stack
    - ema_rms_bear_stack
    - vwap_20
    - vwap_20__root_mean_square
    - vwap_distance_atr
    - vwap_rms_long_bias
    - vwap_rms_short_bias
    - vwap_reclaim
    - vwap_reject
    - ppo
    - ppo_signal
    - ppo_hist
    - ema_rms_long_setup
    - ema_rms_short_setup
    - signal_side
    - signal_candidate

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.00010
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null

backtest:
  engine: manual_barrier
  signal_col: signal_side
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: true
  stop_mode: volatility_stop
  vol_col: atr_over_price_14
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 1.8
  stop_loss_r: 1.0
  risk_per_trade: 0.006
  max_holding_bars: 16
  dynamic_exits: {}

portfolio:
  enabled: false
  construction: signal_weights
  long_short: true

monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10

diagnostics:
  enabled: true

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close

logging:
  enabled: true
  run_name: spx500_30m_ema_rms_ppo_vwap_vwap_rms_filter
  output_dir: logs/experiments
  stage_tails:
    enabled: false
