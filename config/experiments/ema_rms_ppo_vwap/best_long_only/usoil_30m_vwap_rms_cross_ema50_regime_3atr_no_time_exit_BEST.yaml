data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: USOIL
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: usoil_30m_vwap_rms_cross_ema50_regime_3atr_no_time_exit
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/usoil_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed
features:
- step: returns
  params:
    log: false
    col_name: close_ret
  outputs: {}
  enabled: true
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans:
    - 20
    ema_col_template: ema_20
    add_ratios: false
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: ema_20
        output_col: close_over_ema_20
        subtract: 1.0
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans:
    - 32
    ema_col_template: ema_32
    add_ratios: false
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: ema_32
        output_col: close_over_ema_32
        subtract: 1.0
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans:
    - 96
    ema_col_template: ema_96
    add_ratios: false
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: ema_96
        output_col: close_over_ema_96
        subtract: 1.0
- step: vwap
  params:
    high_col: high
    low_col: low
    close_col: close
    volume_col: volume
    window: 16
    windows:
    - 16
    add_distance: false
    vwap_col: vwap_16
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: vwap_16
        output_col: close_over_vwap_16
        subtract: 1.0
- step: ppo
  params:
    price_col: close
    fast: 6
    slow: 42
    signal: 7
    ppo_col: ppo_6_42
    ppo_signal_col: ppo_signal_7
    ppo_hist_col: ppo_hist_6_42_7_raw
  outputs: {}
  enabled: true
- step: atr
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 7
    windows:
    - 7
    method: wilder
    add_over_price: false
    atr_col: atr_7
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: atr_7
        denominator_col: close
        output_col: atr_over_price_7
    rms:
      enabled: true
      items:
      - source_col: ema_32
        output_prefix: ema_32
        window: 36
        shift: 1
      - source_col: vwap_16
        output_prefix: vwap_16
        window: 24
        shift: 1
      - source_col: ema_96
        output_prefix: ema_96
        window: 72
        shift: 1
model:
  kind: none
signals:
  kind: vwap_rms_ema_cross_long
  params:
    ema_mid_col: ema_32
    ema_slow_col: ema_96
    ema_mid_rms_col: ema_32__root_mean_square
    vwap_rms_col: vwap_16__root_mean_square
    ppo_col: ppo_6_42
    ppo_signal_col: ppo_signal_7
    ppo_hist_min: 0.00125
    regime_col: ema_32_above_ema_96
    cross_up_col: vwap_16_rms_cross_above_ema_32_rms
    ppo_hist_col: ppo_hist_6_42_7
    ppo_hist_positive_col: ppo_hist_6_42_7_positive
    ppo_above_signal_col: ppo_6_42_above_ppo_signal_7
    long_setup_col: vwap_16_rms_ema_32_cross_long_setup
    signal_col: signal_side
    candidate_col: signal_candidate
  outputs: {}
target:
  kind: triple_barrier
  outputs:
    label_col: label
    event_ret_col: tb_event_ret
    fwd_col: tb_event_ret
    candidate_out_col: label_candidate
    r_col: tb_event_r
    oriented_r_col: tb_oriented_r
  price_col: close
  open_col: open
  high_col: high
  low_col: low
  volatility_col: atr_over_price_7
  label_mode: meta
  side_col: signal_side
  candidate_col: signal_candidate
  candidate_mode: all_nonzero
  entry_price_mode: next_open
  max_holding: 16
  upper_mult: 3.0
  lower_mult: 3.0
  vol_window: 24
  min_vol: 0.0001
  neutral_label: lower
  tie_break: closest_to_open
  add_r_multiple: true
  r_clip:
  - -3
  - 3
  diagnostic_feature_cols:
  - ema_20
  - ema_32
  - ema_96
  - ema_32__root_mean_square
  - vwap_16
  - vwap_16__root_mean_square
  - ema_32_above_ema_96
  - vwap_16_rms_cross_above_ema_32_rms
  - ppo_6_42
  - ppo_signal_7
  - ppo_hist_6_42_7
  - ppo_hist_6_42_7_positive
  - ppo_6_42_above_ppo_signal_7
  - vwap_16_rms_ema_32_cross_long_setup
  - signal_side
  - signal_candidate
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  engine: manual_barrier
  signal_col: signal_side
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: false
  stop_mode: volatility_stop
  vol_col: atr_over_price_7
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 3.75
  stop_loss_r: 1.5
  risk_per_trade: 0.0025
  max_holding_bars: null
  dynamic_exits: {}
portfolio:
  enabled: false
  construction: signal_weights
  long_short: false
monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10
diagnostics:
  enabled: true
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
logging:
  enabled: true
  run_name: usoil_30m_vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST
  output_dir: logs/bot
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
