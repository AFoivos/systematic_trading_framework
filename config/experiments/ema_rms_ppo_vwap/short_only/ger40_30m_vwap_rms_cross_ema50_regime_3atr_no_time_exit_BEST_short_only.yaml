data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: GER40
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: ger40_30m_vwap_rms_cross_ema50_regime_3atr_no_time_exit_short_only
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/ger40_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed
features:
- step: returns
  params:
    log: false
    col_name: close_ret
  outputs: {}
  enabled: true
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans:
    - 20
    ema_col_template: ema_20
    add_ratios: false
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: ema_20
        output_col: close_over_ema_20
        subtract: 1.0
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans:
    - 60
    ema_col_template: ema_60
    add_ratios: false
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: ema_60
        output_col: close_over_ema_60
        subtract: 1.0
- step: trend
  params:
    price_col: close
    sma_windows: []
    ema_spans:
    - 200
    ema_col_template: ema_200
    add_ratios: false
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: ema_200
        output_col: close_over_ema_200
        subtract: 1.0
- step: vwap
  params:
    high_col: high
    low_col: low
    close_col: close
    volume_col: volume
    window: 32
    windows:
    - 32
    add_distance: false
    vwap_col: vwap_32
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: close
        denominator_col: vwap_32
        output_col: close_over_vwap_32
        subtract: 1.0
- step: ppo
  params:
    price_col: close
    fast: 10
    slow: 30
    signal: 12
    ppo_col: ppo_10_30
    ppo_signal_col: ppo_signal_12
    ppo_hist_col: ppo_hist_10_30_12_raw
  outputs: {}
  enabled: true
- step: atr
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 10
    windows:
    - 10
    method: simple
    add_over_price: false
    atr_col: atr_10
  outputs: {}
  enabled: true
  transforms:
    ratio:
      enabled: true
      items:
      - numerator_col: atr_10
        denominator_col: close
        output_col: atr_over_price_10
    rms:
      enabled: true
      items:
      - source_col: ema_60
        output_prefix: ema_60
        window: 192
        shift: 1
      - source_col: vwap_32
        output_prefix: vwap_32
        window: 12
        shift: 1
      - source_col: ema_200
        output_prefix: ema_200
        window: 18
        shift: 1
model:
  kind: none
signals:
  kind: vwap_rms_ema_cross_long
  params:
    ema_mid_col: ema_60
    ema_slow_col: ema_200
    ema_mid_rms_col: ema_60__root_mean_square
    vwap_rms_col: vwap_32__root_mean_square
    ppo_col: ppo_10_30
    ppo_signal_col: ppo_signal_12
    ppo_hist_min: 0.00025
    regime_col: ema_60_above_ema_200
    cross_up_col: vwap_32_rms_cross_above_ema_60_rms
    ppo_hist_col: ppo_hist_10_30_12
    ppo_hist_positive_col: ppo_hist_10_30_12_positive
    ppo_above_signal_col: ppo_10_30_above_ppo_signal_12
    long_setup_col: vwap_32_rms_ema_60_cross_long_setup
    signal_col: signal_side
    candidate_col: signal_candidate
    mode: short_only
    short_regime_col: ema_60_below_ema_200
    cross_down_col: vwap_32_rms_cross_below_ema_60_rms
    ppo_hist_negative_col: ppo_hist_10_30_12_negative
    ppo_below_signal_col: ppo_10_30_below_ppo_signal_12
    short_setup_col: vwap_32_rms_ema_60_cross_short_setup
  outputs: {}
target:
  kind: triple_barrier
  outputs:
    label_col: label
    event_ret_col: tb_event_ret
    fwd_col: tb_event_ret
    candidate_out_col: label_candidate
    r_col: tb_event_r
    oriented_r_col: tb_oriented_r
  price_col: close
  open_col: open
  high_col: high
  low_col: low
  volatility_col: atr_over_price_10
  label_mode: meta
  side_col: signal_side
  candidate_col: signal_candidate
  candidate_mode: all_nonzero
  entry_price_mode: next_open
  max_holding: 16
  upper_mult: 3.0
  lower_mult: 3.0
  vol_window: 24
  min_vol: 0.0001
  neutral_label: lower
  tie_break: closest_to_open
  add_r_multiple: true
  r_clip:
  - -3
  - 3
  diagnostic_feature_cols:
  - ema_20
  - ema_60
  - ema_200
  - ema_60__root_mean_square
  - vwap_32
  - vwap_32__root_mean_square
  - ema_60_below_ema_200
  - vwap_32_rms_cross_below_ema_60_rms
  - ppo_10_30
  - ppo_signal_12
  - ppo_hist_10_30_12
  - ppo_hist_10_30_12_negative
  - ppo_10_30_below_ppo_signal_12
  - vwap_32_rms_ema_60_cross_short_setup
  - signal_side
  - signal_candidate
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null
backtest:
  engine: manual_barrier
  signal_col: signal_side
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: true
  stop_mode: volatility_stop
  vol_col: atr_over_price_10
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 4.5
  stop_loss_r: 2.75
  risk_per_trade: 0.006
  max_holding_bars: null
  dynamic_exits: {}
portfolio:
  enabled: false
  construction: signal_weights
  long_short: false
monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10
diagnostics:
  enabled: true
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
logging:
  enabled: true
  run_name: ger40_30m_vwap_rms_cross_ema50_regime_3atr_no_time_exit_BEST_short_only
  output_dir: logs/bot
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
