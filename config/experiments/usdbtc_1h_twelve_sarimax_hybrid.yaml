extends: base/hourly.yaml

data:
  source: twelve_data
  symbol: "BTC/USD"
  interval: "1h"
  start: "2024-01-01"
  end: null
  api_key_env: "TWELVEDATA_API_KEY"
  storage:
    mode: live_or_cached
    dataset_id: "usdbtc_1h_twelve_sarimax_hybrid"
    save_raw: true
    save_processed: true

features:
  - step: returns
    params:
      log: true
      col_name: close_logret
  - step: volatility
    params:
      returns_col: close_logret
      rolling_windows: [24, 72]
      ewma_spans: [24]
      annualization_factor: 8760.0
  - step: trend
    params:
      price_col: close
      sma_windows: [24, 72]
      ema_spans: [24, 72]
  - step: indicators
    params:
      price_col: close
      high_col: high
      low_col: low
      volume_col: volume
      bb_window: 24
      roc_windows: [6, 24]
      atr_window: 24
      adx_window: 24
      vol_z_window: 72
      include_mfi: false
  - step: lags
    params:
      cols: [close_logret]
      lags: [1, 2, 6]

model:
  kind: sarimax_forecaster
  feature_cols:
    - lag_close_logret_1
    - lag_close_logret_2
    - lag_close_logret_6
    - vol_rolling_24
    - vol_ewma_24
    - close_over_ema_24
    - close_over_sma_72
    - bb_percent_b_24_2.0
    - roc_6
    - roc_24
    - atr_over_price_24
    - adx_24
  target:
    kind: forward_return
    price_col: close
    horizon: 3
  split:
    method: walk_forward
    train_size: 2160
    test_size: 168
    step_size: 168
    expanding: false
  params:
    order: [1, 0, 1]
    seasonal_order: [1, 0, 0, 24]
    trend: "c"
    use_exog: true
    enforce_stationarity: false
    enforce_invertibility: false
    maxiter: 200
    allow_fallback: true

signals:
  kind: forecast_vol_adjusted
  params:
    forecast_col: pred_ret
    vol_col: pred_vol
    signal_name: signal_forecast_vol_adj
    clip: 1.0
    vol_floor: 1.0e-6

risk:
  target_vol: null
  max_leverage: 1.0
  cost_per_turnover: 0.0005
  slippage_per_turnover: 0.0

backtest:
  returns_col: close_logret
  signal_col: signal_forecast_vol_adj
  periods_per_year: 8760
  returns_type: log

monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10

execution:
  enabled: false

logging:
  run_name: usdbtc_1h_twelve_sarimax_hybrid_v1
