strategy:
  name: spx500_30m_ehlers_semiscalp_long_v1
  timeframe: 30m
  assets:
  - SPX500
  description: Standalone long-only Ehlers semi-scalp strategy using SuperSmoother, Roofing Filter, Hilbert energy, dominant cycle, and ATR volatility.

data:
  source: dukascopy_csv
  interval: 30m
  start: null
  end: null
  alignment: inner
  symbol: SPX500
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: spx500_30m_ehlers_semiscalp_long_v1
    save_raw: false
    save_processed: true
    load_path: data/raw/dukascopy_30m_clean/spx500_30m.csv
    raw_dir: data/raw
    processed_dir: data/processed

features:
- step: returns
  params:
    log: false
    col_name: close_ret
- step: atr
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 14
    windows:
    - 14
    method: wilder
    add_over_price: true
    atr_col: atr_14
    over_price_col: atr_over_price_14
- step: supersmoother
  params:
    price_col: close
    period: 10
    output_col: ehlers_supersmoother_10
- step: roofing_filter
  params:
    price_col: close
    high_pass_period: 48
    low_pass_period: 10
    slope_bars: 1
    output_col: ehlers_roofing_48_10
    slope_col: ehlers_roofing_48_10_slope
    cross_up_zero_col: ehlers_roofing_48_10_cross_up
    cross_down_zero_col: ehlers_roofing_48_10_cross_down
    add_derived: true
- step: hilbert_transform
  params:
    price_col: close
    window: 64
    amplitude_col: ehlers_hilbert_amplitude_64
    phase_col: ehlers_hilbert_phase_64
    instantaneous_frequency_col: ehlers_hilbert_inst_freq_64
    add_derived: false
- step: homodyne_discriminator
  params:
    price_col: close
    use_smoothed_period: false
    output_col: homodyne_discriminator
- step: dominant_cycle_period
  params:
    price_col: close
    output_col: dominant_cycle_period
- step: feature_transforms
  params:
    transforms:
    - kind: rolling_stat
      source_col: ehlers_supersmoother_10
      mode: slope
      window: 2
      shift: 0
      output_col: ehlers_supersmoother_10_slope
    - kind: ratio
      numerator_col: close
      denominator_col: ehlers_supersmoother_10
      output_col: close_over_ehlers_supersmoother_10
    - kind: rolling_stat
      source_col: ehlers_hilbert_phase_64
      mode: slope
      window: 2
      shift: 0
      output_col: ehlers_hilbert_phase_delta_64

model:
  kind: none

signals:
  kind: ehlers_semiscalp_long
  params:
    entry_mode: transition
    price_col: close
    supersmoother_col: ehlers_supersmoother_10
    supersmoother_slope_col: ehlers_supersmoother_10_slope
    roofing_col: ehlers_roofing_48_10
    roofing_slope_col: ehlers_roofing_48_10_slope
    roofing_cross_up_col: ehlers_roofing_48_10_cross_up
    roofing_cross_down_col: ehlers_roofing_48_10_cross_down
    hilbert_amplitude_col: ehlers_hilbert_amplitude_64
    dominant_cycle_period_col: dominant_cycle_period
    atr_col: atr_over_price_14
    min_cycle_period: 10
    max_cycle_period: 48
    amplitude_quantile_lookback: 252
    amplitude_min_quantile: 0.30
    atr_quantile_lookback: 252
    atr_min_quantile: 0.30
    trend_ok_col: ehlers_trend_ok
    timing_ok_col: ehlers_timing_ok
    cycle_ok_col: ehlers_cycle_ok
    energy_ok_col: ehlers_energy_ok
    volatility_ok_col: ehlers_volatility_ok
    long_setup_col: ehlers_semiscalp_long_setup
    entry_col: ehlers_semiscalp_long_entry
    signal_col: signal_side
    candidate_col: signal_candidate

target:
  kind: triple_barrier
  outputs:
    label_col: label
    event_ret_col: tb_event_ret
    fwd_col: tb_event_ret
    candidate_out_col: label_candidate
    r_col: tb_event_r
    oriented_r_col: tb_oriented_r
  price_col: close
  open_col: open
  high_col: high
  low_col: low
  volatility_col: atr_over_price_14
  label_mode: meta
  side_col: signal_side
  candidate_col: signal_candidate
  candidate_mode: all_nonzero
  entry_price_mode: next_open
  max_holding: 6
  upper_mult: 1.6
  lower_mult: 1.2
  vol_window: 14
  min_vol: 0.0001
  neutral_label: lower
  tie_break: closest_to_open
  add_r_multiple: true
  r_clip:
  - -2
  - 2
  diagnostic_feature_cols:
  - atr_14
  - atr_over_price_14
  - ehlers_supersmoother_10
  - ehlers_supersmoother_10_slope
  - close_over_ehlers_supersmoother_10
  - ehlers_roofing_48_10
  - ehlers_roofing_48_10_slope
  - ehlers_roofing_48_10_cross_up
  - ehlers_roofing_48_10_cross_down
  - ehlers_hilbert_amplitude_64
  - ehlers_hilbert_phase_64
  - ehlers_hilbert_inst_freq_64
  - ehlers_hilbert_phase_delta_64
  - homodyne_discriminator
  - dominant_cycle_period
  - ehlers_trend_ok
  - ehlers_timing_ok
  - ehlers_cycle_ok
  - ehlers_energy_ok
  - ehlers_volatility_ok
  - ehlers_semiscalp_long_setup
  - ehlers_semiscalp_long_entry
  - signal_side
  - signal_candidate

runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false

risk:
  cost_per_turnover: 0.00015
  slippage_per_turnover: 0.0001
  target_vol: null
  max_leverage: 1.0
  sizing: {}
  dd_guard:
    enabled: false
    max_drawdown: 0.08
    rearm_drawdown: 0.04
    cooloff_bars: 48
  portfolio_guard: {}
  drawdown_sizing: {}
  vol_col: null

backtest:
  engine: manual_barrier
  signal_col: signal_side
  returns_col: close_ret
  returns_type: simple
  subset: full
  periods_per_year: 12096
  missing_return_policy: raise_if_exposed
  allow_short: false
  stop_mode: volatility_stop
  vol_col: atr_over_price_14
  open_col: open
  high_col: high
  low_col: low
  close_col: close
  take_profit_r: 1.6
  stop_loss_r: 1.2
  risk_per_trade: 0.003
  max_holding_bars: 6
  dynamic_exits: {}

portfolio:
  enabled: false
  construction: signal_weights
  long_short: false

monitoring:
  enabled: true
  psi_threshold: 0.2
  n_bins: 10

diagnostics:
  enabled: true

execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close

logging:
  enabled: true
  run_name: spx500_30m_ehlers_semiscalp_long_v1
  output_dir: logs/bot
  stage_tails:
    enabled: false
  execution_source_audit:
    enabled: true
