data:
  source: dukascopy_csv
  interval: 1h
  start: '2023-01-01 00:00:00'
  end: '2024-10-01 00:00:00'
  alignment: inner
  symbol: null
  symbols:
  - EURUSD
  - GBPUSD
  - USDJPY
  - AUDUSD
  api_key: null
  api_key_env: null
  pit:
    timestamp_alignment:
      source_timezone: UTC
      output_timezone: UTC
      normalize_daily: false
      duplicate_policy: last
    corporate_actions:
      policy: none
      adj_close_col: adj_close
    universe_snapshot:
      inactive_policy: raise
  storage:
    mode: cached_only
    dataset_id: ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_meta_v1
    save_raw: false
    save_processed: true
    load_paths:
      EURUSD: /workspace/data/raw/dukas_copy_bank/eurusd_h1.csv
      GBPUSD: /workspace/data/raw/dukas_copy_bank/gbpusd_h1.csv
      USDJPY: /workspace/data/raw/dukas_copy_bank/usdjpy_h1.csv
      AUDUSD: /workspace/data/raw/dukas_copy_bank/audusd_h1.csv
    raw_dir: /workspace/data/raw
    processed_dir: /workspace/data/processed
    load_path: null
features:
- step: returns
  params:
    log: true
    col_name: close_logret
  outputs: {}
  enabled: true
- step: volatility
  params:
    returns_col: close_logret
    rolling_windows:
    - 12
    - 24
    - 48
    - 72
    - 96
    - 120
    - 168
    ewma_spans:
    - 12
    - 24
    - 48
    - 72
    - 96
    annualization_factor: 6048.0
  outputs: {}
  enabled: true
- step: trend
  params:
    price_col: close
    sma_windows:
    - 24
    - 36
    - 72
    - 96
    ema_spans:
    - 8
    - 12
    - 16
    - 24
    - 36
    - 72
    - 96
  outputs: {}
  enabled: true
- step: trend_regime
  params:
    price_col: close
    base_sma_for_sign: 72
    short_sma: 24
    long_sma: 72
  outputs: {}
  enabled: true
- step: session_context
  params:
    timezone: UTC
    sessions:
      liquid_fx:
      - 6
      - 20
  outputs: {}
  enabled: true
- step: regime_context
  params:
    price_col: close
    returns_col: close_logret
    vol_short_window: 24
    vol_long_window: 168
    vol_window_pairs:
    - - 12
      - 120
    - - 24
      - 168
    - - 36
      - 240
    trend_fast_span: 24
    trend_slow_span: 72
    vol_ratio_high_threshold: 1.5
    vol_ratio_low_threshold: 0.7999999999999999
  outputs: {}
  enabled: true
- step: bollinger
  params:
    price_col: close
    window: 24
    n_std: 2.0
  outputs: {}
  enabled: true
- step: roc
  params:
    price_col: close
    windows:
    - 4
    - 24
  outputs: {}
  enabled: true
- step: atr
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 24
    windows:
    - 14
    - 18
    - 24
    - 30
    method: wilder
    add_over_price: true
  outputs: {}
  enabled: true
- step: adx
  params:
    high_col: high
    low_col: low
    close_col: close
    window: 24
    windows:
    - 14
    - 18
    - 24
    - 30
  outputs: {}
  enabled: true
- step: rsi
  params:
    price_col: close
    windows:
    - 2
    - 14
    method: wilder
  outputs: {}
  enabled: true
- step: price_momentum
  params:
    price_col: close
    windows:
    - 12
    - 36
  outputs: {}
  enabled: true
- step: return_momentum
  params:
    returns_col: close_logret
    windows:
    - 6
    - 24
  outputs: {}
  enabled: true
- step: vol_normalized_momentum
  params:
    returns_col: close_logret
    vol_col: vol_rolling_96
    vol_window: 24
    windows:
    - 4
    - 6
    - 8
    - 12
    - 18
    - 24
    - 30
    - 36
    eps: 1.0e-08
  outputs: {}
  enabled: true
- step: shock_context
  params:
    price_col: close
    high_col: high
    low_col: low
    returns_col: close_logret
    atr_col: atr_24
    ema_window: 24
    short_horizon: 1
    medium_horizon: 6
    vol_window: 24
    ret_z_threshold: 1.8
    atr_mult_threshold: 1.1
    distance_from_mean_threshold: 1.1
    post_shock_active_bars: 4
    use_log_returns: true
  outputs:
    shock_side_contrarian_active: primary_side
    shock_candidate: trade_candidate
  enabled: true
- step: lags
  params:
    cols:
    - close_logret
    lags:
    - 1
    - 2
    - 3
    - 36
  outputs: {}
  enabled: true
model:
  kind: xgboost_clf
  params:
    n_estimators: 150
    learning_rate: 0.03648540222869801
    max_depth: 2
    subsample: 1.0
    colsample_bytree: 0.9
    min_child_weight: 4.0
    reg_lambda: 10.0
    reg_alpha: 0.1
    scale_pos_weight: 1.0
    random_state: 7
    objective: binary:logistic
    eval_metric: logloss
    tree_method: hist
  outputs: {}
  preprocessing:
    scaler: none
  feature_cols: null
  target:
    kind: triple_barrier
    price_col: close
    open_col: open
    high_col: high
    low_col: low
    returns_col: close_logret
    returns_type: log
    max_holding: 12
    upper_mult: 1.25
    lower_mult: 1.0
    neutral_label: lower
    tie_break: lower
    vol_window: 12
    min_vol: 0.0001
    entry_price_mode: next_open
    label_col: label
    event_ret_col: tb_event_ret
    add_r_multiple: true
    r_col: tb_event_r
    oriented_r_col: tb_oriented_r
    label_mode: meta
    side_col: primary_side
    candidate_col: trade_candidate
    candidate_mode: all_nonzero
    candidate_out_col: label_candidate
  split:
    method: walk_forward
    train_size: 6048
    test_size: 240
    step_size: 240
    expanding: true
    max_folds: 12
  runtime: {}
  env: {}
  use_features: true
  pred_prob_col: null
  pred_ret_col: null
  returns_input_col: null
  signal_col: null
  action_col: null
  feature_selectors:
    profile: ftmo_fx_intraday_balanced_v1
    families:
      returns_lags: true
      volatility: true
      trend: true
      momentum: true
      regime: true
      session_time: true
      atr_adx_range: true
      cross_asset: false
    exact:
    - primary_side
    include:
    - exact: shock_strength
    - exact: shock_distance_ema
    - exact: bars_since_shock
    - startswith: shock_ret_z_
    - startswith: shock_atr_multiple_
    exclude:
    - exact: trade_candidate
    - exact: shock_candidate
    - exact: shock_up_candidate
    - exact: shock_down_candidate
    - exact: shock_side_contrarian
    - exact: shock_side_contrarian_active
    - startswith: label_
    - startswith: pred_
    - startswith: tb_
    - exact: vol_rolling_96
    - exact: vol_rolling_120
    - exact: vol_rolling_168
    - exact: vol_ewma_72
    - exact: vol_ewma_96
    drift_filter:
      enabled: true
      max_psi: 0.5
      action: warn
      apply_scope: train_only_report
      family_drift_ratio_threshold: 0.5
    strict:
      min_count: 32
  overlay:
    kind: garch
    params:
      returns_input_col: close_logret
      mean_model: zero
signals:
  kind: meta_probability_side
  params:
    prob_col: pred_prob
    side_col: primary_side
    candidate_col: label_candidate
    signal_col: signal_meta_side
    threshold: 0.5
    upper: 0.5
    clip: 1.0
  outputs: {}
runtime:
  seed: 7
  repro_mode: strict
  deterministic: true
  threads: 1
  seed_torch: false
risk:
  cost_per_turnover: 2.5e-05
  slippage_per_turnover: 1.0e-05
  target_vol: null
  max_leverage: 2.0
  dd_guard:
    enabled: true
    max_drawdown: 0.07
    rearm_drawdown: 0.04
    cooloff_bars: 72
  portfolio_guard:
    enabled: true
    daily_soft_stop: 0.01
    daily_hard_stop: 0.025
    weekly_return_target: 0.015
    weekly_profit_lock: 0.015
    after_target_mode: reduce_risk
    after_target_risk_multiplier: 0.25
    max_daily_loss: 0.025
    weekly_drawdown: 0.04
    max_total_loss: 0.08
    cooloff_bars: 24
    rearm_on_new_period: true
    weekly_anchor: W-FRI
  sizing:
    kind: ftmo_risk_per_trade
    vol_col: pred_vol
    risk_per_trade: 0.008
    stop_mult: 1.0
    max_leverage: 1.0
    min_leverage: 0.0
    min_abs_signal: 0.05
    target_vol: null
    confidence_col: pred_prob
    confidence_floor: 0.5
    confidence_mode: meta_success
    confidence_power: 1.0
  drawdown_sizing:
    enabled: true
    levels:
    - max_dd: 0.02
      multiplier: 1.0
    - max_dd: 0.04
      multiplier: 0.5
    - max_dd: 0.06
      multiplier: 0.25
    - max_dd: 0.08
      multiplier: 0.0
  vol_col: null
backtest:
  returns_col: close_logret
  signal_col: signal_meta_side
  periods_per_year: 6048
  returns_type: log
  missing_return_policy: raise_if_exposed
  min_holding_bars: 4
  subset: test
  vol_col: null
portfolio:
  enabled: true
  construction: signal_weights
  gross_target: 1.5
  long_short: true
  expected_return_col: null
  covariance_window: 120
  covariance_rebalance_step: 24
  risk_aversion: 8.0
  trade_aversion: 0.0
  constraints:
    min_weight: -1.0
    max_weight: 0.4
    max_gross_leverage: 1.0
    target_net_exposure: 0.0
  asset_groups: {}
monitoring:
  enabled: true
  psi_threshold: 0.15
  n_bins: 10
execution:
  enabled: false
  mode: paper
  capital: 100000.0
  price_col: close
  min_trade_notional: 0.0
  current_weights: {}
  current_prices: {}
logging:
  enabled: true
  run_name: ftmo_fx_intraday_panel_4pair_xgboost_triple_barrier_meta_v2_trial34_plus_bars_since_shock
  output_dir: /workspace/logs/experiments
  stage_tails:
    enabled: false
    stdout: false
    report: false
    limit: 10
    max_columns: 18
    max_assets: 4
